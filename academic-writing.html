<html lang="zh-CN">
<head>

<title>学术写作工具箱</title>

<style>
:root{--bg:#faf8f4;--card:#fffef9;--ink:#2c2416;--ink-light:#4a3a2a;--muted:#8c7c6a;--accent:#3b5998;--accent2:#5a9e6f;--border:#e0d8c8;--radius:8px;--shadow:0 2px 16px rgba(40,30,10,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans SC",-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:var(--shadow)}
.topbar-brand{font-size:1.5rem;font-weight:600;letter-spacing:.04em;color:var(--ink)}

.back-link{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .2s}.back-link:hover{color:var(--accent)}

.layout{display:flex;min-height:calc(100vh - 68px)}

.sidebar{width:300px;min-width:300px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}

.sidebar-item .cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--accent);opacity:.35}
.sidebar-item.active .cat-dot{opacity:1}
.sidebar-api{padding:14px 18px;border-top:1px solid var(--border);margin-top:10px}
.sidebar-api input{width:100%;padding:7px 10px;font-size:.72rem;font-family:monospace;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--ink)}.sidebar-api input:focus{outline:none;border-color:var(--accent)}
.sidebar-api .btn-mini{width:100%;margin-top:5px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;font-size:.74rem;color:var(--muted);transition:all .2s}.sidebar-api .btn-mini:hover{border-color:var(--accent);color:var(--accent)}

.main{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;gap:20px}

.prompt-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.prompt-header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.prompt-header h2{font-size:1.2rem;font-weight:600;color:var(--ink);letter-spacing:.04em}

.prompt-body{padding:22px 28px;max-height:360px;overflow-y:auto}

.io-area{display:grid;grid-template-columns:1fr 1fr;gap:18px}

.io-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column}

.char-count{text-align:right;font-size:.7rem;color:#c8bfb0;padding:0 18px 10px}

.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:12px 34px;border-radius:999px;cursor:pointer;font-size:.92rem;font-family:inherit;letter-spacing:.04em;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:8px}

<body>

<div class="topbar">
<div class="topbar-brand"><i class="fas fa-pen-fancy"></i>学术写作工具箱</div>
<a class="back-link" href="index.html"><i class="fas fa-arrow-left"></i> 返回主页</a>
</div>

<div class="layout">

</div>
</div>

<div class="main">
<div class="prompt-card">

<div class="io-card">

<div class="io-card-header"><span>📤 AI 输出</span><button class="sm-btn" onclick="copyOutput()"><i class="fas fa-copy"></i> 复制结果</button></div>

</div>
</div>

<div class="actions">
<button class="btn btn-primary" id="runBtn" onclick="runPrompt()"><i class="fas fa-play"></i> 执行</button>
<button class="btn btn-outline" onclick="clearAll()"><i class="fas fa-eraser"></i> 全部清空</button>
</div>
<div class="status-msg" id="statusMsg"></div>
</div>
</div>
<div class="footer">模板来源：awesome-ai-research-writing · 调用 DeepSeek API</div>

# 标准学术图表库
在推荐前，请优先参考以下图表类型，选择最精确的一个或多个：

一、数值与性能对比类
1. 纵向分组柱状图：最标准的 SOTA 对比。适用于对比项数量适中且标签较短的情况。
2. 横向条形图：当对比的方法名称较长，或者对比项非常多时强烈推荐，可避免 X 轴文字倾斜或重叠。
3. 帕累托前沿图：用于展示两个相互制约指标的权衡关系。位于右上角或边界上的点代表最优模型。
4. 雷达图：用于多维度的综合能力评估。证明模型在速度、精度、显存、鲁棒性等方面全面发展无短板。
5. 堆叠柱状图：用于展示整体指标的细分构成，如将总时间拆解为加载、推理和后处理时间。

二、趋势与收敛类
6. 带置信区域的折线图：展示训练过程中的 Loss 或 Accuracy。通常使用半透明阴影区域包裹折线，以表示多次实验的标准差或置信区间。
7. 局部放大折线图：当多个模型在训练后期收敛结果非常接近时，在大图中嵌入一个放大的子图，专门展示最后阶段的微小精度优势。
8. 散点拟合图：用于展示离散数据的整体趋势。通过添加拟合曲线揭示潜在的线性或非线性规律。

三、模型评估与分类类
9. ROC 曲线：二分类任务的标准图表。适用于正负样本比例较为平衡的数据集，展示 TPR 与 FPR 的权衡。
10. Precision-Recall 曲线：适用于类别不平衡的数据集。在正样本极少的情况下，PR 曲线比 ROC 曲线更能真实反映模型性能。

四、数据关系与矩阵可视化类
11. 热力图：特别适用于呈现大规模的矩阵形式数据。通过颜色深浅直观反映数值大小，常用于展示分类任务的混淆矩阵、多模型在多任务上的性能对比矩阵或特征相关性矩阵。
12. 散点图：展示两个连续变量之间的相关性，如预测值与真实值。建议配合对角参考线使用。
13. 气泡图：散点图的扩展，引入第三个维度即气泡大小，来表示参数量或计算成本。

五、统计分布与构成类
14. 小提琴图：优于箱线图的进阶选择。能直观展示数据的概率密度分布形状，如双峰分布，体现统计严谨性。
15. 箱线图：用于展示多组数据的分布范围、中位数以及离群点。
16. 环形图或扇形图：用于展示分类数据的占比，如错误类型分布。建议优先使用环形图。

六、复合布局类
17. 双Y轴图：当需要在一张图中同时展示两个量纲完全不同的变量时，如左轴是精度，右轴是显存占用。
18. 柱折组合图：用于背景与前景的结合。例如柱状图表示样本数量作为背景，折线图表示模型精度作为前景，常用于长尾分布分析。
19. 分面网格图：当对比变量过多，一张大图显得拥挤时，将其拆分为矩阵排列的一组小图，共享坐标轴。

// ═══════════════════ RENDER ═══════════════════════
function renderNav(){
    const cats=[...new Set(T.map(t=>t.c))];
    document.getElementById("promptNav").innerHTML=cats.map(c=>`<div class="sidebar-section">${c}</div>`+T.filter(t=>t.c===c).map(t=>`<div class="sidebar-item" data-id="${t.id}" onclick="sel('${t.id}')"><span class="cat-dot"></span>${t.n}</div>`).join("")).join("");
}

function sel(id){
    cur=id;document.querySelectorAll(".sidebar-item").forEach(x=>x.classList.remove("active"));
    const el=document.querySelector(`.sidebar-item[data-id="${id}"]`);if(el)el.classList.add("active");
    const t=T.find(x=>x.id===id);if(!t)return;
    document.getElementById("promptTitle").textContent=t.n;
    document.getElementById("promptTags").innerHTML=t.tg.map(g=>`<span class="tag">${g}</span>`).join("");
    document.getElementById("promptText").textContent=t.p;
}

async function runPrompt(){
    const k=gk();if(!k){st("请先在侧栏设置 API Key","err");return}
    if(!cur){st("请选择一个模板","err");return}
    const tpl=T.find(x=>x.id===cur),inp=document.getElementById("userInput").value.trim();
    if(!inp){st("请在输入框中粘贴文本内容","err");return}
    const b=document.getElementById("runBtn");b.disabled=true;b.innerHTML='<i class="fas fa-spinner fa-spin"></i> 执行中……';
    st("正在调用 DeepSeek API……","");document.getElementById("outputArea").textContent="";document.getElementById("outputArea").style.color="var(--ink-light)";
    try{
        const full=tpl.p+"\n\n"+inp;
        const r=await fetch(DS,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},body:JSON.stringify({model:"deepseek-chat",messages:[{role:"user",content:full}],temperature:0.5,max_tokens:8192})});
        const d=await r.json();if(!r.ok)throw new Error(d.error?.message);
        document.getElementById("outputArea").textContent=d.choices[0].message.content;st("执行完成","ok");
    }catch(e){document.getElementById("outputArea").textContent="错误: "+e.message;document.getElementById("outputArea").style.color="#c06050";st(e.message,"err")}
    finally{b.disabled=false;b.innerHTML='<i class="fas fa-play"></i> 执行'}
}
