<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿瓦隆 · AI 六人局</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8; --surface: #fffef9; --surface2: #ede6d8;
            --gold: #b8942e; --gold-light: #c9a84c; --gold-dark: #7a6018;
            --text: #3b3020; --text-dim: #8c7d65; --text-bright: #1a1008;
            --good: #4caf50; --good-glow: #388e3c;
            --evil: #c0392b; --evil-glow: #a93226;
            --accent: #5c8dc9;
            --radius: 8px; --radius-lg: 14px;
            --font-title: 'Cinzel', serif; --font-body: 'Noto Sans SC', -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-body); background: var(--bg);
            color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
            background-image: linear-gradient(180deg, #faf7f0 0%, #f0ebe0 40%, #e8e0d0 100%);
        }

        /* ═══════════════ SETUP SCREEN ═══════════════ */
        #setup-screen {
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; min-height: 100vh; justify-content: center;
            width: 100%; max-width: 500px;
        }
        #setup-screen h1 {
            font-family: var(--font-title); font-size: 2.6rem; color: var(--gold);
            letter-spacing: 0.08em; margin-bottom: 4px; text-shadow: 0 0 30px rgba(201,165,92,0.3);
        }
        #setup-screen .subtitle { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 32px; letter-spacing: 0.12em; }
        .setup-card {
            background: var(--surface); border: 1px solid rgba(201,165,92,0.25);
            border-radius: var(--radius-lg); padding: 28px 24px;
            width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .setup-card label {
            display: block; font-size: 0.85rem; color: var(--text-dim);
            margin-bottom: 6px; margin-top: 16px; letter-spacing: 0.04em;
        }
        .setup-card label:first-child { margin-top: 0; }
        .setup-input {
            width: 100%; padding: 10px 14px; border: 1px solid rgba(201,165,92,0.2);
            border-radius: 6px; background: var(--bg); color: var(--text);
            font-family: var(--font-body); font-size: 0.9rem; outline: none;
            transition: border-color 0.3s;
        }
        .setup-input:focus { border-color: var(--gold); }
        .setup-input::placeholder { color: #5a5040; }
        .seat-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px;
        }
        .seat-btn {
            padding: 12px 8px; border: 2px solid rgba(201,165,92,0.2);
            border-radius: 8px; background: var(--bg); color: var(--text);
            cursor: pointer; font-family: var(--font-body); font-size: 0.9rem;
            transition: all 0.3s; text-align: center;
        }
        .seat-btn:hover { border-color: var(--gold); background: var(--surface2); }
        .seat-btn.selected { border-color: var(--gold); background: rgba(201,165,92,0.15); color: var(--gold-light); box-shadow: 0 0 16px rgba(201,165,92,0.2); }
        .seat-btn .seat-num { font-family: var(--font-title); font-size: 1.4rem; display: block; }
        .seat-btn .seat-hint { font-size: 0.7rem; color: var(--text-dim); }
        .seat-btn.selected .seat-hint { color: var(--gold); }
        .btn-primary {
            width: 100%; margin-top: 20px; padding: 14px;
            border: none; border-radius: 8px; cursor: pointer;
            background: linear-gradient(135deg, #8b6914, #c9a55c);
            color: #1a1410; font-family: var(--font-title); font-size: 1.1rem;
            font-weight: 700; letter-spacing: 0.1em; transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(201,165,92,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(201,165,92,0.45); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .setup-hint { font-size: 0.75rem; color: var(--text-dim); margin-top: 12px; text-align: center; }
        .setup-hint a { color: var(--gold); }

        /* ═══════════════ GAME SCREEN ═══════════════ */
        #game-screen { display: none; width: 100%; max-width: 1100px; padding: 12px 16px; flex-direction: column; }

        /* Quest Tracker */
        .quest-tracker {
            display: flex; gap: 12px; margin-bottom: 10px; align-items: center; justify-content: center;
        }
        .quest-circle {
            width: 48px; height: 48px; border-radius: 50%;
            border: 2px solid rgba(201,165,92,0.35); background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 700; transition: all 0.5s;
        }
        .quest-circle.done-good { border-color: var(--good); background: rgba(76,175,80,0.2); color: var(--good); box-shadow: 0 0 14px rgba(76,175,80,0.3); }
        .quest-circle.done-evil { border-color: var(--evil); background: rgba(192,57,43,0.2); color: var(--evil); box-shadow: 0 0 14px rgba(192,57,43,0.3); }
        .quest-circle.current { border-color: var(--gold-light); animation: pulse-gold 1.5s infinite; }
        .quest-label { font-size: 0.7rem; color: var(--text-dim); text-align: center; }
        .quest-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }

        /* ═══════════════ THREE-COLUMN BOARD ═══════════════ */
        .board-container {
            display: grid; grid-template-columns: 170px 1fr 170px;
            gap: 14px; width: 100%; align-items: start;
        }

        /* Player column */
        .player-column {
            display: flex; flex-direction: column; gap: 10px;
        }

        .player-card {
            background: var(--surface); border: 2px solid rgba(201,165,92,0.18);
            border-radius: var(--radius-lg); padding: 12px 10px; text-align: center;
            transition: all 0.4s; position: relative;
        }
        .player-card.leader { border-color: var(--gold); box-shadow: 0 0 18px rgba(201,165,92,0.35); }
        .player-card.human { border-color: var(--accent); box-shadow: 0 0 14px rgba(92,141,201,0.3); }
        .player-card.on-quest { border-color: var(--gold-light); box-shadow: 0 0 18px rgba(224,201,127,0.35); }
        .player-card.speaking { border-color: var(--gold-light) !important; box-shadow: 0 0 24px rgba(224,201,127,0.55) !important; animation: pulse-think 0.8s infinite; }
        .player-card.thinking { animation: pulse-think 1s infinite; }

        .player-seat-num {
            font-family: var(--font-title); font-size: 1.6rem; color: var(--gold-light);
            margin-bottom: 4px;
        }
        .player-name { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .player-card.human .player-name { color: #7cb4e8; }

        .player-role-tag {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em;
        }
        .role-good { background: rgba(76,175,80,0.2); color: var(--good-glow); border: 1px solid rgba(76,175,80,0.3); }
        .role-evil { background: rgba(192,57,43,0.2); color: var(--evil-glow); border: 1px solid rgba(192,57,43,0.3); }
        .role-unknown { color: var(--text-dim); font-size: 0.8rem; }

        .player-knowledge {
            font-size: 0.65rem; color: var(--text-dim); margin-top: 4px; line-height: 1.4;
        }
        .player-knowledge strong { color: var(--gold-light); }

        .crown-badge {
            position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
            color: var(--gold); font-size: 1.1rem; filter: drop-shadow(0 0 4px rgba(201,165,92,0.6));
            animation: float-crown 2s ease-in-out infinite;
        }
        .quest-badge {
            position: absolute; top: -8px; right: -4px;
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--gold); color: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
        }
        .vote-badge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 1.6rem; z-index: 5; animation: pop-in 0.4s ease-out; pointer-events: none;
        }

        /* ═══════════════ CENTER PANEL ═══════════════ */
        .center-panel {
            background: var(--surface); border: 2px solid rgba(201,165,92,0.3);
            border-radius: var(--radius-lg); padding: 24px 20px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); min-height: 260px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
        }
        .center-title {
            font-family: var(--font-title); font-size: 1.15rem; color: var(--gold-light);
            letter-spacing: 0.06em;
        }
        .center-info { font-size: 1rem; color: var(--text-dim); line-height: 1.6; }
        .center-highlight { font-size: 1.3rem; color: var(--text-bright); font-weight: 600; }

        .btn-action {
            padding: 12px 28px; border: none; border-radius: 8px;
            cursor: pointer; font-family: var(--font-body); font-size: 1rem;
            font-weight: 600; transition: all 0.3s; letter-spacing: 0.04em;
        }
        .btn-approve { background: var(--good); color: #fff; }
        .btn-approve:hover { background: #43a047; box-shadow: 0 0 14px rgba(76,175,80,0.4); }
        .btn-reject { background: var(--evil); color: #fff; }
        .btn-reject:hover { background: #b71c1c; box-shadow: 0 0 14px rgba(192,57,43,0.4); }
        .btn-confirm { background: linear-gradient(135deg, #8b6914, #c9a55c); color: #1a1410; }
        .btn-confirm:hover { box-shadow: 0 0 14px rgba(201,165,92,0.4); }
        .btn-team-toggle {
            padding: 8px 14px; border: 2px solid rgba(201,165,92,0.25); border-radius: 8px;
            background: transparent; color: var(--text); cursor: pointer;
            font-family: var(--font-body); font-size: 0.9rem; transition: all 0.3s;
        }
        .btn-team-toggle.active { border-color: var(--gold); background: rgba(201,165,92,0.2); color: var(--gold-light); }
        .btn-team-toggle:hover { border-color: var(--gold); }
        .btn-export {
            padding: 6px 14px; border: 1px solid rgba(201,165,92,0.3); border-radius: 6px;
            background: transparent; color: var(--text-dim); cursor: pointer;
            font-family: var(--font-body); font-size: 0.75rem; transition: all 0.3s;
        }
        .btn-export:hover { border-color: var(--gold); color: var(--gold-light); }

        /* ═══════════════ SPEECH ═══════════════ */
        .speech-log-compact {
            max-height: 200px; overflow-y: auto; width: 100%;
            text-align: left; margin: 4px 0; padding-right: 4px;
        }
        .speech-bubble {
            background: rgba(0,0,0,0.25); border-left: 3px solid var(--gold);
            border-radius: 4px; padding: 8px 12px; margin-bottom: 6px;
            font-size: 0.9rem; line-height: 1.5; animation: fadeInUp 0.3s ease-out;
        }
        .speech-author {
            color: var(--gold-light); font-weight: 600; display: block;
            font-size: 0.8rem; margin-bottom: 3px;
        }
        .speech-text { color: var(--text); word-break: break-word; }
        .speech-prompt { margin-top: 8px; width: 100%; }
        .speech-input {
            width: 100%; padding: 10px 14px; margin-top: 8px;
            border: 1px solid rgba(201,165,92,0.35); border-radius: 8px;
            background: var(--bg); color: var(--text);
            font-family: var(--font-body); font-size: 0.95rem; outline: none;
            transition: border-color 0.3s;
        }
        .speech-input:focus { border-color: var(--gold); }
        .speech-input::placeholder { color: #5a5040; }

        /* ═══════════════ VOTE TRACK ═══════════════ */
        .vote-track {
            display: flex; gap: 8px; margin: 8px 0; align-items: center; justify-content: center;
        }
        .vote-slot {
            width: 28px; height: 28px; border-radius: 50%;
            border: 1px solid rgba(201,165,92,0.2); background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: var(--text-dim); transition: all 0.3s;
        }
        .vote-slot.rejected { border-color: var(--evil); background: rgba(192,57,43,0.2); color: var(--evil); }
        .vote-track-label { font-size: 0.75rem; color: var(--text-dim); margin-right: 6px; }

        /* ═══════════════ LOG ═══════════════ */
        .log-section { width: 100%; margin-top: 10px; }
        .log-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 4px;
        }
        .log-header span { font-size: 0.8rem; color: var(--text-dim); }
        .game-log {
            width: 100%; background: var(--surface); border: 1px solid rgba(201,165,92,0.15);
            border-radius: var(--radius); padding: 10px 14px; max-height: 180px; min-height: 80px;
            overflow-y: auto; font-size: 0.78rem; color: var(--text-dim); line-height: 1.8;
        }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .log-entry.good { color: var(--good-glow); }
        .log-entry.evil { color: var(--evil-glow); }
        .log-entry.gold { color: var(--gold-light); }
        .log-entry .time { color: #5a5040; margin-right: 8px; font-family: monospace; }

        /* ═══════════════ THINKING ═══════════════ */
        .thinking-indicator {
            display: flex; align-items: center; gap: 8px; color: var(--gold);
            font-size: 0.9rem; margin: 8px 0;
        }
        .thinking-spinner {
            width: 18px; height: 18px; border: 2px solid rgba(201,165,92,0.3);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ═══════════════ VOTE DETAIL MODAL ═══════════════ */
        .detail-modal {
            max-width: 600px; width: 95%; max-height: 80vh; overflow-y: auto;
            background: var(--surface); border: 2px solid var(--gold);
            border-radius: var(--radius-lg); padding: 24px 22px;
            text-align: left; box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .detail-modal h3 {
            font-family: var(--font-title); color: var(--gold); text-align: center;
            font-size: 1.2rem; margin-bottom: 16px; letter-spacing: 0.05em;
        }
        .detail-round {
            background: var(--bg); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
            border-left: 3px solid var(--gold);
        }
        .detail-round.Q-success { border-left-color: var(--good); }
        .detail-round.Q-fail { border-left-color: var(--evil); }
        .detail-round-header {
            font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;
            color: var(--text-bright);
        }
        .detail-table {
            width: 100%; font-size: 0.8rem; border-collapse: collapse;
        }
        .detail-table td {
            padding: 3px 8px; border-bottom: 1px solid rgba(0,0,0,0.06);
            vertical-align: top;
        }
        .detail-table .label { color: var(--text-dim); width: 50px; white-space: nowrap; }
        .detail-table .val { color: var(--text); }
        .detail-vote-approve { color: var(--good); }
        .detail-vote-reject { color: var(--evil); }
        .detail-quest-result { font-weight: 700; }
        .detail-close-btn {
            display: block; margin: 16px auto 0; padding: 10px 30px;
            border: 1px solid var(--gold); border-radius: 6px;
            background: transparent; color: var(--gold); cursor: pointer;
            font-family: var(--font-body); font-size: 0.9rem; transition: all 0.3s;
        }
        .detail-close-btn:hover { background: rgba(201,165,92,0.15); }

        /* ═══════════════ OVERLAYS ═══════════════ */
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.88); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: var(--font-body);
        }
        .overlay-card {
            background: var(--surface); border: 2px solid var(--gold);
            border-radius: var(--radius-lg); padding: 36px 32px; text-align: center;
            max-width: 440px; width: 92%; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
        }
        .overlay-card h2 { font-family: var(--font-title); color: var(--gold); font-size: 1.6rem; margin-bottom: 16px; letter-spacing: 0.06em; }
        .overlay-card p { color: var(--text); font-size: 0.95rem; line-height: 1.8; margin-bottom: 10px; }
        .overlay-card .role-name { font-size: 1.5rem; font-weight: 700; margin: 10px 0; }
        .overlay-card .role-name.good-role { color: var(--good); }
        .overlay-card .role-name.evil-role { color: var(--evil); }
        .knowledge-text { color: var(--text-dim); font-size: 0.9rem; line-height: 1.7; }
        .knowledge-text strong { color: var(--text-bright); }
        .overlay-card .icon-huge { font-size: 3rem; margin-bottom: 12px; }

        .assassin-targets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 16px 0; }
        .target-btn {
            padding: 12px 20px; border: 2px solid rgba(201,165,92,0.3); border-radius: 8px;
            background: var(--surface2); color: var(--text); cursor: pointer;
            font-family: var(--font-body); font-size: 1rem; transition: all 0.3s;
        }
        .target-btn:hover { border-color: var(--evil); background: rgba(192,57,43,0.2); color: var(--evil-glow); }

        .game-over-banner {
            font-family: var(--font-title); font-size: 2rem; letter-spacing: 0.08em; margin: 16px 0;
        }
        .game-over-banner.good-win { color: var(--good); text-shadow: 0 0 30px rgba(76,175,80,0.5); }
        .game-over-banner.evil-win { color: var(--evil); text-shadow: 0 0 30px rgba(192,57,43,0.5); }

        .role-reveal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin: 16px 0; }
        .role-reveal-item { background: var(--bg); border-radius: 6px; padding: 10px; text-align: left; display: flex; align-items: center; gap: 10px; }
        .role-reveal-item .rr-name { font-weight: 600; font-size: 0.85rem; }
        .role-reveal-item .rr-role { font-size: 0.75rem; color: var(--text-dim); }
        .role-reveal-item.good-player { border-left: 3px solid var(--good); }
        .role-reveal-item.evil-player { border-left: 3px solid var(--evil); }

        /* ═══════════════ ANIMATIONS ═══════════════ */
        @keyframes pulse-gold {
            0%,100% { box-shadow: 0 0 8px rgba(201,165,92,0.3); }
            50% { box-shadow: 0 0 22px rgba(201,165,92,0.6); }
        }
        @keyframes pulse-think {
            0%,100% { box-shadow: 0 0 8px rgba(201,165,92,0.2); }
            50% { box-shadow: 0 0 20px rgba(224,201,127,0.5); }
        }
        @keyframes float-crown {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-4px); }
        }
        @keyframes pop-in {
            0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
            70% { transform: translate(-50%,-50%) scale(1.2); }
            100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* ═══════════════ RESPONSIVE ═══════════════ */
        @media (max-width: 768px) {
            #setup-screen h1 { font-size: 2rem; }
            .seat-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .seat-btn { padding: 10px 6px; font-size: 0.8rem; }
            .seat-btn .seat-num { font-size: 1.1rem; }
            .board-container {
                grid-template-columns: 1fr 1fr; gap: 8px;
            }
            .player-column.left-col { grid-column: 1; }
            .player-column.right-col { grid-column: 2; }
            .center-panel {
                grid-column: 1 / -1; order: -1; min-height: 160px; padding: 16px 12px;
            }
            .center-title { font-size: 1rem; }
            .center-info { font-size: 0.9rem; }
            .center-highlight { font-size: 1.1rem; }
            .quest-tracker { gap: 6px; }
            .quest-circle { width: 38px; height: 38px; font-size: 1rem; }
            .game-log { max-height: 120px; font-size: 0.7rem; }
            .speech-bubble { font-size: 0.8rem; }
        }
    </style>
</head>

<!-- ═══════════════ SETUP SCREEN ═══════════════ -->
<div id="setup-screen">
    <h1>AVALON</h1>
    <p class="subtitle">阿瓦隆 · AI 六人局</p>
    <div class="setup-card">
        <label><i class="fas fa-key"></i> DeepSeek API Key</label>
        <input type="password" class="setup-input" id="apiKeyInput" placeholder="sk-...">
        <label><i class="fas fa-user"></i> 你的昵称</label>
        <input type="text" class="setup-input" id="playerNameInput" placeholder="输入昵称" maxlength="8">
        <label><i class="fas fa-chair"></i> 选择座位</label>
        <div class="seat-grid" id="seatGrid">

// ═══════════════ HELPERS ═══════════════
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function randInt(max) { return Math.floor(Math.random() * max); }

function getKey() {
    return localStorage.getItem("deepseek_api_key") || "";
}
function addLog(msg, cls = '') {
    const log = document.getElementById('gameLog');
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' +
                 now.getMinutes().toString().padStart(2,'0') + ':' +
                 now.getSeconds().toString().padStart(2,'0');
    const div = document.createElement('div');
    div.className = 'log-entry ' + cls;
    div.innerHTML = `<span class="time">${time}</span>${msg}`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}
function exportLog() {
    const log = document.getElementById('gameLog');
    const text = Array.from(log.querySelectorAll('.log-entry'))
        .map(e => e.textContent.trim()).join('\n');
    const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `avalon-log-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
}

function showVoteDetail() {
    if (!state) return;
    let html = '<div class="detail-modal"><h3>各轮投票与任务详情</h3>';

    for (let r = 0; r < 5; r++) {
        const qResult = state.questResults[r];
        const qTeam = state.questTeams[r];
        const rLeader = state.roundLeaders[r];
        const qCls = qResult === true ? 'Q-success' : qResult === false ? 'Q-fail' : '';

        html += `<div class="detail-round ${qCls}">`;
        html += `<div class="detail-round-header">第${r+1}轮 (${QUEST_SIZES[r]}人任务)</div>`;
        html += '<table class="detail-table">';

        if (rLeader !== undefined) {
            const ld = state.players[rLeader];
            html += `<tr><td class="label">队长</td><td class="val">玩家${ld.idx+1}(${ld.name})</td></tr>`;
        }
        if (qTeam) {
            html += `<tr><td class="label">队员</td><td class="val">${qTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、')}</td></tr>`;
        }

        // Show the approved vote for this round
        const approvedVotes = (state.voteHistory || []).filter(v => v.approved);
        const thisVote = approvedVotes[r];
        if (thisVote) {
            html += `<tr><td class="label">投票</td><td class="val"><span class="detail-vote-approve">赞成 ${thisVote.approves}</span> / <span class="detail-vote-reject">反对 ${thisVote.rejects}</span> [通过]</td></tr>`;
        } else if (!qTeam) {
            html += `<tr><td class="label">投票</td><td class="val" style="color:var(--text-dim)">---</td></tr>`;
        }

        // Show all rejected votes before the approved one
        const rejectedBefore = [];
        for (const vh of (state.voteHistory || [])) {
            if (vh.approved && rejectedBefore.length === r) break; // this is the approved vote for round r
            if (!vh.approved && rejectedBefore.length < r + 1) {
                // This rejected vote belongs to a previous round's rejected attempts
            }
            // Simpler: count all rejected votes that occurred before the r-th approved vote
        }
        // Count rejections before this round's approved vote
        let rejectionCount = 0;
        let approvedCount = 0;
        for (const vh of (state.voteHistory || [])) {
            if (approvedCount === r && !vh.approved) rejectionCount++;
            if (vh.approved) approvedCount++;
            if (approvedCount > r) break;
        }
        if (rejectionCount > 0) {
            html += `<tr><td class="label">否决</td><td class="val" style="color:var(--text-dim)">本轮共否决 ${rejectionCount} 次</td></tr>`;
        }

        // Quest result
        if (qResult !== null && qResult !== undefined) {
            html += `<tr><td class="label">结果</td><td class="val"><span class="detail-quest-result" style="color:${qResult ? 'var(--good)' : 'var(--evil)'}">${qResult ? '任务成功' : '任务失败'}</span></td></tr>`;
        } else if (!qTeam) {
            html += `<tr><td class="label">结果</td><td class="val" style="color:var(--text-dim)">未开始</td></tr>`;
        }

        // Speeches
        const roundSpeeches = (state.speechLog || []).filter(s => s.round === r);
        if (roundSpeeches.length > 0) {
            html += `<tr><td class="label">发言</td><td class="val">`;
            roundSpeeches.forEach(s => {
                const typeTag = s.type === 'opening' ? '[开场] ' : s.type === 'summary' ? '[总结] ' : '';
                html += `<div style="margin:2px 0;font-size:0.75rem;">玩家${s.playerIdx+1}(${state.players[s.playerIdx].name})${typeTag}: "${s.content}"</div>`;
            });
            html += '</td></tr>';
        }

        html += '</table></div>';
    }

    html += '<button class="detail-close-btn" onclick="hideOverlay()">关闭</button>';
    html += '</div>';
    showOverlay(html);
}

// ═══════════════ API ═══════════════
async function callDeepseek(systemPrompt, userMessage) {
    const apiKey = getKey();
    if (!apiKey) throw new Error('API Key 未设置');
    const resp = await fetch(DS_API, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userMessage }
            ],
            temperature: 0.7,
            max_tokens: 1024
        })
    });
    if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`API 错误 ${resp.status}: ${errText.slice(0, 200)}`);
    }
    const data = await resp.json();
    return data.choices[0].message.content;
}

function parseAIResponse(text) {
    const codeBlock = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    const jsonStr = codeBlock ? codeBlock[1].trim() : text.trim();
    try {
        const match = jsonStr.match(/\{[\s\S]*\}/);
        if (match) return JSON.parse(match[0]);
    } catch (e) {
        console.warn('Failed to parse AI JSON, trying fallback:', e);
    }
    const reasoning = text.slice(0, 200);
    return { reasoning, _raw: text, _parseFailed: true };
}

function buildPlayerKnowledge(playerIdx) {
    const p = state.players[playerIdx];
    const role = p.role;
    let knowledge = '';
    const allPlayers = state.players;

    if (role === 'merlin') {
        const evils = allPlayers.filter(pl => ROLE_TEAM[pl.role] === 'evil');
        knowledge = `你是梅林，你知道 ${evils.map(e => `玩家${e.idx+1}(${e.name})`).join(' 和 ')} 是坏人（莫甘娜和刺客），但你不知道他们各自的具体身份。你必须隐藏自己的身份。`;
    } else if (role === 'percival') {
        const merlin = allPlayers.find(pl => pl.role === 'merlin');
        const morgana = allPlayers.find(pl => pl.role === 'morgana');
        knowledge = `你是派西维尔。你知道 玩家${merlin.idx+1}(${merlin.name}) 和 玩家${morgana.idx+1}(${morgana.name}) 中一个是真梅林、一个是莫甘娜，但你无法确定谁是谁。`;
    } else if (role === 'servant') {
        knowledge = `你是亚瑟的忠臣，没有任何特殊信息。你需要通过观察每个人的投票和发言来推断谁是坏人。`;
    } else if (role === 'morgana') {
        const assassin = allPlayers.find(pl => pl.role === 'assassin');
        knowledge = `你是莫甘娜。玩家${assassin.idx+1}(${assassin.name}) 是你的队友（刺客）。在派西维尔眼里，你会假扮成梅林。你需要混淆视听。`;
    } else if (role === 'assassin') {
        const morgana = allPlayers.find(pl => pl.role === 'morgana');
        knowledge = `你是刺客。玩家${morgana.idx+1}(${morgana.name}) 是你的队友（莫甘娜）。如果好人成功完成3个任务，你需要刺杀真正的梅林来翻盘。`;
    }
    return knowledge;
}

function buildSystemPrompt(playerIdx) {
    const p = state.players[playerIdx];
    const knowledge = buildPlayerKnowledge(playerIdx);
    const team = ROLE_TEAM[p.role];
    const roleName = ROLE_NAMES[p.role];
    const roleIcon = ROLE_ICONS[p.role];

    const roleStrategies = {
        merlin: `【梅林策略】
- 暗中引导队伍避开坏人，发言多用"我感觉"、"可能"、"不太对"等模糊词，绝不能说"我知道"。

        percival: `【派西维尔策略】

- 主动组队试探两位候选人的反应：真梅林会避开坏人，莫甘娜可能会"不小心"拉上坏人。

-  可以说"我感觉某人像梅林"或"我怀疑某人传递了信息"，但绝不能暴露你派西维尔的身份。`,

        servant: `【忠臣策略】

- 不要盲目跟风，应有自己的判断；后期可以主动挡刀（假装有信息）。

        morgana: `【莫甘娜策略】

        assassin: `【刺客策略】
- 前期做高自己好人面：多投赞成、支持合理队伍、积极参与讨论。

- 记录每个人的发言和投票模式，特别注意那些"总是恰好避开坏人队伍"的人。
- 讨论中保持适中活跃，避免极端沉默或过于高调。

    return `你是一名资深《阿瓦隆》桌游玩家，现在正在参与一局6人标准局（4好人 vs 2坏人）。你必须完全沉浸在自己的角色中，运用游戏黑话和常规套路进行发言与决策。

## 你的身份信息
你是 **玩家${p.idx+1}(${p.name})**，你的角色是 **${roleIcon} ${roleName}**，属于 **${team === 'good' ? '好人阵营（蓝方）' : '坏人阵营（红方）'}**。

${knowledge}

${roleStrategies[p.role] || ''}

## 游戏规则（关键点）
- 任务人数：第1轮2人，第2轮3人，第3轮4人，第4轮3人，第5轮4人。
- 任何任务只要有1张失败票即判定任务失败。
- 组队投票：赞成票≥4票（多数）通过；平局或少于4票否决。同一轮连续5次否决，坏人直接获胜。
- **好人必须投成功票**（没有选择），坏人可以自由选择投成功或失败。
- 好人先完成3个任务则进入刺杀阶段：刺客指认梅林，刺中则坏人翻盘，刺错则好人胜利。
- 坏人先完成3个失败任务或5连否→坏人直接获胜。

## 阿瓦隆常用黑话与术语
- **排水**：通过多次组队和投票排除可疑玩家，缩小坏人范围。
- **跳车**：投票阶段临时改变态度（原赞同改反对）。
- **抬车**：故意拉上可疑玩家组队来观察反应。
- **压票**：犹豫或最后才表态以隐藏立场。
- **明水**：公认的好人，身份清白。
- **暗跳**：梅林或派西维尔在不暴露身份的前提下隐晦给出信息。
- **挡刀**：好人故意表现出可疑，吸引刺客误刺自己以保护梅林。
- **交牌**：承认自己是坏人。
- **悍跳**：坏人假扮梅林或派西维尔报出虚假信息。
- **倒钩**：投票行为与阵营利益相反，用于混淆身份（坏人投赞成好人队/好人投反对好人队）。
- **全票**：全体赞成或全体反对，往往在关键轮次出现。
- **试错**：前两轮故意放行或否决以收集情报。
- **盲区**：某个玩家完全不被怀疑的区域。
- **爆水**：好人身份过于明显，容易被刺客锁定。

## 通用战术套路
- 第一轮可以适当放水（坏人投成功）伪装身份。
- 注意连续投票模式：三连反对的人可能是梅林或坏人。
- 多坏人出征时，协调好由谁投失败票，避免重复浪费。
- 第五轮需4人，好人倾向组"大车"稀释坏人票。
- 故意让一个任务失败来获取下一轮投票的信息（信息轮策略）。
- 坏人可制造3:3平票来消耗否决次数。
- 刺杀阶段前，好人可以适时暗示身份来统一投票，但风险极大。

##  身份保密规则（极其重要！）
- **你绝对不能在任何发言中透露你的真实角色身份。** 例如绝不可以说"我是梅林"、"我是派西维尔"、"我是莫甘娜"、"我是刺客"、"我是忠臣"。
- **你不能说"我知道XX是坏人"**——只有梅林知道坏人是谁，这样说等于暴露你是梅林。
- **你也不能说"我是闭眼玩家"、"我没有信息"之类暗示身份的话。**
- 你可以说"我感觉"、"我怀疑"、"根据投票和发言我认为"——用推理而非特权信息来支撑观点。
- 好人可以说"我觉得XX传递了梅林的信息"来暗跳，但不能说"我是派西维尔，我看到XX和XX中有梅林"。
- 坏人（莫甘娜）可以假扮梅林"暗跳"，但不能说"我是梅林"——真正的梅林不会这样暴露自己。
- 派西维尔可以假装有信息来诱导莫甘娜出错，但同样不能说破自己身份。
- 违反以上规则会导致游戏逻辑崩溃，请严格遵守。

## 发言风格要求
- 使用第一人称，像真人玩家一样自然说话。
- 自然融入以上黑话和战术术语（排水、倒钩、挡刀、暗跳等）。
- 发言长度控制在2~4句话，符合桌游讨论节奏。
- 根据局势表达怀疑、信任、分析或试探，避免机械回复。
- 可以质疑他人的发言，也可以支持你认为合理的观点。

现在，请基于以上所有设定，做出符合你角色和阵营利益的决定。
回复必须包含一个JSON代码块(\`\`\`json)，其中包含：
- reasoning: 你的内心思考过程(1-3句话，这部分不会被其他玩家看到)
- decision: 你的决定（具体格式见每次提示）`;
}

async function aiDecide(playerIdx, decisionType, context) {
    const p = state.players[playerIdx];
    const sysPrompt = buildSystemPrompt(playerIdx);

    let userMsg = '';
    const questSizes = QUEST_SIZES;
    const roundInfo = `现在是第${state.round+1}轮任务。当前队长：玩家${state.currentLeader+1}(${state.players[state.currentLeader].name})。需要${questSizes[state.round]}名队员。已否决${state.voteTrack}次。`;
    const history = buildGameHistory();

    switch (decisionType) {
        case 'pick_team':
            const pickCount = questSizes[state.round] - 1;
            userMsg = `${roundInfo}\n${history}\n你是队长（你已在队伍中），请从其他5名玩家中选择${pickCount}人加入队伍。\n考虑因素：排水结果、发言可信度、投票历史。如果有可疑玩家，可以"抬车"拉进来测试。\n请回复JSON：{"reasoning":"你的选人思路", "decision":{"team":[1,3]}} (数组中是玩家编号0-5，不要包含自己，刚好${pickCount}人)`;
            break;
        case 'vote_team':
            const teamNames = state.currentTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、');
            userMsg = `${roundInfo}\n${history}\n讨论已结束，现在是投票时间。\n队长提议的队员：${teamNames}。\n请根据讨论内容和你自己的判断投票。考虑：这个队伍里有没有你怀疑的人？队长的选人逻辑是否合理？\n请回复JSON：{"reasoning":"你的投票理由", "decision":{"vote":"approve"}} 或 {"decision":{"vote":"reject"}}`;
            break;
        case 'quest':
            userMsg = `${roundInfo}\n${history}\n你是本次任务的队员。请决定投成功还是失败。\n [注意] 好人必须投成功，没有选择。坏人可以选择投成功（隐藏身份打"倒钩"）或投失败（破坏任务）。\n请回复JSON：{"reasoning":"你的选择理由", "decision":{"quest":"success"}} 或 {"decision":{"quest":"fail"}}`;
            break;
        case 'assassinate':
            const goodPlayers = state.players.filter(pl => ROLE_TEAM[pl.role] === 'good');
            const goodList = goodPlayers.map(pl => `玩家${pl.idx+1}(${pl.name})`).join('、');
            userMsg = `好人成功完成了3个任务！现在进入刺杀阶段。\n你是刺客，必须从好人中选出一名玩家刺杀。如果刺中梅林，坏人翻盘获胜！\n可选目标：${goodList}\n\n${history}\n\n分析要点：谁在发言中隐晦地引导避开坏人？谁的投票总是恰好反对含坏人的队伍？谁表现得太低调不像忠臣？派西维尔可能在保护谁？\n请选择你认为最可能是梅林的玩家。\n回复JSON：{"reasoning":"为什么你认为他是梅林", "decision":{"target":2}} (目标玩家的编号)`;
            break;
        case 'speak':
            const speechType = context.speechType || 'normal';
            const prevSpeeches = context.previousSpeeches || [];
            let speechPrompt = `${roundInfo}\n${history}\n`;
            speechPrompt += `当前队伍：${state.currentTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、')}。\n\n`;
            if (speechType === 'opening') {
                speechPrompt += `你是队长，请开场发言。说明你选择这个队伍的理由，可以说说你为什么信任/不信任某些人。使用"排水"、"试错"等术语自然表达。\n`;
            } else if (speechType === 'summary') {
                speechPrompt += `你是队长，请做总结发言。综合所有人的发言后，最后陈述为什么大家应该赞成（或反对）这个队伍。可以回应对你的质疑。\n`;
            } else {
                speechPrompt += `现在轮到你发言。请对当前队伍发表看法，可以表态赞成或反对，可以质疑或支持前面发言的人。用"倒钩"、"抬车"等术语分析局势。\n`;
            }
            if (prevSpeeches.length > 0) {
                speechPrompt += `\n前面的人已经发言：\n`;
                prevSpeeches.forEach(s => {
                    const sp = state.players[s.playerIdx];
                    speechPrompt += `- 玩家${sp.idx+1}(${sp.name})${s.type==='opening'?'【队长开场】':s.type==='summary'?'【队长总结】':''}: "${s.content}"\n`;
                });
                speechPrompt += `\n请针对前面的发言进行回应（同意/反对/补充/质疑）。`;
            }
            speechPrompt += `\n\n 再次提醒：发言中绝不能暴露你的真实角色身份。用推理、感觉和观察来表达，不要说"我知道"或暗示自己有特殊信息。`;
            speechPrompt += `\n回复JSON：{"reasoning":"你的内心思考(1-3句，不会被别人看到，可以写真实想法)", "decision":{"speech":"你的公开发言(2-4句话，符合桌游讨论风格)"}}`;
            userMsg = speechPrompt;
            break;
        case 'discuss':
            userMsg = `${roundInfo}\n${history}\n请发表你的看法(1-2句话)。回复JSON：{"reasoning":"...", "decision":{"speech":"你的发言内容"}}`;
            break;
    }

    try {
        const raw = await callDeepseek(sysPrompt, userMsg);
        const parsed = parseAIResponse(raw);
        addLog(`${p.name} 思考完毕`, '');
        return { ...parsed, _raw: raw };
    } catch (e) {
        console.error(`AI ${p.name} error:`, e);
        addLog(`${p.name} API调用失败，使用默认策略`, 'evil');
        return { reasoning: 'API调用失败，采用默认策略', decision: getFallbackDecision(playerIdx, decisionType, context), _fallback: true };
    }
}

function buildGameHistory() {
    let h = '已完成的回合：\n';
    for (let r = 0; r < state.round; r++) {
        if (state.questResults[r] !== null) {
            h += `第${r+1}轮：[${state.questResults[r] ? '成功' : '失败'}] (队员: ${(state.questTeams[r]||[]).map(i=>`玩家${i+1}(${state.players[i].name})`).join('、')})\n`;
        }
    }
    if (state.speechLog && state.speechLog.length > 0) {
        const recentSpeeches = state.speechLog.filter(s => s.round === state.round - 1 || s.round === state.round);
        if (recentSpeeches.length > 0) {
            h += '\n最近的发言记录：\n';
            recentSpeeches.forEach(s => {
                const sp = state.players[s.playerIdx];
                const typeLabel = s.type === 'opening' ? '(队长开场)' : s.type === 'summary' ? '(队长总结)' : '';
                h += `  玩家${sp.idx+1}(${sp.name})${typeLabel}: "${s.content}"\n`;
            });
        }
    }
    if (state.voteHistory && state.voteHistory.length > 0) {
        h += '\n投票记录：\n';
        const recent = state.voteHistory.slice(-5);
        recent.forEach(v => {
            const vLeader = state.players[v.leader];
            h += `玩家${vLeader.idx+1}(${vLeader.name})提议 [${v.team.map(i=>`玩家${i+1}(${state.players[i].name})`).join('、')}] → `;
            h += `赞成${v.approves}票 反对${v.rejects}票 → ${v.approved ? '通过' : '否决'}\n`;
        });
    }
    return h;
}

function getFallbackDecision(playerIdx, decisionType, context) {
    const p = state.players[playerIdx];
    switch (decisionType) {
        case 'pick_team': {
            const others = state.players.map((_, i) => i).filter(i => i !== playerIdx);
            return { team: shuffle(others).slice(0, QUEST_SIZES[state.round] - 1) };
        }
        case 'vote_team': {
            if (ROLE_TEAM[p.role] === 'evil') {
                const teamHasEvil = state.currentTeam.some(i => ROLE_TEAM[state.players[i].role] === 'evil');
                return { vote: teamHasEvil ? 'approve' : (Math.random() > 0.5 ? 'approve' : 'reject') };
            }
            return { vote: state.voteTrack < 3 ? 'approve' : (Math.random() > 0.5 ? 'approve' : 'reject') };
        }
        case 'quest': {
            if (ROLE_TEAM[p.role] === 'good') return { quest: 'success' };
            const evilOnTeam = state.currentTeam.filter(i => ROLE_TEAM[state.players[i].role] === 'evil');
            if (evilOnTeam.length > 1) {
                return { quest: evilOnTeam[0] === playerIdx ? 'fail' : 'success' };
            }
            const failCount = (state.questResults.filter(r => r === false).length);
            return { quest: failCount < 2 ? 'fail' : (Math.random() > 0.5 ? 'fail' : 'success') };
        }
        case 'assassinate': {
            const goods = state.players.filter(pl => ROLE_TEAM[pl.role] === 'good');
            return { target: goods[randInt(goods.length)].idx };
        }
        case 'speak': {
            const isGood = ROLE_TEAM[p.role] === 'good';
            const st = (context && context.speechType) || 'normal';
            if (st === 'opening') return { speech: '我认为这个队伍是当前最佳选择，希望得到大家的支持。' };
            if (st === 'summary') return { speech: '综合大家的意见，这个队伍值得一试，请大家投赞成票。' };
            return { speech: isGood ? '暂时没有特别的怀疑对象，继续观察。' : '我觉得应该更加谨慎，有些情况不太对劲。' };
        }
        case 'discuss':
            return { speech: ROLE_TEAM[p.role] === 'good' ? '暂时没有发现，继续观察。' : '需要更加小心。' };
    }
}

// ═══════════════ GAME LOGIC ═══════════════
function initGameState(humanSeat, humanName) {
    const players = [];
    for (let i = 0; i < 6; i++) {
        const isHuman = (i === humanSeat);
        players.push({
            idx: i,
            name: isHuman ? (humanName || '你') : `玩家${i+1}`,
            role: null,
            isHuman,
            seatNum: i + 1
        });
    }
    // Assign roles
    const shuffledRoles = shuffle(ROLES);
    players.forEach((p, i) => { p.role = shuffledRoles[i]; });

    return {
        players,
        round: 0,
        questResults: [null, null, null, null, null],
        questTeams: [null, null, null, null, null],
        voteTrack: 0,
        currentLeader: randInt(6),
        currentTeam: [],
        voteHistory: [],
        speechLog: [],
        roundLeaders: [],
        currentSpeaker: null,
        phase: 'night',
        goodWins: 0,
        evilWins: 0,
        started: false
    };
}

function getGoodEvilCounts() {
    const goods = state.questResults.filter(r => r === true).length;
    const evils = state.questResults.filter(r => r === false).length;
    return { goods, evils };
}

function checkGameEnd() {
    const { goods, evils } = getGoodEvilCounts();
    if (evils >= 3) return 'evil_quests';
    if (goods >= 3) return 'assassination';
    return null;
}

// ═══════════════ ROLE VISIBILITY (human perspective) ═══════════════
function getVisibleRoleTag(playerIdx) {
    const p = state.players[playerIdx];
    const humanPlayer = state.players.find(pl => pl.isHuman);
    if (!humanPlayer) return '';
    if (state.phase === 'game_over') {
        const cls = ROLE_TEAM[p.role] === 'good' ? 'role-good' : 'role-evil';
        return `<span class="player-role-tag ${cls}">${ROLE_ICONS[p.role]} ${ROLE_NAMES[p.role]}</span>`;
    }
    // Show human's own role
    if (p.isHuman) {
        const cls = ROLE_TEAM[p.role] === 'good' ? 'role-good' : 'role-evil';
        return `<span class="player-role-tag ${cls}">${ROLE_ICONS[p.role]} ${ROLE_NAMES[p.role]}</span>`;
    }
    // Show knowledge based on human's role
    const hRole = humanPlayer.role;
    if (hRole === 'merlin') {
        if (ROLE_TEAM[p.role] === 'evil') {
            return `<span class="player-role-tag role-evil">坏人</span>`;
        }
    }
    if (hRole === 'percival') {
        if (p.role === 'merlin' || p.role === 'morgana') {
            return `<span class="player-role-tag role-good">梅林/莫甘娜</span>`;
        }
    }
    if (hRole === 'morgana' || hRole === 'assassin') {
        const evils = state.players.filter(pl => ROLE_TEAM[pl.role] === 'evil');
        if (evils.find(e => e.idx === playerIdx) && playerIdx !== humanPlayer.idx) {
            return `<span class="player-role-tag role-evil">队友</span>`;
        }
    }
    return `<span class="role-unknown">---</span>`;
}

function getVisibleKnowledge(playerIdx) {
    const p = state.players[playerIdx];
    const humanPlayer = state.players.find(pl => pl.isHuman);
    if (!humanPlayer || state.phase === 'game_over') return '';
    if (p.isHuman) {
        const knowledge = buildPlayerKnowledge(playerIdx);
        if (knowledge) return knowledge.replace(/你是/g, '').replace(/，/g, '，<br>').replace(/。/g, '。<br>');
    }
    return '';
}

// ═══════════════ UI RENDERING ═══════════════
function renderQuestTracker() {
    const container = document.getElementById('questTracker');
    let html = '';
    for (let i = 0; i < 5; i++) {
        const size = QUEST_SIZES[i];
        let cls = 'quest-circle';
        let icon = size;
        if (state.questResults[i] === true) { cls += ' done-good'; icon = 'V'; }
        else if (state.questResults[i] === false) { cls += ' done-evil'; icon = 'X'; }
        else if (i === state.round && state.phase !== 'night') { cls += ' current'; }
        html += `<div class="quest-item"><div class="${cls}">${icon}</div><span class="quest-label">Q${i+1}·${size}人</span></div>`;
    }
    container.innerHTML = html;
}

function renderPlayerCards() {
    const leftCol = document.getElementById('leftColumn');
    const rightCol = document.getElementById('rightColumn');

    function cardHTML(i) {
        const p = state.players[i];
        let cardClass = 'player-card';
        if (i === state.currentLeader && state.phase !== 'night' && state.phase !== 'game_over') cardClass += ' leader';
        if (p.isHuman) cardClass += ' human';
        if (state.currentTeam.includes(i) && (state.phase === 'quest_exec' || state.phase === 'voting' || state.phase === 'team_pick' || state.phase === 'speech')) cardClass += ' on-quest';
        if (state.aiThinking && state.aiThinking.includes(i)) cardClass += ' thinking';
        if (state.currentSpeaker === i) cardClass += ' speaking';

        const visibleRole = getVisibleRoleTag(i);
        const knowledge = getVisibleKnowledge(i);
        const isLeader = i === state.currentLeader && state.phase !== 'night' && state.phase !== 'game_over';

        return `<div class="${cardClass}" id="player-card-${i}">
            ${isLeader ? `<div class="crown-badge"><i class="fas fa-crown"></i></div>` : ''}
            ${state.currentTeam.includes(i) && state.phase === 'quest_exec' ? `<div class="quest-badge"><i class="fas fa-shield-alt"></i></div>` : ''}
            ${state.lastVoteResults && state.lastVoteResults[i] !== undefined ? `<div class="vote-badge" style="color:${state.lastVoteResults[i]==='approve'?'#4caf50':'#c0392b'}"><i class="fas fa-${state.lastVoteResults[i]==='approve'?'check':'times'}-circle"></i></div>` : ''}
            <div class="player-seat-num">${SEAT_NAMES_SHORT[i]}</div>
            <div class="player-name">${p.name}</div>
            ${visibleRole}
            ${knowledge ? `<div class="player-knowledge">${knowledge}</div>` : ''}
        </div>`;
    }

    leftCol.innerHTML = cardHTML(0) + cardHTML(1) + cardHTML(2);
    rightCol.innerHTML = cardHTML(3) + cardHTML(4) + cardHTML(5);
}

function updateCenterPanel(html) {
    const panel = document.getElementById('centerPanel');
    if (panel) panel.innerHTML = html;
}

function renderVoteTrack() {
    const container = document.getElementById('voteTrack');
    let html = '<span class="vote-track-label">否决:</span>';
    for (let i = 0; i < 5; i++) {
        const cls = i < state.voteTrack ? 'vote-slot rejected' : 'vote-slot';
        html += `<div class="${cls}">${i < state.voteTrack ? '' : i+1}</div>`;
    }
    container.innerHTML = html;
}

function renderAll() {
    renderQuestTracker();
    renderPlayerCards();
    renderVoteTrack();
}

// ═══════════════ HUMAN DECISION ═══════════════
function waitForHumanDecision() {
    return new Promise(resolve => { waitingForHuman = resolve; });
}

function humanDecide(decision) {
    if (waitingForHuman) {
        const resolve = waitingForHuman;
        waitingForHuman = null;
        resolve(decision);
    }
}

// ═══════════════ OVERLAY ═══════════════
function showOverlay(html) {
    const container = document.getElementById('overlayContainer');
    container.innerHTML = `<div class="overlay">${html}</div>`;
}
function hideOverlay() {
    document.getElementById('overlayContainer').innerHTML = '';
}

// ═══════════════ GAME FLOW (Night, Speech, Vote, Quest, Assassination) ═══════════════
async function runNightPhase() {
    state.phase = 'night';
    renderAll();
    updateCenterPanel(`<div class="center-title">夜色降临</div><div class="center-info">正在分配身份...</div>`);
    addLog('[开始] 游戏开始，进入夜晚阶段', 'gold');

    await sleep(1500);

    // Evil mutual recognition
    const evils = state.players.filter(p => ROLE_TEAM[p.role] === 'evil');
    addLog('[坏人] 互相确认身份', 'evil');
    for (const ep of evils) {
        if (ep.isHuman) {
            const teammate = evils.find(e => e.idx !== ep.idx);
            showOverlay(`
                <div class="overlay-card">
                    <div class="icon-huge">[坏人]</div>
                    <h2>你是 ${ROLE_NAMES[ep.role]}</h2>
                    <p class="role-name evil-role">${ROLE_ICONS[ep.role]} ${ROLE_NAMES[ep.role]}</p>
                    <p class="knowledge-text">你的队友是 <strong>玩家${teammate.idx+1}(${teammate.name})</strong></p>
                    <p style="color:#e57373;font-size:0.85rem;">你们的目标：破坏任务，或刺杀梅林</p>
                    <button class="btn-primary" onclick="hideOverlay();window._nightResolve&&window._nightResolve()">我知道了</button>
                </div>`);
            await new Promise(r => { window._nightResolve = r; });
            hideOverlay();
            window._nightResolve = null;
        }
    }
    await sleep(800);

    // Merlin sees evils
    const merlin = state.players.find(p => p.role === 'merlin');
    if (merlin && merlin.isHuman) {
        addLog('梅林查看坏人', 'gold');
        showOverlay(`
            <div class="overlay-card">
                <div class="icon-huge">[梅林]</div>
                <h2>你是梅林</h2>
                <p class="knowledge-text">坏人是：<strong>${evils.map(e => `玩家${e.idx+1}(${e.name})`).join(' 和 ')}</strong></p>
                <p style="color:#e57373;font-size:0.85rem;">隐藏好自己，不要被刺客发现！</p>
                <button class="btn-primary" onclick="hideOverlay();window._nightResolve&&window._nightResolve()">我明白了</button>
            </div>`);
        await new Promise(r => { window._nightResolve = r; });
        hideOverlay();
        window._nightResolve = null;
    }
    await sleep(800);

    // Percival
    const percival = state.players.find(p => p.role === 'percival');
    if (percival && percival.isHuman) {
        const mAndM = state.players.filter(p => p.role === 'merlin' || p.role === 'morgana');
        addLog('派西维尔查看梅林和莫甘娜', 'gold');
        showOverlay(`
            <div class="overlay-card">
                <div class="icon-huge">[派西维尔]</div>
                <h2>你是派西维尔</h2>
                <p class="knowledge-text"><strong>玩家${mAndM[0].idx+1}(${mAndM[0].name})</strong> 和 <strong>玩家${mAndM[1].idx+1}(${mAndM[1].name})</strong> 中，一个是真梅林，一个是莫甘娜。</p>
                <p style="color:#ff9800;font-size:0.85rem;">你无法分辨谁真谁假，需要自己判断！</p>
                <button class="btn-primary" onclick="hideOverlay();window._nightResolve&&window._nightResolve()">我明白了</button>
            </div>`);
        await new Promise(r => { window._nightResolve = r; });
        hideOverlay();
        window._nightResolve = null;
    }
    await sleep(600);

    // Servant
    const humanPlayer = state.players.find(p => p.isHuman);
    if (humanPlayer && humanPlayer.role === 'servant') {
        addLog(` ${humanPlayer.name} 是忠臣，没有特殊信息`, '');
        showOverlay(`
            <div class="overlay-card">
                <div class="icon-huge">[忠臣]</div>
                <h2>你是亚瑟的忠臣</h2>
                <p class="knowledge-text">你没有特殊信息。观察每个人的行为，找出坏人！</p>
                <button class="btn-primary" onclick="hideOverlay();window._nightResolve&&window._nightResolve()">出发！</button>
            </div>`);
        await new Promise(r => { window._nightResolve = r; });
        hideOverlay();
        window._nightResolve = null;
    }

    addLog('天亮，游戏正式开始', 'gold');
    state.phase = 'team_pick';
    updateCenterPanel(`<div class="center-title"> 天亮了</div><div class="center-info">准备开始第1轮任务</div>`);
    renderAll();
    await sleep(1000);
}

async function runLeaderPick() {
    const leader = state.players[state.currentLeader];
    state.phase = 'team_pick';
    state.currentTeam = [];
    renderAll();
    addLog(` Q${state.round+1} 队长: 玩家${leader.idx+1}(${leader.name})，需选${QUEST_SIZES[state.round]}人组队`, 'gold');
    updateCenterPanel(`
        <div class="center-title"><i class="fas fa-crown"></i> 队长选人</div>
        <div class="center-info">玩家${leader.idx+1}(${leader.name}) 正在挑选 ${QUEST_SIZES[state.round]} 名队员...</div>
        <div class="thinking-indicator"><div class="thinking-spinner"></div>思考中</div>`);

    if (leader.isHuman) {
        const candidates = state.players.map((p, i) => ({ idx: i, name: p.name })).filter(p => p.idx !== leader.idx);
        let selected = [];
        const maxPick = QUEST_SIZES[state.round] - 1;

        function renderTeamPicker() {
            let btns = '';
            candidates.forEach(c => {
                const active = selected.includes(c.idx) ? ' active' : '';
                btns += `<button class="btn-team-toggle${active}" data-idx="${c.idx}">玩家${c.idx+1}(${state.players[c.idx].name})</button>`;
            });
            updateCenterPanel(`
                <div class="center-title"><i class="fas fa-crown"></i> 队长选人</div>
                <div class="center-info">还需选择 ${maxPick} 名队友 (已选${selected.length}人)</div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0;">${btns}</div>
                <button class="btn-action btn-confirm" id="confirmTeamBtn" ${selected.length !== maxPick ? 'disabled' : ''}>确认队伍 (共${selected.length + 1}人)</button>
            `);
            document.querySelectorAll('.btn-team-toggle').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (selected.includes(idx)) {
                        selected = selected.filter(s => s !== idx);
                    } else if (selected.length < maxPick) {
                        selected.push(idx);
                    }
                    renderTeamPicker();
                };
            });
            const confirmBtn = document.getElementById('confirmTeamBtn');
            if (confirmBtn) {
                confirmBtn.onclick = () => {
                    state.currentTeam = [leader.idx, ...selected];
                    humanDecide({ team: state.currentTeam });
                };
            }
        }
        renderTeamPicker();
        await waitForHumanDecision();
        updateCenterPanel(`<div class="center-title">队伍已选定</div>`);
    } else {
        const result = await aiDecide(leader.idx, 'pick_team', {});
        const decision = result.decision || {};
        const team = decision.team || [];
        let finalTeam = [leader.idx];
        const validOthers = team.filter(t => t !== leader.idx && t >= 0 && t < 6 && !finalTeam.includes(t));
        while (finalTeam.length < QUEST_SIZES[state.round]) {
            const remaining = state.players.map((_, i) => i).filter(i => !finalTeam.includes(i));
            if (remaining.length === 0) break;
            const next = validOthers.length > 0 ? validOthers.shift() : remaining[randInt(remaining.length)];
            if (!finalTeam.includes(next)) finalTeam.push(next);
        }
        state.currentTeam = finalTeam.slice(0, QUEST_SIZES[state.round]);
        renderAll();
        updateCenterPanel(`
            <div class="center-title"><i class="fas fa-users"></i> 队伍已选定</div>
            <div class="center-info">${state.currentTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、')}</div>
            <div style="font-size:0.8rem;color:var(--text-dim);margin-top:6px;">${result.reasoning || ''}</div>`);
        await sleep(2000);
    }
    const teamStr = state.currentTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、');
    addLog(` 队长选定队员: ${teamStr}`, '');
}

async function runSpeechPhase() {
    state.phase = 'speech';
    const leader = state.players[state.currentLeader];
    const teamNames = state.currentTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、');
    addLog(` 发言阶段 — 队长${leader.name}组队: ${teamNames}`, 'gold');

    const speechOrder = [];
    speechOrder.push({ playerIdx: state.currentLeader, type: 'opening' });
    for (let i = 1; i < 6; i++) {
        speechOrder.push({ playerIdx: (state.currentLeader + i) % 6, type: 'normal' });
    }
    speechOrder.push({ playerIdx: state.currentLeader, type: 'summary' });

    const roundSpeeches = [];

    for (let si = 0; si < speechOrder.length; si++) {
        const { playerIdx, type } = speechOrder[si];
        const p = state.players[playerIdx];
        const typeLabel = type === 'opening' ? '队长开场' : type === 'summary' ? '队长总结' : '发言';

        state.currentSpeaker = playerIdx;
        renderAll();

        const previousSpeeches = [...roundSpeeches];

        if (p.isHuman) {
            let speechHistoryHTML = '';
            if (previousSpeeches.length > 0) {
                speechHistoryHTML = `<div class="speech-log-compact">${previousSpeeches.map(s => {
                    const sp = state.players[s.playerIdx];
                    const tl = s.type === 'opening' ? '(队长开场)' : '';
                    return `<div class="speech-bubble"><span class="speech-author">玩家${sp.idx+1}(${sp.name})${tl}</span><span class="speech-text">${s.content}</span></div>`;
                }).join('')}</div>`;
            }

            updateCenterPanel(`
                <div class="center-title"><i class="fas fa-comments"></i> 发言阶段</div>
                <div class="center-info">第${state.round+1}轮 · 队伍: ${teamNames}</div>
                ${speechHistoryHTML}
                <div class="speech-prompt">
                    <span style="color:var(--gold-light);font-size:1rem;"> 轮到你发言 (${typeLabel})</span>
                    <input type="text" class="speech-input" id="speechInput" placeholder="输入你的发言..." maxlength="200">
                    <button class="btn-action btn-confirm" onclick="submitSpeech()" style="margin-top:8px;">提交发言</button>
                </div>`);

            setTimeout(() => { const inp = document.getElementById('speechInput'); if (inp) inp.focus(); }, 100);

            window.submitSpeech = () => {
                const inp = document.getElementById('speechInput');
                const text = (inp && inp.value.trim()) || '我暂时没有想说的。';
                humanDecide({ speech: text });
            };

            const inpEl = document.getElementById('speechInput');
            if (inpEl) {
                inpEl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') window.submitSpeech && window.submitSpeech();
                });
            }

            const decision = await waitForHumanDecision();
            const speechContent = decision.speech;
            roundSpeeches.push({ playerIdx, type, content: speechContent });
            state.speechLog.push({ round: state.round, playerIdx, type, content: speechContent });
            addLog(` 玩家${p.idx+1}(${p.name})${typeLabel}: "${speechContent}"`, '');
            window.submitSpeech = null;
        } else {
            const prevList = previousSpeeches.map(s =>
                `玩家${s.playerIdx+1}(${state.players[s.playerIdx].name})${s.type==='opening'?'(队长开场)':''}: "${s.content}"`
            ).join('\n');

            updateCenterPanel(`
                <div class="center-title"><i class="fas fa-comments"></i> 发言阶段</div>
                <div class="center-info">第${state.round+1}轮 · 玩家${p.idx+1}(${p.name}) 正在发言 (${typeLabel})</div>
                <div class="thinking-indicator"><div class="thinking-spinner"></div>思考中...</div>
                ${prevList ? `<div style="font-size:0.8rem;color:var(--text-dim);margin-top:6px;max-height:140px;overflow-y:auto;text-align:left;line-height:1.6;">前面发言：<br>${prevList.replace(/\n/g,'<br>')}</div>` : ''}`);

            const result = await aiDecide(playerIdx, 'speak', { speechType: type, previousSpeeches });
            const decision = result.decision || {};
            const speechContent = decision.speech || (ROLE_TEAM[p.role] === 'good' ? '暂时没有怀疑对象，继续观察。' : '我觉得有些情况不太对劲。');

            roundSpeeches.push({ playerIdx, type, content: speechContent });
            state.speechLog.push({ round: state.round, playerIdx, type, content: speechContent });
            addLog(` 玩家${p.idx+1}(${p.name})${typeLabel}: "${speechContent}"`, '');

            let speechHistoryHTML = roundSpeeches.map(s => {
                const sp = state.players[s.playerIdx];
                const tl = s.type === 'opening' ? '(队长开场)' : s.type === 'summary' ? '(队长总结)' : '';
                return `<div class="speech-bubble"><span class="speech-author">玩家${sp.idx+1}(${sp.name})${tl}</span><span class="speech-text">${s.content}</span></div>`;
            }).join('');

            updateCenterPanel(`
                <div class="center-title"><i class="fas fa-comments"></i> 发言阶段</div>
                <div class="center-info">第${state.round+1}轮 · 玩家${p.idx+1}(${p.name}) (${typeLabel})</div>
                <div class="speech-log-compact">${speechHistoryHTML}</div>`);
            await sleep(si < speechOrder.length - 1 ? 2000 : 1500);
        }
        state.currentSpeaker = null;
    }

    state.currentSpeaker = null;
    addLog('发言阶段结束，进入投票', 'gold');
    renderAll();
}

async function runTeamVote() {
    state.phase = 'voting';
    state.lastVoteResults = null;
    renderAll();
    const teamNames = state.currentTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、');
    addLog('全体玩家同时投票', 'gold');

    // Show all AI players as "thinking"
    state.aiThinking = state.players.filter(p => !p.isHuman).map(p => p.idx);
    renderAll();

    const humanPlayer = state.players.find(p => p.isHuman);

    // Launch all AI vote calls in parallel
    const aiVotePromises = state.players
        .filter(p => !p.isHuman)
        .map(async (p) => {
            const result = await aiDecide(p.idx, 'vote_team', {});
            const decision = result.decision || {};
            const vote = decision.vote || (Math.random() > 0.5 ? 'approve' : 'reject');
            return { playerIdx: p.idx, vote };
        });

    // Show human vote UI
    updateCenterPanel(`
        <div class="center-title"><i class="fas fa-vote-yea"></i> 全体同时投票</div>
        <div class="center-info">队员：${teamNames}</div>
        <div class="center-info" style="font-size:0.85rem;color:var(--text-dim);">所有玩家同时秘密投票，揭晓后不可更改</div>
        <div style="display:flex;gap:20px;margin-top:12px;">
            <button class="btn-action btn-approve" onclick="humanDecide({vote:'approve'})"><i class="fas fa-check"></i> 赞成</button>
            <button class="btn-action btn-reject" onclick="humanDecide({vote:'reject'})"><i class="fas fa-times"></i> 反对</button>
        </div>
        <div class="thinking-indicator"><div class="thinking-spinner"></div>等待所有AI投票...</div>`);

    // Wait for human vote and all AI votes concurrently
    const humanVotePromise = waitForHumanDecision().then(d => ({ playerIdx: humanPlayer.idx, vote: d.vote }));
    const allVotePromises = [humanVotePromise, ...aiVotePromises];
    const votes = await Promise.all(allVotePromises);

    // All votes collected — clear thinking
    state.aiThinking = null;
    updateCenterPanel(`
        <div class="center-title"><i class="fas fa-vote-yea"></i> 投票结束</div>
        <div class="center-info">所有人已投票，即将揭晓...</div>`);
    await sleep(600);

    // Reveal all votes simultaneously
    state.lastVoteResults = {};
    votes.forEach(v => { state.lastVoteResults[v.playerIdx] = v.vote; });
    renderAll();

    const approves = votes.filter(v => v.vote === 'approve').length;
    const rejects = votes.filter(v => v.vote === 'reject').length;
    const approved = approves > rejects;

    // Build vote reveal display
    const votesDisplay = votes.map(v => {
        const vp = state.players[v.playerIdx];
        const icon = v.vote === 'approve' ? '[赞成]' : '[反对]';
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:0.95rem;border-bottom:1px solid rgba(0,0,0,0.06);">
            <span>玩家${vp.idx+1}(${vp.name})</span>
            <span style="color:${v.vote==='approve'?'var(--good)':'var(--evil)'}">${icon}</span>
        </div>`;
    }).join('');

    updateCenterPanel(`
        <div class="center-title"><i class="fas fa-vote-yea"></i> 投票结果</div>
        <div style="width:100%;text-align:left;margin:8px 0;">${votesDisplay}</div>
        <div class="center-highlight">${approved ? '通过' : '否决'} (赞成${approves} 反对${rejects})</div>`);
    await sleep(2000);

    // Log detailed results
    const voteDetails = votes.map(v => {
        const vp = state.players[v.playerIdx];
        return `玩家${vp.idx+1}(${vp.name}): ${v.vote === 'approve' ? '赞成' : '反对'}`;
    }).join(', ');
    addLog(` 投票: ${voteDetails}`, '');
    addLog(` 结果：赞成${approves}票 反对${rejects}票 → ${approved ? '通过' : '否决'}`, approved ? 'good' : 'evil');

    state.voteHistory.push({
        leader: state.currentLeader,
        team: [...state.currentTeam],
        approves,
        rejects,
        approved
    });

    if (approved) {
        state.voteTrack = 0;
    } else {
        state.voteTrack++;
        state.currentLeader = (state.currentLeader + 1) % 6;
        if (state.voteTrack >= 5) {
            addLog('连续5次否决！坏人直接获胜！', 'evil');
            return 'evil_veto';
        }
    }

    state.lastVoteResults = null;
    renderAll();
    await sleep(800);
    return approved ? 'approved' : 'rejected';
}

async function runQuest() {
    state.phase = 'quest_exec';
    renderAll();
    addLog('队员执行任务', 'gold');
    updateCenterPanel(`
        <div class="center-title"><i class="fas fa-shield-alt"></i> 执行任务</div>
        <div class="center-info">队员秘密投票中...</div>
        <div class="thinking-indicator"><div class="thinking-spinner"></div>等待中</div>`);

    const questVotes = [];

    for (const idx of state.currentTeam) {
        const p = state.players[idx];
        let qvote;
        if (p.isHuman) {
            const isGood = ROLE_TEAM[p.role] === 'good';
            if (isGood) {
                updateCenterPanel(`
                    <div class="center-title"> 任务执行</div>
                    <div class="center-info">你是好人，<strong>必须投成功</strong></div>
                    <button class="btn-action btn-approve" onclick="humanDecide({quest:'success'})" style="margin-top:10px;">投成功</button>`);
            } else {
                updateCenterPanel(`
                    <div class="center-title"> 任务执行</div>
                    <div class="center-info">你是坏人，可以选择成功或失败</div>
                    <div style="display:flex;gap:20px;margin-top:10px;">
                        <button class="btn-action btn-approve" onclick="humanDecide({quest:'success'})">成功</button>
                        <button class="btn-action btn-reject" onclick="humanDecide({quest:'fail'})">失败</button>
                    </div>`);
            }
            const decision = await waitForHumanDecision();
            qvote = decision.quest;
        } else {
            const result = await aiDecide(idx, 'quest', {});
            const decision = result.decision || {};
            qvote = decision.quest || (ROLE_TEAM[p.role] === 'good' ? 'success' : 'fail');
        }
        questVotes.push({ playerIdx: idx, vote: qvote });
    }

    const failCount = questVotes.filter(v => v.vote === 'fail').length;
    const questSuccess = failCount === 0;

    state.questResults[state.round] = questSuccess;
    state.questTeams[state.round] = [...state.currentTeam];

    const resultIcon = questSuccess ? '' : '';
    const resultText = questSuccess ? '任务成功！' : '任务失败！';
    const resultCls = questSuccess ? 'good' : 'evil';
    const teamStr = state.currentTeam.map(i => `玩家${i+1}(${state.players[i].name})`).join('、');

    addLog(`${resultIcon} Q${state.round+1} ${resultText} | 队员: ${teamStr} | 失败票: ${failCount}/${state.currentTeam.length}`, resultCls);
    updateCenterPanel(`
        <div class="center-title">${resultIcon} ${resultText}</div>
        <div class="center-info">队员: ${teamStr}<br>失败票数：${failCount} / ${state.currentTeam.length}</div>`);
    renderAll();
    await sleep(2500);

    return questSuccess ? 'success' : 'fail';
}

async function runAssassination() {
    state.phase = 'assassination';
    renderAll();
    addLog('好人完成3个任务！进入刺杀阶段', 'gold');
    addLog('坏人讨论：谁是真梅林？', 'evil');

    const assassin = state.players.find(p => p.role === 'assassin');
    const goodPlayers = state.players.filter(p => ROLE_TEAM[p.role] === 'good');

    updateCenterPanel(`
        <div class="center-title"><i class="fas fa-skull"></i> 刺杀阶段</div>
        <div class="center-info">刺客正在寻找梅林...</div>
        <div class="thinking-indicator"><div class="thinking-spinner"></div>思考中</div>`);

    let target;
    if (assassin.isHuman) {
        showOverlay(`
            <div class="overlay-card">
                <div class="icon-huge">[刺客]</div>
                <h2>你是刺客！</h2>
                <p>选择一名好人玩家刺杀：</p>
                <div class="assassin-targets" id="assassinTargets">
                    ${goodPlayers.map(gp => `
                        <button class="target-btn" data-idx="${gp.idx}">玩家${gp.idx+1}(${gp.name})</button>
                    `).join('')}
                </div>
                <p style="color:#e57373;font-size:0.85rem;">如果刺中梅林，坏人翻盘获胜！</p>
            </div>`);
        document.querySelectorAll('.target-btn').forEach(btn => {
            btn.onclick = () => { hideOverlay(); humanDecide({ target: parseInt(btn.dataset.idx) }); };
        });
        const decision = await waitForHumanDecision();
        target = decision.target;
    } else {
        const result = await aiDecide(assassin.idx, 'assassinate', {});
        const decision = result.decision || {};
        target = decision.target !== undefined ? decision.target : goodPlayers[randInt(goodPlayers.length)].idx;
    }

    const targetPlayer = state.players[target];
    const isMerlin = targetPlayer.role === 'merlin';

    addLog(` 刺客${assassin.name}选择刺杀 玩家${target+1}(${targetPlayer.name})`, isMerlin ? 'evil' : 'good');
    await sleep(1000);

    if (isMerlin) {
        addLog('刺中了梅林！坏人翻盘获胜！', 'evil');
    } else {
        addLog('刺杀失败！好人获得最终胜利！', 'good');
    }
    await sleep(1000);

    state.phase = 'game_over';
    state.evilWins = isMerlin ? state.evilWins + 1 : state.evilWins;
    state.goodWins = isMerlin ? state.goodWins : state.goodWins + 1;

    showGameOver(isMerlin ? 'evil' : 'good', isMerlin ? 'assassin' : 'wrong_target');
}

function showGameOver(winner, reason) {
    const goodWin = winner === 'good';
    const bannerCls = goodWin ? 'good-win' : 'evil-win';
    const bannerText = goodWin ? ' 好人胜利！' : ' 坏人胜利！';
    const reasonText = reason === 'evil_quests' ? '坏人完成3个失败任务' :
                       reason === 'evil_veto' ? '连续5次否决' :
                       reason === 'assassin' ? '刺客成功刺杀梅林' :
                       reason === 'wrong_target' ? '刺客刺杀失败' : '';

    let roleHTML = '';
    state.players.forEach(p => {
        const team = ROLE_TEAM[p.role] === 'good' ? 'good-player' : 'evil-player';
        roleHTML += `<div class="role-reveal-item ${team}">
            <span style="font-size:1.2rem;">${ROLE_ICONS[p.role]}</span>
            <div><div class="rr-name">玩家${p.idx+1}(${p.name}) ${p.isHuman ? '(你)' : ''}</div><div class="rr-role">${ROLE_NAMES[p.role]}</div></div>
        </div>`;
    });

    showOverlay(`
        <div class="overlay-card">
            <div class="game-over-banner ${bannerCls}">${bannerText}</div>
            <p style="color:var(--text-dim);margin-bottom:16px;">${reasonText}</p>
            <div class="role-reveal-grid">${roleHTML}</div>
            <button class="btn-primary" onclick="hideOverlay();resetGame()">再来一局</button>
        </div>`);
}

function resetGame() {
    hideOverlay();
    state = null;
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('gameLog').innerHTML = '';
}

// ═══════════════ MAIN GAME LOOP ═══════════════
async function startGame() {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const playerName = document.getElementById('playerNameInput').value.trim() || '你';
    const selectedSeat = parseInt(document.querySelector('.seat-btn.selected')?.dataset?.seat);

    if (!apiKey.startsWith('sk-')) {
        alert('请先输入有效的 DeepSeek API Key（以 sk- 开头）');
        return;
    }
    if (isNaN(selectedSeat)) {
        alert('请选择座位');
        return;
    }

    localStorage.setItem("deepseek_api_key", apiKey);

    state = initGameState(selectedSeat, playerName);

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('gameLog').innerHTML = '';

    addLog('阿瓦隆 6人局 开始', 'gold');
    addLog(` 你选择座位 ${selectedSeat+1}，角色待揭晓...`, '');

    await runNightPhase();

    while (state.round < 5) {
        const gameEnd = checkGameEnd();
        if (gameEnd === 'evil_quests') {
            state.phase = 'game_over';
            state.evilWins++;
            addLog('坏人完成3个失败任务，坏人获胜！', 'evil');
            showGameOver('evil', 'evil_quests');
            return;
        }

        state.voteTrack = 0;
        state.currentTeam = [];
        state.lastVoteResults = null;
        renderAll();

        let teamApproved = false;
        while (!teamApproved) {
            await runLeaderPick();
            await runSpeechPhase();
            const voteResult = await runTeamVote();
            if (voteResult === 'evil_veto') {
                state.phase = 'game_over';
                state.evilWins++;
                showGameOver('evil', 'evil_veto');
                return;
            }
            if (voteResult === 'approved') {
                teamApproved = true;
            } else {
                addLog(` 队伍被否决（${state.voteTrack}/5），队长轮换`, '');
                updateCenterPanel(`
                    <div class="center-title"><i class="fas fa-redo"></i> 队伍被否决</div>
                    <div class="center-info">第${state.voteTrack}次否决，队长传给玩家${state.currentLeader+1}(${state.players[state.currentLeader].name})</div>`);
                await sleep(1500);
            }
        }

        await runQuest();

        const endCheck = checkGameEnd();
        if (endCheck === 'evil_quests') {
            state.phase = 'game_over';
            state.evilWins++;
            addLog('坏人完成3个失败任务，坏人获胜！', 'evil');
            showGameOver('evil', 'evil_quests');
            return;
        }
        if (endCheck === 'assassination') {
            await runAssassination();
            return;
        }

        state.roundLeaders.push(state.currentLeader); // record leader for completed round
        state.round++;
        state.currentLeader = (state.currentLeader + 1) % 6;
        if (state.round < 5) {
            addLog(` 进入第${state.round+1}轮任务`, 'gold');
            updateCenterPanel(`<div class="center-title"> 第${state.round+1}轮</div><div class="center-info">队长: 玩家${state.currentLeader+1}(${state.players[state.currentLeader].name})</div>`);
            await sleep(1500);
        }
    }

    const { goods, evils } = getGoodEvilCounts();
    if (evils >= 3) {
        state.phase = 'game_over';
        state.evilWins++;
        addLog('坏人完成3个失败任务，坏人获胜！', 'evil');
        showGameOver('evil', 'evil_quests');
    } else if (goods >= 3) {
        await runAssassination();
    }
}

// ═══════════════ INIT ═══════════════
function init() {
    const savedKey = getKey();
    if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
    }

    document.querySelectorAll('.seat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.seat-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateStartButton();
        });
    });

    document.getElementById('apiKeyInput').addEventListener('input', updateStartButton);
    document.getElementById('playerNameInput').addEventListener('input', updateStartButton);

    document.getElementById('startBtn').addEventListener('click', startGame);

    function updateStartButton() {
        const hasKey = document.getElementById('apiKeyInput').value.trim().startsWith('sk-');
        const hasSeat = !!document.querySelector('.seat-btn.selected');
        document.getElementById('startBtn').disabled = !(hasKey && hasSeat);
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
