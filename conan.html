            color: var(--gold-accent); font-size: 14px; margin-left: 15px;

        // ----- 全局状态 -----
        let currentCase = casesDatabase[0];

        let isTheaterRunning = false;

        let chatHistory = [];
        let lastSpeakerId = "";
        let unlockedClues = new Set();

        const apiKeyInput = document.getElementById('api-key');
        const caseSelector = document.getElementById('case-selector');
        const phaseDisplay = document.getElementById('phase-display');

        // 辅助函数
        function appendDialogue(roleName, roleId, colorClass, text, isUser = false) {
            const row = document.createElement('div');
            row.className = `dialogue-row ${isUser ? 'is-user' : ''}`;
            const icon = roleIcons[roleId] || "👤";
            row.innerHTML = `<div class="role-badge ${colorClass}">${icon} ${roleName}</div><div class="chat-bubble">${text}</div>`;
            stage.appendChild(row);
            stage.scrollTop = stage.scrollHeight;
            return row;
        }

        function showSystemToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'sys-toast';
            toast.innerText = `[ 系统 · ${msg} ]`;
            stage.appendChild(toast);
            stage.scrollTop = stage.scrollHeight;
        }

        // 更新阶段UI
        function updatePhaseUI() {
            const phase = currentCase.phases[currentPhaseIndex];
            phaseDisplay.innerHTML = `📌 ${phase.name} <span class="progress-tag">${currentPhaseIndex+1}/${currentCase.phases.length}</span>`;
        }

        // 检查用户输入是否触发新线索 (简化：基于关键词)
        function checkPhaseProgression(userText) {
            if (currentPhaseIndex >= currentCase.phases.length - 1) return false;
            const nextPhase = currentCase.phases[currentPhaseIndex + 1];
            const triggers = nextPhase.triggerClues;
            const lower = userText.toLowerCase();
            const matched = triggers.some(t => lower.includes(t.toLowerCase()));
            if (matched) {
                currentPhaseIndex++;
                updatePhaseUI();
                // 注入阶段性背景
                const phaseDesc = nextPhase.description;
                chatHistory.push({ role: "system", content: `【阶段推进】${phaseDesc}` });
                showSystemToast(`🔓 新阶段解锁：${nextPhase.name} —— ${phaseDesc}`);
                // 自动追加一条目暮警官的现场更新
                setTimeout(() => {
                    appendDialogue("目暮十三", "megure", "c-megure", `警视厅报告：${phaseDesc} 请各位侦探注意新线索。`);
                    chatHistory.push({ role: "assistant", content: `目暮警官通报：${phaseDesc}` });
                }, 500);
                return true;
            }
            return false;
        }

        // AI调用
        async function fetchDetectiveThought(character, history) {
            const key = apiKeyInput.value.trim();
            if(!key) throw new Error("API Key Missing");
            const phase = currentCase.phases[currentPhaseIndex];
            const sysPrompt = `${character.prompt}
【当前案件】${currentCase.title} 【阶段】${phase.name}
【背景】${currentCase.background} 【阶段描述】${phase.description}
【任务】根据阶段线索推理，不要直接说出最终真相，符合人设。字数200以内`;
            const payload = {
                model: "deepseek-chat",
                messages: [{ role: "system", content: sysPrompt }, ...history.slice(-6)],
                temperature: 1.1, max_tokens: 1024
            };
            const resp = await fetch("https://api.deepseek.com/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                body: JSON.stringify(payload)
            });
            if(!resp.ok) throw new Error((await resp.json()).error?.message || "API错误");
            const data = await resp.json();
            return data.choices[0].message.content;
        }

        // 自动循环
        async function theaterTick() {
            if(!isTheaterRunning) return;
            let candidates = characterPrompts.filter(c => c.id !== lastSpeakerId);
            const char = candidates[Math.floor(Math.random() * candidates.length)];
            lastSpeakerId = char.id;

            const thinkingRow = appendDialogue(char.name, char.id, char.colorClass, `<span class="typing-indicator">正在思考中...</span>`);
            try {
                const reply = await fetchDetectiveThought(char, chatHistory);
                thinkingRow.querySelector('.chat-bubble').innerHTML = reply;
                chatHistory.push({ role: "assistant", content: `${char.name}: ${reply}` });
            } catch(e) {
                thinkingRow.querySelector('.chat-bubble').innerHTML = `⚠️ 信号中断：${e.message}`;
            }
            if(isTheaterRunning) mainTimer = setTimeout(theaterTick, 5000);
        }

        // 启动
        startBtn.onclick = () => {
            if(!apiKeyInput.value) return alert("需要DeepSeek API Key");
            localStorage.setItem('mika_ds_key', apiKeyInput.value);
            currentCase = casesDatabase[caseSelector.value];
            currentPhaseIndex = 0;
            updatePhaseUI();
            chatHistory = [{ role: "user", content: `案件开始：${currentCase.background}` }];
            isTheaterRunning = true;
            startBtn.disabled = true; stopBtn.disabled = false;
            userInput.disabled = false; sendBtn.disabled = false;
            apiKeyInput.disabled = true; caseSelector.disabled = true;

            stage.innerHTML = `<div class="script-book"><h2>${currentCase.title}</h2><div class="prologue">${currentCase.background}<br><br><strong>🔹 当前阶段：${currentCase.phases[0].name}</strong><br>${currentCase.phases[0].description}</div></div>`;

            setTimeout(theaterTick, 2000);

        stopBtn.onclick = () => {
            isTheaterRunning = false; clearTimeout(mainTimer);
            startBtn.disabled = false; stopBtn.disabled = true;
            apiKeyInput.disabled = false; caseSelector.disabled = false;
            phaseDisplay.innerHTML = `⏸ 已暂停`;
        };

        // 用户发言 (可触发阶段)
        async function handleUserSpeak() {
            const text = userInput.value.trim();
            if(!text) return;
            userInput.value = ""; userInput.disabled = true; sendBtn.disabled = true;
            clearTimeout(mainTimer);
            
            appendDialogue("特邀侦探 (你)", "user", "", text, true);
            chatHistory.push({ role: "user", content: `侦探助手: ${text}` });
            
            // 检查阶段推进

            lastSpeakerId = responder.id;

                thinkingRow.querySelector('.chat-bubble').innerHTML = reply;
                chatHistory.push({ role: "assistant", content: `${responder.name}: ${reply}` });
            } catch(e) {
                thinkingRow.querySelector('.chat-bubble').innerHTML = `⚠️ 错误：${e.message}`;
            }
            
            userInput.disabled = false; sendBtn.disabled = false; userInput.focus();
            if(isTheaterRunning) mainTimer = setTimeout(theaterTick, 4500);
        }

        sendBtn.onclick = handleUserSpeak;
        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") handleUserSpeak(); });

        // 缓存key
        if(localStorage.getItem('mika_ds_key')) apiKeyInput.value = localStorage.getItem('mika_ds_key');
    })();
</script>
