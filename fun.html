<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味小工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdf8f0; --card: #fffef9; --ink: #3b3226; --muted: #8c8072;
            --a1: #e07b5a; --a2: #5a9e8f; --a3: #d4a843; --a4: #7b6bae;
            --a5: #4a90b8; --a6: #c7645c; --a7: #8b6f5a; --a8: #5c9e6f;
            --a9: #e89840; --a10: #4b8bbe; --a11: #9b7eb8; --a12: #c08060;
            --a13: #5088a0; --a14: #d08090; --a15: #8a9b5a; --a16: #b87060;
            --border: #e8dccf; --shadow: 0 2px 12px rgba(60,40,20,0.06); --shadow-lg: 0 8px 32px rgba(60,40,20,0.1); --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:"Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:var(--paper);
            background-image:radial-gradient(ellipse at 20% 20%, rgba(224,180,120,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(120,180,160,0.06) 0%, transparent 60%);
            color:var(--ink); min-height:100vh; line-height:1.6; -webkit-font-smoothing:antialiased;
        }
        .top-bar { max-width:1000px; margin:0 auto; padding:36px 28px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
        .top-bar h1 { font-family:"Ma Shan Zheng","Noto Sans SC",cursive; font-size:2.6rem; font-weight:400; color:var(--ink); letter-spacing:0.06em; }
        .top-bar h1 i { color:var(--a3); margin-right:6px; }
        .back-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border:1px solid var(--border); border-radius:999px; color:var(--muted); text-decoration:none; font-size:0.9rem; transition:all 0.25s; background:var(--card); }
        .back-btn:hover { border-color:var(--a1); color:var(--a1); box-shadow:0 2px 8px rgba(224,120,90,0.1); }
        .widgets { max-width:1000px; margin:0 auto; padding:0 20px 60px; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        @media (max-width:680px) { .widgets { grid-template-columns:1fr; } }
        .widget { background:var(--card); border-radius:var(--radius); padding:26px 22px 22px; border:1px solid var(--border); box-shadow:var(--shadow); transition:box-shadow 0.35s; display:flex; flex-direction:column; }
        .widget:hover { box-shadow:var(--shadow-lg); }
        .w-title { font-size:1rem; font-weight:600; color:var(--ink); margin-bottom:16px; display:flex; align-items:center; gap:10px; letter-spacing:0.03em; }
        .w-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
        .pill { padding:7px 18px; border:1px solid var(--border); border-radius:999px; background:var(--card); color:var(--muted); cursor:pointer; font-size:0.82rem; font-family:inherit; transition:all 0.2s; letter-spacing:0.03em; }
        .pill:hover { border-color:var(--a2); color:var(--a2); }
        .actions { display:flex; gap:10px; justify-content:center; margin-top:10px; }
        .btn-main { display:inline-flex; align-items:center; gap:8px; padding:10px 28px; background:var(--a1); color:#fff; border:none; border-radius:999px; font-size:0.95rem; cursor:pointer; letter-spacing:0.04em; transition:all 0.2s; font-family:inherit; }
        .btn-main:hover { filter:brightness(0.9); transform:translateY(-1px); }
        .btn-main:active { transform:scale(0.96); }
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:#fff; padding:10px 24px; border-radius:999px; font-size:0.85rem; letter-spacing:0.04em; opacity:0; pointer-events:none; transition:all 0.35s cubic-bezier(0.175,0.885,0.32,1.275); z-index:999; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* ── 1. Fortune ─────────────────── */
        .fortune-body { flex:1; display:flex; flex-direction:column; align-items:center; gap:16px; }
        .fortune-display { min-height:100px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:8px; transition:opacity 0.2s; }
        .fortune-emoji { font-size:3.5rem; transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        .fortune-text { font-size:1.05rem; color:var(--ink); letter-spacing:0.03em; line-height:1.7; }
        .fortune-hint { color:#ccc; font-size:0.85rem; }
        @keyframes shake { 0%,100%{transform:translateX(0) rotate(0)} 10%{transform:translateX(-6px) rotate(-3deg)} 20%{transform:translateX(6px) rotate(3deg)} 30%{transform:translateX(-8px) rotate(-4deg)} 40%{transform:translateX(8px) rotate(4deg)} 50%{transform:translateX(-5px) rotate(-2deg)} 60%{transform:translateX(5px) rotate(2deg)} 70%{transform:translateX(-3px) rotate(-1deg)} 80%{transform:translateX(3px) rotate(1deg)} }
        .shaking { animation:shake 0.7s ease; }

        /* ── 2. Palette ─────────────────── */
        .palette-row { display:flex; gap:0; border-radius:var(--radius); overflow:hidden; height:70px; margin-bottom:6px; cursor:pointer; }
        .palette-swatch { flex:1; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; font-size:0.65rem; font-weight:500; color:rgba(255,255,255,0.85); letter-spacing:0.04em; transition:flex 0.35s cubic-bezier(0.25,0.46,0.45,0.94); user-select:none; }
        .palette-swatch:hover { flex:1.8; }
        .palette-swatch .hex { opacity:0; transition:opacity 0.25s; }
        .palette-swatch:hover .hex { opacity:1; }
        .palette-name { text-align:center; font-size:0.82rem; color:var(--muted); margin-bottom:4px; letter-spacing:0.04em; min-height:1.4em; }

        /* ── 3. Memory ──────────────────── */
        .mem-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; max-width:260px; margin:0 auto; }
        .mem-card { aspect-ratio:1; perspective:600px; cursor:pointer; }
        .mem-card.flipped .minner, .mem-card.matched .minner { transform:rotateY(180deg); }
        .mem-card.matched { pointer-events:none; }
        .minner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.45s; border-radius:8px; }
        .mfront, .mback { position:absolute; inset:0; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; backface-visibility:hidden; }
        .mfront { background:#f0ebe0; border:1px solid var(--border); color:#ccc; font-size:0.9rem; }
        .mback { background:#fff; border:1px solid var(--border); transform:rotateY(180deg); }
        .mem-stats { display:flex; justify-content:center; gap:20px; margin-top:12px; font-size:0.82rem; color:var(--muted); }
        .mem-stats span { font-weight:600; color:var(--ink); }
        .win-msg { display:none; text-align:center; padding:8px 0 0; color:var(--a2); font-weight:600; font-size:0.9rem; }
        .win-msg.show { display:block; }

        /* ── 4. Pixel ───────────────────── */
        .pixel-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .pixel-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:2px; background:var(--border); padding:3px; border-radius:6px; width:fit-content; }
        .pixel-cell { width:26px; height:26px; background:#fff; border-radius:2px; cursor:pointer; transition:background 0.1s; }
        @media (max-width:380px) { .pixel-cell { width:22px; height:22px; } }
        .color-picker { display:flex; gap:7px; align-items:center; }
        .color-dot { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
        .color-dot.active { border-color:var(--ink); transform:scale(1.15); }
        .color-dot.erase { background:#fff; border:2px dashed #ccc; display:flex; align-items:center; justify-content:center; font-size:0.65rem; color:#ccc; }

        /* ── 5. Pomodoro ────────────────── */
        .pomo-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
        .pomo-ring { width:140px; height:140px; border-radius:50%; background:conic-gradient(var(--a5) 0deg,#f0ebe0 0deg); display:flex; align-items:center; justify-content:center; transition:background 0.5s; }
        .pomo-ring.br { background:conic-gradient(var(--a8) 0deg,#f0ebe0 0deg); }
        .pomo-inner { width:112px; height:112px; border-radius:50%; background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; }
        .pomo-time { font-size:2.2rem; font-weight:700; color:var(--ink); letter-spacing:0.04em; font-variant-numeric:tabular-nums; }
        .pomo-label { font-size:0.72rem; color:var(--muted); letter-spacing:0.04em; }
        .pomo-btns { display:flex; gap:8px; }

        /* ── 6. Dice ────────────────────── */
        .dice-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
        .dice-area { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; min-height:70px; align-items:center; }
        .die { width:60px; height:60px; background:#fff; border:2px solid var(--border); border-radius:10px; display:grid; grid-template:repeat(3,1fr)/repeat(3,1fr); padding:7px; justify-items:center; align-items:center; }
        .die.rolling { animation:diceRoll 0.5s ease; }
        @keyframes diceRoll { 0%{transform:rotate(0) scale(1)} 25%{transform:rotate(90deg) scale(1.1)} 50%{transform:rotate(180deg) scale(0.95)} 75%{transform:rotate(270deg) scale(1.05)} 100%{transform:rotate(360deg) scale(1)} }
        .pip { width:10px; height:10px; border-radius:50%; background:var(--ink); }
        .dice-ctrl { display:flex; gap:8px; align-items:center; }
        .dice-label { font-size:0.85rem; color:var(--muted); min-width:6em; text-align:center; }

        /* ── 7. Mokugyo ─────────────────── */
        .mokugyo-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; }
        .mokugyo-target { width:110px; height:110px; border-radius:50%; background:radial-gradient(circle at 40% 35%,#f5e6d3,#c4a27a); box-shadow:0 4px 20px rgba(140,100,60,0.2),inset 0 -6px 12px rgba(0,0,0,0.08); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:2.5rem; transition:transform 0.08s; user-select:none; -webkit-tap-highlight-color:transparent; position:relative; }
        .mokugyo-target:active { transform:scale(0.92); }
        .merit-num { font-size:1.5rem; font-weight:700; color:var(--a3); }
        .merit-label { font-size:0.72rem; color:var(--muted); }
        .merit-pop { position:absolute; pointer-events:none; font-size:0.8rem; font-weight:600; color:var(--a3); animation:popUp 1.2s ease forwards; }
        @keyframes popUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-55px) scale(1.3)} }
        .ripple { position:absolute; border-radius:50%; border:2px solid rgba(180,140,100,0.4); animation:ripOut 0.7s ease forwards; pointer-events:none; }
        @keyframes ripOut { 0%{width:40px;height:40px;opacity:0.8} 100%{width:160px;height:160px;opacity:0} }

        /* ── 8. Nickname ────────────────── */
        .nick-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
        .nick-display { min-height:55px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:600; color:var(--ink); letter-spacing:0.06em; text-align:center; }
        .nick-display.spin { animation:nickSpin 0.4s ease; }
        @keyframes nickSpin { 0%{transform:translateY(-10px);opacity:0} 100%{transform:translateY(0);opacity:1} }
        .nick-tags { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
        .nick-tag { font-size:0.68rem; padding:3px 10px; border-radius:999px; background:#f5f0e8; color:var(--muted); letter-spacing:0.03em; }

        /* ── 9. Spinner Wheel ───────────── */
        .spinwheel-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
        .spinwheel-svg { width:200px; height:200px; transition:transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99); }
        .spinwheel-result { font-size:1.1rem; font-weight:600; color:var(--a9); min-height:1.5em; text-align:center; }
        .spinwheel-options { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; font-size:0.75rem; color:var(--muted); }
        .spinwheel-options span { background:#f5f0e8; padding:3px 10px; border-radius:999px; }

        /* ── 10. Number Guess ───────────── */
        .guess-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .guess-input-row { display:flex; gap:8px; }
        .guess-input { width:80px; padding:8px 12px; border:1px solid var(--border); border-radius:8px; text-align:center; font-size:1.1rem; font-family:inherit; background:var(--card); color:var(--ink); }
        .guess-input:focus { outline:none; border-color:var(--a10); }
        .guess-hint { font-size:0.9rem; min-height:1.4em; text-align:center; }
        .guess-history { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; font-size:0.75rem; color:var(--muted); }

        /* ── 11. Breathing ──────────────── */
        .breath-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .breath-circle { width:130px; height:130px; border-radius:50%; background:var(--a11); transition:transform 4s ease, background 4s ease; display:flex; align-items:center; justify-content:center; }
        .breath-circle.inhale { transform:scale(1.4); background:var(--a4); }
        .breath-circle.hold { transform:scale(1.4); background:var(--a4); }
        .breath-circle.exhale { transform:scale(1); background:var(--a11); }
        .breath-text { font-size:1rem; color:#fff; font-weight:500; letter-spacing:0.05em; }

        /* ── 12. Countdown ──────────────── */
        .cd-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
        .cd-big { font-size:3rem; font-weight:700; color:var(--a12); letter-spacing:0.03em; line-height:1; }
        .cd-label { font-size:0.85rem; color:var(--muted); }
        .cd-date-input { padding:6px 12px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.85rem; background:var(--card); color:var(--ink); }
        .cd-date-input:focus { outline:none; border-color:var(--a12); }

        /* ── 13. Mini Piano ─────────────── */
        .piano-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
        .piano-keys { display:flex; gap:3px; }
        .piano-key { width:38px; height:100px; border-radius:0 0 6px 6px; border:1px solid #ddd; background:#fff; cursor:pointer; transition:all 0.08s; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; font-size:0.7rem; color:#bbb; user-select:none; -webkit-tap-highlight-color:transparent; }
        .piano-key:active, .piano-key.pressed { background:#e3f2fd; border-color:#90caf9; transform:scaleY(0.96); color:#666; }
        .piano-key.black { width:28px; height:62px; background:#3b3226; border:none; margin:0 -8px; z-index:1; color:#888; font-size:0.6rem; }
        .piano-key.black:active, .piano-key.black.pressed { background:#555; }
        @media (max-width:680px) { .piano-key { width:32px; height:80px; font-size:0.65rem; } .piano-key.black { width:24px; height:52px; } }

        /* ── 14. Riddles ────────────────── */
        .riddle-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .riddle-q { font-size:0.95rem; color:var(--ink); text-align:center; letter-spacing:0.03em; line-height:1.7; min-height:3em; display:flex; align-items:center; }
        .riddle-a { font-size:0.9rem; color:var(--a14); text-align:center; font-weight:500; display:none; }
        .riddle-a.show { display:block; animation:nickSpin 0.4s ease; }

        /* ── 15. Almanac (今日宜忌) ─────── */
        .almanac-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
        .almanac-row { display:flex; gap:12px; width:100%; }
        .almanac-box { flex:1; padding:14px; border-radius:8px; text-align:center; }
        .almanac-box.do { background:#f0f7f0; }
        .almanac-box.dont { background:#fdf0ee; }
        .almanac-box .al-title { font-size:0.82rem; font-weight:600; margin-bottom:6px; letter-spacing:0.04em; }
        .almanac-box.do .al-title { color:var(--a15); }
        .almanac-box.dont .al-title { color:var(--a6); }
        .almanac-box .al-items { font-size:0.78rem; color:var(--muted); line-height:1.8; }

        /* ── 16. Random Challenge ────────── */
        .challenge-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
        .challenge-display { min-height:60px; display:flex; align-items:center; justify-content:center; font-size:1.05rem; color:var(--ink); text-align:center; letter-spacing:0.03em; line-height:1.7; transition:opacity 0.2s; }
        .challenge-emoji { font-size:2.5rem; }

        .page-footer { text-align:center; padding:0 20px 40px; color:#c8bfb0; font-size:0.78rem; letter-spacing:0.04em; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1><i class="fas fa-magic"></i>趣味小工具</h1>
    <a class="back-btn" href="index.html"><i class="fas fa-arrow-left"></i> 返回主页</a>
</div>

<div class="widgets">

<!-- 1. 今日运势 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a1)"></span>今日运势</div>
<div class="fortune-body">
    <div class="fortune-display" id="fd"><div class="fortune-hint">点击按钮，摇出今日签运</div></div>
    <button class="btn-main" style="background:var(--a1)" id="shakeBtn" onclick="drawFortune()"><i class="fas fa-hand-rock"></i> 摇一摇</button>
</div></div>

<!-- 2. 配色灵感 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a3)"></span>配色灵感</div>
<div class="palette-name" id="palName">点击色条刷新</div>
<div class="palette-row" id="palRow" onclick="genPal()"></div>
<div class="actions"><button class="pill" onclick="genPal()"><i class="fas fa-sync-alt"></i> 换一组</button><span style="font-size:0.72rem;color:#c8bfb0;line-height:2.2;">空格键可刷新</span></div>
</div></div>

<!-- 3. 翻牌消消乐 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a2)"></span>翻牌消消乐</div>
<div class="mem-grid" id="memGrid"></div>
<div class="mem-stats">步数: <span id="moveCnt">0</span></div>
<div class="win-msg" id="winMsg">全部配对成功！</div>
<div class="actions" style="margin-top:10px"><button class="pill" onclick="initMem()"><i class="fas fa-redo"></i> 再来一局</button></div>
</div></div>

<!-- 4. 像素画板 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a4)"></span>像素画板</div>
<div class="pixel-wrap">
    <div class="color-picker" id="colorPick"></div>
    <div class="pixel-grid" id="pixGrid"></div>
    <div class="actions"><button class="pill" onclick="clearPix()"><i class="fas fa-eraser"></i> 清空</button></div>
</div></div>

<!-- 5. 番茄钟 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a5)"></span>番茄钟</div>
<div class="pomo-wrap">
    <div class="pomo-ring" id="pomoRing"><div class="pomo-inner"><div class="pomo-time" id="pomoTime">25:00</div><div class="pomo-label" id="pomoLbl">专注</div></div></div>
    <div class="pomo-btns"><button class="pill" id="pomoBtn" onclick="togglePomo()"><i class="fas fa-play"></i> 开始</button><button class="pill" onclick="resetPomo()"><i class="fas fa-undo"></i> 重置</button></div>
</div></div>

<!-- 6. 掷骰子 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a6)"></span>掷骰子</div>
<div class="dice-wrap">
    <div class="dice-area" id="diceArea"></div>
    <div class="dice-ctrl"><button class="pill" onclick="chDice(-1)"><i class="fas fa-minus"></i></button><span class="dice-label" id="diceLbl">2 个骰子</span><button class="pill" onclick="chDice(1)"><i class="fas fa-plus"></i></button></div>
    <button class="btn-main" style="background:var(--a6);padding:8px 22px;font-size:0.85rem" onclick="rollDice()"><i class="fas fa-dice"></i> 开掷</button>
</div></div>

<!-- 7. 敲木鱼 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a7)"></span>敲木鱼</div>
<div class="mokugyo-wrap" id="mokuWrap">
    <div class="mokugyo-target" id="moku" onclick="knock(event)"></div>
    <div style="text-align:center"><div class="merit-num" id="meritCnt">0</div><div class="merit-label">功德</div></div>
</div></div>

<!-- 8. 昵称生成器 -->
<div class="widget"><div class="w-title"><span class="w-dot" style="background:var(--a8)"></span>随机昵称</div>
<div class="nick-wrap">
    <div class="nick-display" id="nickDisp">点下面的按钮试试</div>
    <div class="nick-tags" id="nickTags"></div>
    <button class="btn-main" style="background:var(--a8)" onclick="genNick()"><i class="fas fa-random"></i> 换一个</button>
</div></div>

<!-- 9. 决策转盘 -->
