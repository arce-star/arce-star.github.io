<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摇摇乐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
        }

        /* ===== 公开区 ===== */
        #public-view {
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; min-height: 100vh;
        }
        .avatar {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: #fff; margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(102,126,234,0.35);
        }
        .hero-name { font-size: 2.2rem; font-weight: 700; color: #2d3436; margin-bottom: 4px; }
        .hero-tagline { font-size: 1rem; color: #888; margin-bottom: 50px; letter-spacing: 0.05em; }

        .public-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px; max-width: 780px; width: 100%;
        }
        .public-card {
            background: rgba(255,255,255,0.78); backdrop-filter: blur(8px);
            border-radius: 16px; padding: 32px 24px; text-align: center;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .public-card:hover { transform: translateY(-6px); box-shadow: 0 12px 36px rgba(0,0,0,0.1); }
        .public-card .card-icon { font-size: 2.4rem; margin-bottom: 16px; }
        .public-card h3 { font-size: 1.15rem; color: #2d3436; margin-bottom: 8px; font-weight: 600; }
        .public-card p { font-size: 0.9rem; color: #999; }

        .public-footer {
            margin-top: 60px; color: #bbb; font-size: 0.85rem; text-align: center;
        }

        /* ===== 锁按钮 ===== */
        #lock-btn {
            position: fixed; top: 16px; right: 16px;
            width: 42px; height: 42px; border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.7);
            backdrop-filter: blur(6px); font-size: 1.1rem;
            cursor: pointer; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        #lock-btn:hover { background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        #lock-btn.logged-in { background: #2d3436; color: #fff; border-color: #2d3436; }

        /* ===== 密码弹窗 ===== */
        #auth-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px); z-index: 2000;
            display: none; align-items: center; justify-content: center;
        }
        #auth-overlay.show { display: flex; }
        .auth-dialog {
            background: #fff; border-radius: 20px; padding: 40px 32px 32px;
            width: 360px; max-width: 90vw; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .auth-dialog h2 { font-size: 1.4rem; margin-bottom: 6px; color: #2d3436; }
        .auth-dialog .auth-sub { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; }
        .auth-dialog input {
            width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0;
            border-radius: 10px; font-size: 1rem; outline: none;
            text-align: center; letter-spacing: 0.15em;
            transition: border-color 0.3s;
        }
        .auth-dialog input:focus { border-color: #667eea; }
        .auth-dialog .auth-btn {
            width: 100%; margin-top: 16px; padding: 12px;
            border: none; border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-size: 1rem; cursor: pointer;
            transition: opacity 0.3s; font-weight: 600;
        }
        .auth-dialog .auth-btn:hover { opacity: 0.9; }
        .auth-dialog .auth-hint { display: block; margin-top: 14px; font-size: 0.85rem; color: #ccc; }
        .auth-dialog .auth-close {
            margin-top: 12px; font-size: 0.85rem; color: #aaa; cursor: pointer;
            background: none; border: none;
        }
        .auth-error { color: #e74c3c; font-size: 0.85rem; margin-top: 8px; display: none; }

        /* ===== 私人区 ===== */
        #private-view {
            display: none; position: fixed; inset: 0; z-index: 500;
        }
        #private-view.show { display: block; }
        #private-frame { width: 100%; height: 100%; border: none; }

        /* ===== 退出私人模式按钮 ===== */
        #exit-private-btn {
            display: none; position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); z-index: 1001;
            padding: 10px 22px; border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.85);
            backdrop-filter: blur(6px); font-size: 0.9rem; cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        #exit-private-btn:hover { background: #fff; }
        #exit-private-btn.show { display: block; }

        @media (max-width: 600px) {
            .hero-name { font-size: 1.8rem; }
            .public-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 公开区 -->
    <div id="public-view">
        <div class="avatar"><i class="fas fa-seedling"></i></div>
        <div class="hero-name">摇摇乐</div>
        <div class="hero-tagline">课程笔记 · 项目笔记 · 论文</div>

        <div class="public-cards">
            <div class="public-card">
                <div class="card-icon" style="color:#667eea;"><i class="fas fa-graduation-cap"></i></div>
                <h3>课程笔记</h3>
                <p>即将更新</p>
            </div>
            <div class="public-card">
                <div class="card-icon" style="color:#764ba2;"><i class="fas fa-project-diagram"></i></div>
                <h3>项目笔记</h3>
                <p>即将更新</p>
            </div>
            <div class="public-card">
                <div class="card-icon" style="color:#e17055;"><i class="fas fa-file-alt"></i></div>
                <h3>论文</h3>
                <p>即将更新</p>
            </div>
        </div>

        <div class="public-footer">
            <p>© 2024 摇摇乐</p>
            <span id="busuanzi_container_site_pv" style="font-size:12px;color:#bbb;">
                总访问 <span id="busuanzi_value_site_pv"></span> 次
            </span>
        </div>
    </div>

    <!-- 锁按钮 -->
    <button id="lock-btn" title="私人区">🔒</button>

    <!-- 密码弹窗 -->
    <div id="auth-overlay">
        <div class="auth-dialog">
            <h2>私人区</h2>
            <p class="auth-sub">输入密码进入</p>
            <input type="password" id="pwd-input" placeholder="密码" autocomplete="off">
            <p class="auth-error" id="auth-error">密码错误，重试一下</p>
            <button class="auth-btn" id="login-btn">进入</button>
            <span class="auth-hint">提示: 🍃</span>
            <button class="auth-close" id="auth-close">取消</button>
        </div>
    </div>

    <!-- 私人区 -->
    <div id="private-view">
        <iframe id="private-frame"></iframe>
    </div>

    <!-- 退出私人模式 -->
    <button id="exit-private-btn">← 返回公开页</button>

    <script src="js/auth.js"></script>
    <script src="js/encrypted-content.js"></script>
    <script>
        const lockBtn = document.getElementById('lock-btn');
        const authOverlay = document.getElementById('auth-overlay');
        const pwdInput = document.getElementById('pwd-input');
        const loginBtn = document.getElementById('login-btn');
        const authClose = document.getElementById('auth-close');
        const authError = document.getElementById('auth-error');
        const publicView = document.getElementById('public-view');
        const privateView = document.getElementById('private-view');
        const privateFrame = document.getElementById('private-frame');
        const exitPrivateBtn = document.getElementById('exit-private-btn');

        // 检查是否已有 session
        if (Auth.isLoggedIn()) {
            enterPrivateMode();
        }

        // 打开弹窗
        lockBtn.addEventListener('click', () => {
            if (Auth.isLoggedIn()) {
                // 已登录：直接进入私人区
                enterPrivateMode();
            } else {
                authOverlay.classList.add('show');
                pwdInput.focus();
            }
        });
        authClose.addEventListener('click', () => {
            authOverlay.classList.remove('show');
            pwdInput.value = '';
            authError.style.display = 'none';
        });
        authOverlay.addEventListener('click', (e) => {
            if (e.target === authOverlay) {
                authOverlay.classList.remove('show');
                pwdInput.value = '';
                authError.style.display = 'none';
            }
        });

        // 登录
        loginBtn.addEventListener('click', async () => {
            await attemptLogin();
        });
        pwdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') await attemptLogin();
        });

        async function attemptLogin() {
            const pwd = pwdInput.value.trim();
            if (!pwd) return;

            loginBtn.textContent = '验证中...';
            loginBtn.disabled = true;
            authError.style.display = 'none';

            try {
                const html = await Auth.decryptContent(ENCRYPTED_CONTENT, pwd);
                if (html) {
                    Auth.setSession();
                    authOverlay.classList.remove('show');
                    pwdInput.value = '';
                    revealPrivateContent(html);
                } else {
                    authError.style.display = 'block';
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            } catch (_) {
                authError.style.display = 'block';
            }
            loginBtn.textContent = '进入';
            loginBtn.disabled = false;
        }

        function revealPrivateContent(html) {
            // 用 Blob URL 加载解密后的内容到 iframe
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            // 释放旧 URL
            if (privateFrame.src.startsWith('blob:')) URL.revokeObjectURL(privateFrame.src);
            privateFrame.src = url;

            publicView.style.display = 'none';
            privateView.classList.add('show');
            exitPrivateBtn.classList.add('show');
            lockBtn.classList.add('logged-in');
            lockBtn.innerHTML = '🔓';
            lockBtn.title = '已解锁';
            exitPrivateBtn.focus();
        }

        function enterPrivateMode() {
            publicView.style.display = 'none';
            privateView.classList.add('show');
            exitPrivateBtn.classList.add('show');
            lockBtn.classList.add('logged-in');
            lockBtn.innerHTML = '🔓';
            lockBtn.title = '已解锁';
            // iframe 需要重新加载（session 还在但页面刷新后 blob url 丢失）
            // 这种情况极少，需要重新解密
        }

        // 退出私人模式
        exitPrivateBtn.addEventListener('click', () => {
            publicView.style.display = '';
            privateView.classList.remove('show');
            exitPrivateBtn.classList.remove('show');
            lockBtn.classList.remove('logged-in');
            lockBtn.innerHTML = '🔒';
            lockBtn.title = '私人区';
            if (privateFrame.src.startsWith('blob:')) {
                URL.revokeObjectURL(privateFrame.src);
            }
            privateFrame.src = '';
        });
    </script>

    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
