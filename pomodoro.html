<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 番茄钟</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, sans-serif;
    background: rgba(255,255,255,0.92);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh;
    user-select: none; -webkit-user-select: none;
    -webkit-app-region: drag;
}
.timer { font-size: 5rem; font-weight: 300; color: #333; letter-spacing: 0.05em; margin-bottom: 8px; }
.timer.warning { color: #e74c3c; }
.status { font-size: 0.9rem; color: #999; margin-bottom: 20px; }
.progress { width: 200px; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 24px; }
.progress-bar { height: 100%; background: #4a90d9; border-radius: 2px; transition: width 1s linear; }
.progress-bar.warning { background: #e74c3c; }
.btns { display: flex; gap: 12px; -webkit-app-region: no-drag; }
.btns button {
    width: 52px; height: 52px; border-radius: 50%; border: 1px solid #ddd;
    background: #fff; font-size: 1.3rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
}
.btns button:hover { background: #f5f5f5; }
.btns button.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
.presets { display: flex; gap: 6px; margin-top: 16px; -webkit-app-region: no-drag; }
.presets button {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 10px;
    border: 1px solid #ddd; background: #fff; cursor: pointer; color: #888;
}
.presets button:hover { border-color: #4a90d9; color: #4a90d9; }
.drag-hint { font-size: 0.65rem; color: #ccc; margin-top: 20px; }
</style>
</head>
<body>
    <div class="timer" id="timer">30:00</div>
    <div class="status" id="status">准备开始</div>
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
    <div class="btns">
        <button id="startBtn" title="开始/暂停">▶</button>
        <button id="resetBtn" title="重置">↺</button>
    </div>
    <div class="presets">
        <button data-min="15">15分钟</button>
        <button data-min="25">25分钟</button>
        <button data-min="30" class="active">30分钟</button>
        <button data-min="45">45分钟</button>
        <button data-min="60">60分钟</button>
    </div>
    <div class="drag-hint">拖拽窗口到角落 · 始终置顶</div>
    <script>
        const TOTAL_DEFAULT = 30 * 60;
        let total = TOTAL_DEFAULT;
        let remaining = total;
        let timer = null;
        let running = false;

        const timeEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');
        const barEl = document.getElementById('bar');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateDisplay() {
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            timeEl.textContent = m + ':' + String(s).padStart(2, '0');
            const pct = ((total - remaining) / total) * 100;
            barEl.style.width = pct + '%';
            if (remaining < 300) {
                timeEl.classList.add('warning');
                barEl.classList.add('warning');
            } else {
                timeEl.classList.remove('warning');
                barEl.classList.remove('warning');
            }
        }

        function tick() {
            if (remaining <= 0) {
                clearInterval(timer);
                running = false;
                startBtn.textContent = '▶'; startBtn.classList.remove('active');
                statusEl.textContent = '⏰ 时间到！起来休息一下吧';
                document.title = '⏰ 休息！';
                // 播放提示音
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.15);
                    setTimeout(() => {
                        const osc2 = ctx.createOscillator();
                        osc2.type = 'sine'; osc2.frequency.setValueAtTime(1000, ctx.currentTime);
                        osc2.connect(ctx.destination); osc2.start(); osc2.stop(ctx.currentTime + 0.15);
                    }, 200);
                } catch(_) {}
                if (Notification.permission === 'granted') {
                    new Notification('🍅 番茄钟', { body: '时间到了，起来休息！' });
                }
                return;
            }
            remaining--;
            updateDisplay();
            statusEl.textContent = running ? '专注中...' : '准备开始';
            document.title = timeEl.textContent + ' · 番茄钟';
        }

        startBtn.addEventListener('click', () => {
            if (running) {
                clearInterval(timer); running = false;
                startBtn.textContent = '▶'; startBtn.classList.remove('active');
                statusEl.textContent = '已暂停';
            } else {
                if (remaining <= 0) { remaining = total; updateDisplay(); }
                timer = setInterval(tick, 1000);
                running = true;
                startBtn.textContent = '⏸'; startBtn.classList.add('active');
                statusEl.textContent = '专注中...';
                if (Notification.permission === 'default') Notification.requestPermission();
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timer); running = false;
            remaining = total;
            startBtn.textContent = '▶'; startBtn.classList.remove('active');
            statusEl.textContent = '准备开始';
            document.title = '🍅 番茄钟';
            updateDisplay();
        });

        document.querySelectorAll('.presets button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                total = parseInt(btn.dataset.min) * 60;
                remaining = total;
                clearInterval(timer); running = false;
                startBtn.textContent = '▶'; startBtn.classList.remove('active');
                statusEl.textContent = '准备开始';
                updateDisplay();
            });
        });

        updateDisplay();
    </script>
</body>
</html>
