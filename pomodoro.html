<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 番茄钟</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, sans-serif;
    background: rgba(255,255,255,0.95);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh;
    user-select: none; -webkit-user-select: none;
}
.timer { font-size: 4rem; font-weight: 300; color: #333; letter-spacing: 0.05em; }
.timer.warning { color: #e74c3c; }
.status { font-size: 0.85rem; color: #999; margin: 8px 0 16px; }
.progress { width: 180px; height: 3px; background: #eee; border-radius: 2px; margin-bottom: 20px; }
.progress-bar { height: 100%; background: #4a90d9; border-radius: 2px; transition: width 1s linear; }
.progress-bar.warning { background: #e74c3c; }
.btns { display: flex; gap: 12px; }
.btns button {
    width: 48px; height: 48px; border-radius: 50%; border: 1px solid #ddd;
    background: #fff; font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
}
.btns button:hover { background: #f5f5f5; }
.btns button.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
.presets { display: flex; gap: 6px; margin-top: 14px; }
.presets button {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 10px;
    border: 1px solid #ddd; background: #fff; cursor: pointer; color: #888;
}
.presets button:hover, .presets button.active { border-color: #4a90d9; color: #4a90d9; background: #f0f4fb; }
.pip-btn {
    margin-top: 16px; padding: 8px 18px; border-radius: 16px;
    border: 1px solid #4a90d9; background: #4a90d9; color: #fff;
    font-size: 0.8rem; cursor: pointer;
}
.pip-btn:hover { opacity: 0.85; }
.note { font-size: 0.65rem; color: #ccc; margin-top: 12px; }
canvas { display: none; }
</style>
</head>
<body>
    <div class="timer" id="timer">30:00</div>
    <div class="status" id="status">准备开始</div>
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
    <div class="btns">
        <button id="startBtn" title="开始/暂停">▶</button>
        <button id="resetBtn" title="重置">↺</button>
    </div>
    <div class="presets">
        <button data-min="15">15分钟</button>
        <button data-min="25">25分钟</button>
        <button data-min="30" class="active">30分钟</button>
        <button data-min="45">45分钟</button>
        <button data-min="60">60分钟</button>
    </div>
    <button class="pip-btn" id="pipBtn">📺 画中画悬浮 (始终置顶)</button>
    <p class="note">点「画中画悬浮」后可以关闭这个窗口</p>
    <canvas id="pipCanvas" width="320" height="140"></canvas>
    <video id="pipVideo" style="display:none" loop muted playsinline></video>
    <script>
        const TOTAL_DEFAULT = 30 * 60;
        let total = TOTAL_DEFAULT;
        let remaining = total;
        let timer = null;
        let running = false;
        let pipActive = false;

        const timeEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');
        const barEl = document.getElementById('bar');
        const startBtn = document.getElementById('startBtn');
        const canvas = document.getElementById('pipCanvas');
        const video = document.getElementById('pipVideo');
        const ctx = canvas.getContext('2d');

        function updateDisplay() {
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            const text = m + ':' + String(s).padStart(2, '0');
            timeEl.textContent = text;
            const pct = ((total - remaining) / total) * 100;
            barEl.style.width = pct + '%';
            document.title = text + ' · 🍅';

            if (remaining < 300) {
                timeEl.classList.add('warning');
                barEl.classList.add('warning');
            } else {
                timeEl.classList.remove('warning');
                barEl.classList.remove('warning');
            }

            // 更新画中画
            if (pipActive) drawPiP();
        }

        function drawPiP() {
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            const text = m + ':' + String(s).padStart(2, '0');
            const pct = ((total - remaining) / total) * 100;

            ctx.clearRect(0, 0, 320, 140);
            // 背景
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, 320, 140);
            // 进度条背景
            ctx.fillStyle = '#eee';
            ctx.fillRect(40, 100, 240, 3);
            // 进度条
            ctx.fillStyle = remaining < 300 ? '#e74c3c' : '#4a90d9';
            ctx.fillRect(40, 100, 240 * pct / 100, 3);
            // 时间
            ctx.fillStyle = remaining < 300 ? '#e74c3c' : '#333';
            ctx.font = '300 3rem -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, 160, 60);
            // 状态
            ctx.fillStyle = '#999';
            ctx.font = '0.8rem -apple-system, sans-serif';
            const status = running ? '🍅 专注中...' : remaining < total ? '⏸ 已暂停' : '准备开始';
            ctx.fillText(status, 160, 85);
        }

        async function startPiP() {
            drawPiP();
            const stream = canvas.captureStream(30);
            video.srcObject = stream;
            video.play();
            // 等待视频元数据加载完成
            await new Promise(resolve => {
                if (video.readyState >= 2) resolve();
                else video.addEventListener('loadedmetadata', resolve, { once: true });
            });
            try {
                await video.requestPictureInPicture();
                pipActive = true;
                document.getElementById('pipBtn').textContent = '✅ 悬浮中 (点此关闭)';
            } catch(e) {
                alert('画中画启动失败: ' + e.message + '\n\n请使用 Chrome/Edge 浏览器');
            }
        }

        function stopPiP() {
            if (document.pictureInPictureElement) {
                document.exitPictureInPicture();
            }
            pipActive = false;
            document.getElementById('pipBtn').textContent = '📺 画中画悬浮 (始终置顶)';
        }

        async function togglePiP() {
            if (pipActive) { stopPiP(); return; }
            await startPiP();
        }

        document.getElementById('pipBtn').addEventListener('click', togglePiP);
        video.addEventListener('leavepictureinpicture', () => {
            pipActive = false;
            document.getElementById('pipBtn').textContent = '📺 画中画悬浮 (始终置顶)';
        });

        function tick() {
            if (remaining <= 0) {
                clearInterval(timer); running = false;
                startBtn.textContent = '▶'; startBtn.classList.remove('active');
                statusEl.textContent = '⏰ 时间到！起来休息';
                document.title = '⏰ 休息！';
                try {
                    const ac = new (window.AudioContext||window.webkitAudioContext)();
                    [800,1000,600].forEach((f,i) => {
                        const o = ac.createOscillator(); o.type='sine';
                        o.frequency.setValueAtTime(f, ac.currentTime+i*0.2);
                        o.connect(ac.destination); o.start(); o.stop(ac.currentTime+i*0.2+0.15);
                    });
                } catch(_){}
                if (Notification.permission==='granted') new Notification('🍅 番茄钟',{body:'时间到了，起来休息！'});
                if (pipActive) drawPiP();
                return;
            }
            remaining--;
            updateDisplay();
            statusEl.textContent = running ? '🍅 专注中...' : '准备开始';
        }

        startBtn.addEventListener('click', () => {
            if (running) {
                clearInterval(timer); running = false;
                startBtn.textContent = '▶'; startBtn.classList.remove('active');
                statusEl.textContent = '已暂停';
                if (pipActive) drawPiP();
            } else {
                if (remaining <= 0) { remaining = total; updateDisplay(); }
                timer = setInterval(tick, 1000);
                running = true;
                startBtn.textContent = '⏸'; startBtn.classList.add('active');
                statusEl.textContent = '🍅 专注中...';
                if (Notification.permission==='default') Notification.requestPermission();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            clearInterval(timer); running = false;
            remaining = total;
            startBtn.textContent = '▶'; startBtn.classList.remove('active');
            statusEl.textContent = '准备开始'; document.title='🍅 番茄钟';
            updateDisplay();
        });

        document.querySelectorAll('.presets button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.presets button').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                total = parseInt(btn.dataset.min)*60;
                remaining = total;
                clearInterval(timer); running = false;
                startBtn.textContent = '▶'; startBtn.classList.remove('active');
                statusEl.textContent = '准备开始'; updateDisplay();
            });
        });

        updateDisplay();
    </script>
</body>
</html>
