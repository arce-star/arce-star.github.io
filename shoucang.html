<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>赛博盲盒：收藏家最终修正版</title>
    <style>
        :root {
            --primary: #ff0055; --secondary: #00f2ff; --accent: #ffcc00;
            --bg: #0a0a14; --card-bg: #161625; --border: #3d3452; --text: #f0f0f0;
            --shelf: #3e2723; --danger: #e05555; --success: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* 特效背景 */
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 30px 30px; opacity: 0.15; z-index: -1; }
        .crt-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.08) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }

        #game-container { width: 100%; max-width: 480px; height: 100vh; background: rgba(15, 15, 25, 0.98); display: flex; flex-direction: column; border-left: 2px solid var(--border); border-right: 2px solid var(--border); position: relative; }

        /* 顶部状态 */
        #header { padding: 12px 15px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; background: #000; z-index: 10; }
        .stat-group { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: var(--secondary); letter-spacing: 1px; }
        .stat-value { font-size: 18px; font-weight: bold; text-shadow: 0 0 8px var(--secondary); }

        #content { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        #content::-webkit-scrollbar { display: none; }

        /* 通知容器 - 从上往下 */
        #toast-container {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 90%; z-index: 2000; pointer-events: none;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px; border: 2px solid #fff; font-weight: bold; text-align: center;
            font-size: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .toast.rare { background: #000; border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .toast.achieve { background: var(--accent); border-color: #000; color: #000; text-transform: uppercase; }
        .toast.frag { background: #000; border-color: var(--secondary); color: var(--secondary); }
        .toast.info { background: #1a1a2e; border-color: #444; color: #fff; }

        /* 3D盲盒 */
        #cube-stage { width: 100%; height: 140px; display: flex; justify-content: center; align-items: center; perspective: 800px; cursor: pointer; }
        #cube { width: 50px; height: 50px; position: relative; transform-style: preserve-3d; }
        .cube-face { position: absolute; width: 50px; height: 50px; border: 2px solid var(--primary); background: rgba(255,0,85,0.2); box-shadow: inset 0 0 15px var(--primary); display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary); font-weight: bold; }
        .f-front  { transform: translateZ(25px); } .f-back   { transform: rotateY(180deg) translateZ(25px); }
        .f-right  { transform: rotateY(90deg) translateZ(25px); } .f-left   { transform: rotateY(-90deg) translateZ(25px); }
        .f-top    { transform: rotateX(90deg) translateZ(25px); } .f-bottom { transform: rotateX(-90deg) translateZ(25px); }
        .cube-spin { animation: spin 4s linear infinite; }
        .cube-accel { animation: accel 0.4s ease-in forwards; }
        @keyframes spin { from { transform: rotateX(-20deg) rotateY(0); } to { transform: rotateX(-20deg) rotateY(360deg); } }
        @keyframes accel { from { transform: rotateX(-20deg) rotateY(0); } to { transform: rotateX(-45deg) rotateY(1080deg) scale(1.6); opacity: 0; } }

        /* 刮刮乐 */
        .scratch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px auto; width: 100%; max-width: 360px; padding: 5px; justify-items: center; }
        .card-slot { width: 100%; aspect-ratio: 2/3; position: relative; perspective: 800px; cursor: pointer; }
        .card-inner { position: absolute; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .card-back { background: linear-gradient(135deg, #3d3452, #1a1525); color: var(--secondary); font-size: 24px; font-weight: bold; }
        .card-front { background: #221a30; transform: rotateY(180deg); font-size: 10px; border: 1px solid var(--secondary); }

        /* UI组件 */
        .pixel-card { background: var(--card-bg); border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px; font-weight: bold; box-shadow: 0 4px 0 #80002b; width: 100%; cursor: pointer; font-size: 12px; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #80002b; }
        .btn.secondary { background: var(--secondary); color: #000; box-shadow: 0 4px 0 #008fa6; }
        .btn.success { background: var(--success); box-shadow: 0 4px 0 #2e7d32; }
        .btn.danger { background: var(--danger); box-shadow: 0 4px 0 #8b0000; }

        /* 图鉴 */
        .wiki-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .wiki-card { background: var(--card-bg); border: 1px solid var(--border); padding: 8px; display: flex; align-items: center; gap: 8px; font-size: 10px; }
        .wiki-card.locked { opacity: 0.2; filter: grayscale(1); }

        /* 成就 */
        .ach-list { display: flex; flex-direction: column; gap: 8px; }
        .ach-card { background: #1a1a2e; border: 1px solid var(--border); padding: 12px; display: flex; align-items: center; gap: 15px; position: relative; }
        .ach-card.unlocked { border-left: 4px solid var(--accent); background: rgba(255, 204, 0, 0.05); }
        .ach-card.locked { opacity: 0.4; }

        /* 展示架 */
        .shelf-container { background: var(--shelf); border: 3px solid #2d1a1a; padding: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 15px; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); }
        .shelf-row { display: flex; justify-content: space-around; align-items: flex-end; height: 50px; border-bottom: 5px solid #2d1a1a; }
        .shelf-item { width: 35px; display: flex; justify-content: center; position: relative; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        /* 导航 */
        #nav { display: grid; grid-template-columns: repeat(7, 1fr); background: #000; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { padding: 12px 0; text-align: center; font-size: 9px; opacity: 0.4; cursor: pointer; font-weight: bold; }
        .nav-item.active { opacity: 1; color: var(--secondary); background: #111; border-top: 2px solid var(--secondary); }

        canvas { display: block; background: #000; margin: 0 auto; border: 1px solid var(--border); touch-action: none; }
        .v-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 120px; margin: 10px auto; }
        .v-btn { width: 38px; height: 38px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; }

        .svg-icon { width: 32px; height: 32px; image-rendering: pixelated; }
        .svg-icon-s { width: 18px; height: 18px; vertical-align: middle; }

        /* 指南覆盖层 */
        #guide-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; text-align: center; padding: 20px;
        }
        #guide-overlay h2 { color: var(--secondary); margin-bottom: 20px; }
        #guide-overlay p { margin: 10px 0; font-size: 13px; line-height: 1.6; max-width: 300px; }
        #guide-overlay .btn { width: 200px; margin-top: 30px; }
    </style>
</head>
<body>
<script>
if(!sessionStorage.getItem('_arce_session')){
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;color:#999;text-align:center;"><div><div style="font-size:3rem;margin-bottom:16px;">🔒</div><p>请先通过主页登录</p><p style="font-size:.85rem;margin-top:8px;"><a href="/" style="color:#667eea;">返回主页</a></p></div></div>';
  throw new Error();
}
</script>


<div class="bg-grid"></div>
<div class="crt-overlay"></div>
<div id="toast-container"></div>

<!-- 玩家指南覆盖层 -->
<div id="guide-overlay">
    <h2>📡 收藏家指南</h2>
    <p>• 点击旋转核心抽取稀有藏品<br>• 刮开卡片有机会获得双倍碎片加成<br>• 前往商店用碎片兑换珍品<br>• 仓库里可拆解重复物品换碎片<br>• 电子回收站能翻出意外之喜<br>• 集齐所有珍品以解锁终极成就</p>
    <button class="btn" onclick="closeGuide()">开 始 冒 险</button>
</div>

<div id="game-container">
    <div id="header">
        <div class="stat-group"><span class="stat-label">CREDIT</span><span class="stat-value" id="cash-display">$0.00</span></div>
        <div class="stat-group" style="align-items:flex-end;"><span class="stat-label">FRAGS</span><span class="stat-value" id="frag-display" style="color:var(--secondary)">0</span></div>
    </div>

    <div id="content"></div>

    <div id="nav">
        <div class="nav-item active" onclick="switchTab('draw')">补给</div>
        <div class="nav-item" onclick="switchTab('shop')">商店</div>
        <div class="nav-item" onclick="switchTab('stash')">仓库</div>
        <div class="nav-item" onclick="switchTab('wiki')">图鉴</div>
        <div class="nav-item" onclick="switchTab('ach')">成就</div>
        <div class="nav-item" onclick="switchTab('games')">游戏</div>
        <div class="nav-item" onclick="switchTab('trash')">回收</div>
    </div>
</div>

<script>
    // --- 图标系统 ---
    const ICONS = {
        console: `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="#444"/><rect x="6" y="6" width="12" height="8" fill="#111"/><circle cx="8" cy="16" r="1.5" fill="#ff0055"/><circle cx="16" cy="16" r="1.5" fill="#00f2ff"/></svg>`,
        dog: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 10h12v8H6z" fill="#fff"/><circle cx="10" cy="12" r="1" fill="#000"/><circle cx="14" cy="12" r="1" fill="#000"/></svg>`,
        pikachu: `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="7" y="8" width="10" height="10" fill="#ffcc00"/><rect x="7" y="14" width="2" height="2" fill="red"/><rect x="15" y="14" width="2" height="2" fill="red"/></svg>`,
        king: `<svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="13" r="8" fill="#fff"/><path d="M7 10c0 5 10 5 10 0" fill="red"/><path d="M10 4l2-2 2 2v2h-4z" fill="#ffcc00"/></svg>`,
        toilet: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 6h4v12H6z" fill="#ffcc00"/><path d="M10 14h8v4h-8z" fill="#ffeb3b"/></svg>`,
        gear: `<svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="#888"/><path d="M12 2v20M2 12h20" stroke="#888" stroke-width="2"/></svg>`,
        blade: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M4 18l14-14 2 2-14 14z" fill="#00f2ff"/></svg>`,
        chip: `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="#333"/><rect x="10" y="10" width="4" height="4" fill="#00f2ff"/></svg>`,
        crystal: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2l8 10-8 10-8-10z" fill="#cc00ff"/></svg>`,
        banana: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M18 6C12 6 6 12 6 20" stroke="#ffeb3b" stroke-width="4" fill="none"/></svg>`,
        fishbone: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M4 12h16M8 8v8M12 7v10" stroke="#ccc" stroke-width="2"/></svg>`,
        box: `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="12" fill="#8d6e63"/></svg>`,
        bottle: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 6V4h4v2l1 1v11H9V7z" fill="#4dd0e1"/></svg>`,
        paper: `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="6" y="4" width="12" height="16" fill="#ddd"/></svg>`,
        butt: `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="8" y="10" width="8" height="3" fill="#fff"/><rect x="14" y="10" width="3" height="3" fill="#ff9800"/></svg>`,
        battery: `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="9" y="8" width="6" height="10" fill="#4caf50"/></svg>`,
        wire: `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 12c4-4 10 4 12 0" fill="none" stroke="#607d8b" stroke-width="2"/></svg>`,
        frag: `<svg class="svg-icon" viewBox="0 0 16 16"><path d="M8 2l5 6-5 6-5-6z" fill="#00f2ff"/></svg>`,
        mult: `<svg class="svg-icon" viewBox="0 0 16 16"><text x="0" y="13" fill="#ff0055" font-weight="bold" font-size="14">x2</text></svg>`,
        trashcan: `<svg class="svg-icon" viewBox="0 0 32 40"><rect x="6" y="10" width="20" height="26" fill="#888"/><rect x="4" y="6" width="24" height="4" fill="#aaa"/></svg>`
    };

    // --- 物品数据库 ---
    const ITEMS = {
        console: { name: '数码游戏机', price: 50, from: '补给站', icon: ICONS.console, type:'rare' },
        dog: { name: '线条狗', price: 15, from: '补给/抓捕', icon: ICONS.dog, type:'rare' },
        pikachu: { name: '皮卡丘', price: 15, from: '补给/抓捕', icon: ICONS.pikachu, type:'rare' },
        king: { name: '雪王权杖', price: 20, from: '补给/抓捕', icon: ICONS.king, type:'rare' },
        toilet: { name: '黄金马桶', price: 60, from: '补给/抓捕', icon: ICONS.toilet, type:'rare' },
        gear: { name: '动力齿轮', price: 10, from: '回收站', icon: ICONS.gear, type:'rare' },
        blade: { name: '纳米核心', price: 40, from: '幸运补给', icon: ICONS.blade, type:'rare' },
        chip: { name: '幽灵芯片', price: 50, from: '幸运补给', icon: ICONS.chip, type:'rare' },
        crystal: { name: '能量水晶', price: 30, from: '回收站', icon: ICONS.crystal, type:'rare' },
        banana: { name: '烂香蕉', price: 0.1, from: '回收站', icon: ICONS.banana, type:'junk' },
        fishbone: { name: '鱼骨头', price: 0.2, from: '回收站', icon: ICONS.fishbone, type:'junk' },
        box: { name: '旧纸箱', price: 0.5, from: '回收站', icon: ICONS.box, type:'junk' },
        bottle: { name: '空瓶子', price: 0.1, from: '回收站', icon: ICONS.bottle, type:'junk' },
        paper: { name: '旧报纸', price: 0.1, from: '回收站', icon: ICONS.paper, type:'junk' },
        butt: { name: '烟头', price: 0.05, from: '回收站', icon: ICONS.butt, type:'junk' },
        battery: { name: '废电池', price: 0.3, from: '回收站', icon: ICONS.battery, type:'junk' },
        wire: { name: '断线', price: 0.2, from: '回收站', icon: ICONS.wire, type:'junk' }
    };

    // --- 成就定义（难度下调+新增）---
    const ACH_DEFS = [
        { id: 'broke', n: '破产边缘', d: '现金消耗至零', r: 5, cond: s => s.cash <= 0 },
        { id: 'rich', n: '信用新贵', d: '现金达到$50', r: 15, cond: s => s.cash >= 50 },
        { id: 'collector', n: '初级收藏', d: '收集至少5种稀有珍品', r: 30, cond: s => Object.keys(ITEMS).filter(k=>ITEMS[k].type==='rare' && s.inventory[k]>0).length >= 5 },
        { id: 'junkie', n: '拾荒者', d: '翻找回收站10次', r: 8, cond: s => s.rummageCount >= 10 },
        { id: 'minigamer', n: '游戏达人', d: '解锁数码游戏机', r: 5, cond: s => s.inventory.console > 0 },
        // 新增5个
        { id: 'hunter', n: '盲盒猎手', d: '开启核心盲盒3次', r: 5, cond: s => s.boxOpens >= 3 },
        { id: 'scratcher', n: '刮卡新星', d: '使用刮刮乐3次', r: 5, cond: s => s.scratchCount >= 3 },
        { id: 'amplifier', n: '双倍共鸣', d: '激活双倍加成3次', r: 8, cond: s => s.multActivations >= 3 },
        { id: 'recycler', n: '环保先锋', d: '出售垃圾物品5次', r: 6, cond: s => s.junkSoldCount >= 5 },
        { id: 'salvager', n: '拆解新手', d: '拆解物品1次', r: 5, cond: s => s.salvageCount >= 1 }
    ];

    // --- 状态初始化（包含新增计数器）---
    let state = {
        cash: 10.00, frags: 0, mult: 1,
        inventory: {}, unlocked: [], achieved: [],
        rummageCount: 0, boxOpens: 0, scratchCount: 0,
        multActivations: 0, junkSoldCount: 0, salvageCount: 0
    };
    let isBusy = false, gameLoop = null, lpTimer = null;

    // --- 通知系统 ---
    const notify = (msg, type = 'info') => {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.transition = '0.5s'; toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 500);
        }, 2000);
    };

    // --- 本地存档 ---
    const save = () => localStorage.setItem('cyber_pro_save_v5', JSON.stringify(state));
    const load = () => {
        const d = localStorage.getItem('cyber_pro_save_v5');
        if (d) {
            const parsed = JSON.parse(d);
            // 合并默认值，保证新增计数器存在
            state = { ...state, ...parsed };
        }
        updateUI();
    };

    // --- 界面刷新 ---
    const updateUI = () => {
        document.getElementById('cash-display').innerText = `$${state.cash.toFixed(2)}`;
        document.getElementById('frag-display').innerText = state.frags + (state.mult > 1 ? ` (x${state.mult})` : "");
        save();
        checkAchievements(); // 检查后若现金变动需要再次刷新显示
        document.getElementById('cash-display').innerText = `$${state.cash.toFixed(2)}`;
    };

    // --- 获得物品（始终通知）---
    const gainItem = (id, amount = 1) => {
        if (!ITEMS[id]) return;
        if (id === 'console' && state.inventory.console > 0) {
            state.frags += 50;
            notify("重复获得游戏机：已转换50碎片", "frag");
            updateUI();
            return;
        }
        const previous = state.inventory[id] || 0;
        state.inventory[id] = previous + amount;
        if (!state.unlocked.includes(id)) {
            state.unlocked.push(id);
            notify(`✨ 发现物: ${ITEMS[id].name}`, "rare");
        } else {
            notify(`获得 ${ITEMS[id].name}`, "info");
        }
        updateUI();
    };

    // --- 成就检查 ---
    const checkAchievements = () => {
        ACH_DEFS.forEach(d => {
            if (!state.achieved.includes(d.id) && d.cond(state)) {
                state.achieved.push(d.id);
                state.cash += d.r;
                notify(`🏆 成就达成: ${d.n}`, "achieve");
            }
        });
        // 内部不再调用 updateUI，避免循环
    };

    // --- 核心交互函数 ---
    function open3DBox() {
        if (isBusy || state.cash < 1) return;
        isBusy = true; state.cash -= 1; state.boxOpens++; updateUI();
        const cube = document.getElementById('cube');
        if (!cube) { isBusy = false; return; }
        cube.classList.add('cube-accel');
        setTimeout(() => {
            const r = Math.random();
            if (r < 0.15) {
                const pool = Object.keys(ITEMS).filter(k => ITEMS[k].type === 'rare');
                const k = pool[Math.floor(Math.random() * pool.length)];
                gainItem(k); state.mult = 1;
            } else if (r < 0.25) {
                state.mult = 2; state.multActivations++;
                notify("激活双倍加成！", "frag");
            } else {
                const v = Math.floor(Math.random() * 5) + 4;
                state.frags += (v * state.mult);
                notify(`碎片 +${v * state.mult}`, "frag");
                state.mult = 1;
            }
            setTimeout(() => {
                const cubeNow = document.getElementById('cube');
                if (cubeNow) cubeNow.classList.remove('cube-accel');
                isBusy = false;
                updateUI();
            }, 100);
        }, 400);
    }

    function scratch(idx) {
        if (isBusy || state.cash < 1) return;
        isBusy = true; state.cash -= 1; state.scratchCount++; updateUI();
        const prizes = [rollPrize(), rollPrize(), rollPrize()];
        document.querySelectorAll('.card-slot').forEach((s, i) => {
            const p = prizes[i];
            s.querySelector('.card-front').innerHTML = ICONS[p.id] + `<div style="margin-top:4px">${p.label}</div>`;
            s.querySelector('.card-inner').classList.add('flipped');
        });
        const win = prizes[idx];
        setTimeout(() => {
            if (win.id === 'mult') {
                state.mult = 2; state.multActivations++;
                notify("获得双倍加成！", "frag");
            } else if (win.id === 'frag') {
                state.frags += win.val * state.mult;
                notify(`碎片 +${win.val * state.mult}`, "frag");
                state.mult = 1;
            } else {
                gainItem(win.id);
                state.mult = 1;
            }
            setTimeout(() => {
                document.querySelectorAll('.card-slot').forEach(s => s.querySelector('.card-inner').classList.remove('flipped'));
                isBusy = false;
                updateUI();
            }, 800);
        }, 300);
    }

    const rollPrize = () => {
        const r = Math.random();
        if (r < 0.12) {
            const pool = Object.keys(ITEMS).filter(k => ITEMS[k].type === 'rare');
            const k = pool[Math.floor(Math.random() * pool.length)];
            return { id: k, label: ITEMS[k].name };
        }
        if (r < 0.2) return { id: 'mult', label: '翻倍' };
        const v = Math.floor(Math.random() * 6) + 2;
        return { id: 'frag', label: `碎片x${v}`, val: v };
    };

    function buy(k) {
        if (state.frags < ITEMS[k].price) return;
        state.frags -= ITEMS[k].price;
        gainItem(k);
        switchTab('shop');
    }
    function salvage(k) {
        if (state.inventory[k] > 0) {
            state.inventory[k]--;
            if (state.inventory[k] <= 0) delete state.inventory[k];
            state.frags += Math.floor(ITEMS[k].price / 2);
            state.salvageCount++;
            updateUI();
            switchTab('stash');
            notify("拆解成功", "frag");
        }
    }
    function sellJunk(k) {
        if (state.inventory[k] > 0) {
            state.cash += ITEMS[k].price;
            state.inventory[k]--;
            if (state.inventory[k] <= 0) delete state.inventory[k];
            state.junkSoldCount++;
            updateUI();
            switchTab('stash');
        }
    }
    function sellAllJunk() {
        let total = 0;
        let soldKinds = 0;
        Object.keys(state.inventory).forEach(k => {
            if (ITEMS[k] && ITEMS[k].type === 'junk') {
                total += ITEMS[k].price * state.inventory[k];
                if (state.inventory[k] > 0) soldKinds++;
                delete state.inventory[k];
            }
        });
        if (total > 0) {
            state.cash += total;
            state.junkSoldCount += soldKinds;
            notify(`出售垃圾入账 $${total.toFixed(2)}`, "info");
            updateUI();
            switchTab('stash');
        }
    }

    let isRummaging = false;
    // function rummage() {
    //     if (isRummaging) return;
    //     isRummaging = true;
    //     const bin = document.getElementById('trash-bin');
    //     if (!bin) { isRummaging = false; return; }
    //     bin.style.animation = "shake 0.2s infinite";
    //     state.rummageCount++;
    //     setTimeout(() => {
    //         bin.style.animation = "";
    //         const r = Math.random();
    //         let k = r > 0.98 ? 'crystal' : (r > 0.9 ? 'gear' : (r > 0.7 ? 'battery' : (r > 0.4 ? 'box' : 'butt')));
    //         gainItem(k);
    //         updateUI();
    //         isRummaging = false;

    // let isRummaging = false;
    function rummage() {
        if (isRummaging) return;
        isRummaging = true;
        const bin = document.getElementById('trash-bin');
        if (!bin) { isRummaging = false; return; }
        bin.style.animation = "shake 0.2s infinite";
        state.rummageCount++;
        setTimeout(() => {
            bin.style.animation = "";
            // 所有来源是“回收站”的物品
            const trashPool = Object.keys(ITEMS).filter(k => ITEMS[k].from.includes('回收站'));
            let k;
            const r = Math.random();
            if (r < 0.05) {
                // 5% 出稀有品（crystal, gear）
                const rares = trashPool.filter(id => ITEMS[id].type === 'rare');
                k = rares[Math.floor(Math.random() * rares.length)] || 'butt';
            } else if (r < 0.20) {
                // 15% 出稍微好点的垃圾 (battery, box)
                const mid = trashPool.filter(id => id === 'battery' || id === 'box');
                k = mid[Math.floor(Math.random() * mid.length)] || 'butt';
            } else {
                // 80% 出普通垃圾
                const junks = trashPool.filter(id => ITEMS[id].type === 'junk' && id !== 'battery' && id !== 'box');
                k = junks[Math.floor(Math.random() * junks.length)] || 'butt';
            }
            gainItem(k);
            updateUI();
            isRummaging = false;
        }, 400);
    }

    // --- 迷你游戏相关 ---
    function bindPad(onMove) {
        document.querySelectorAll('.v-btn').forEach(btn => {
            const move = (e) => {
                e.preventDefault();
                onMove(parseInt(btn.dataset.dx), parseInt(btn.dataset.dy));
            };
            btn.ontouchstart = (e) => {
                e.preventDefault();
                move(e);
                lpTimer = setInterval(() => onMove(parseInt(btn.dataset.dx), parseInt(btn.dataset.dy)), 120);
                const stop = () => { clearInterval(lpTimer); lpTimer = null; };
                document.addEventListener('touchend', stop, { once: true });
                document.addEventListener('mouseup', stop, { once: true });
            };
            btn.onmousedown = (e) => {
                e.preventDefault();
                move(e);
                lpTimer = setInterval(() => onMove(parseInt(btn.dataset.dx), parseInt(btn.dataset.dy)), 120);
                const stop = () => { clearInterval(lpTimer); lpTimer = null; };
                document.addEventListener('mouseup', stop, { once: true });
            };
        });
    }

    function startSnake() {
        if (gameLoop) clearInterval(gameLoop);
        const stage = document.getElementById('game-stage');
        stage.innerHTML = `<canvas id="gc" width="300" height="240"></canvas>
            <div class="v-pad"><div></div><div class="v-btn" data-dx="0" data-dy="-1">↑</div><div></div>
            <div class="v-btn" data-dx="-1" data-dy="0">←</div><div></div><div class="v-btn" data-dx="1" data-dy="0">→</div>
            <div></div><div class="v-btn" data-dx="0" data-dy="1">↓</div></div>`;
        const ctx = document.getElementById('gc').getContext('2d');
        let s = [{ x: 10, y: 8 }], d = { x: 0, y: 0 }, f, sc = 0, lastD = { x: 0, y: 0 };
        do {
            f = { x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 16) };
        } while (s.some(p => p.x === f.x && p.y === f.y));
        bindPad((nx, ny) => { if (nx !== -lastD.x || ny !== -lastD.y) d = { x: nx, y: ny }; });
        gameLoop = setInterval(() => {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 300, 240);
            if (d.x || d.y) {
                lastD = d;
                let h = { x: s[0].x + d.x, y: s[0].y + d.y };
                if (h.x < 0) h.x = 19; if (h.x >= 20) h.x = 0;
                if (h.y < 0) h.y = 15; if (h.y >= 16) h.y = 0;
                if (s.some(p => p.x === h.x && p.y === h.y)) {
                    clearInterval(gameLoop);
                    state.frags += sc;
                    updateUI();
                    return notify("游戏结束", "info");
                }
                s.unshift(h);
                if (h.x === f.x && h.y === f.y) {
                    sc++;
                    do {
                        f = { x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 16) };
                    } while (s.some(p => p.x === f.x && p.y === f.y));
                } else {
                    s.pop();
                }
            }
            ctx.fillStyle = "#00f2ff"; s.forEach(p => ctx.fillRect(p.x * 15, p.y * 15, 14, 14));
            ctx.fillStyle = "#ff0055"; ctx.fillRect(f.x * 15, f.y * 15, 14, 14);
        }, 150);
    }

    function startMaze() {
        if (gameLoop) clearInterval(gameLoop);
        const stage = document.getElementById('game-stage');
        stage.innerHTML = `<canvas id="gc" width="300" height="240"></canvas>
            <div class="v-pad"><div></div><div class="v-btn" data-dx="0" data-dy="-1">↑</div><div></div>
            <div class="v-btn" data-dx="-1" data-dy="0">←</div><div></div><div class="v-btn" data-dx="1" data-dy="0">→</div>
            <div></div><div class="v-btn" data-dx="0" data-dy="1">↓</div></div>`;
        const ctx = document.getElementById('gc').getContext('2d');
        let w = 15, h = 12, p = { x: 0, y: 0 }, m = [];
        const gen = () => {
            m = Array(h).fill().map(() => Array(w).fill(1));
            let stack = [{ x: 0, y: 0 }]; m[0][0] = 0;
            while (stack.length) {
                let curr = stack[stack.length - 1], n = [];
                [[0, 2], [0, -2], [2, 0], [-2, 0]].forEach(([dx, dy]) => {
                    let nx = curr.x + dx, ny = curr.y + dy;
                    if (nx >= 0 && nx < w && ny >= 0 && ny < h && m[ny][nx] === 1)
                        n.push({ x: nx, y: ny, dx: dx / 2, dy: dy / 2 });
                });
                if (n.length) {
                    let nxt = n[Math.floor(Math.random() * n.length)];
                    m[nxt.y][nxt.x] = 0; m[curr.y + nxt.dy][curr.x + nxt.dx] = 0;
                    stack.push(nxt);
                } else stack.pop();
            }
            m[h - 1][w - 1] = 0; m[h - 2][w - 1] = 0;
        };
        const draw = () => {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 300, 240);
            for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
                ctx.fillStyle = m[y][x] ? "#3d3452" : "#111";
                ctx.fillRect(x * 20, y * 20, 19, 19);
            }
            ctx.fillStyle = "#ffcc00"; ctx.fillRect((w - 1) * 20, (h - 1) * 20, 19, 19);
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(p.x * 20, p.y * 20, 19, 19);
        };
        gen(); draw();
        bindPad((dx, dy) => {
            let nx = p.x + dx, ny = p.y + dy;
            if (ny >= 0 && ny < h && nx >= 0 && nx < w && m[ny][nx] === 0) {
                p = { x: nx, y: ny }; draw();
                if (nx === w - 1 && ny === h - 1) {
                    state.frags += 5; updateUI();
                    notify("+5 碎片", "frag");
                    p = { x: 0, y: 0 }; gen(); draw();
                }
            }
        });
    }

    function startClaw() {
        if (gameLoop) clearInterval(gameLoop);
        const stage = document.getElementById('game-stage');
        stage.innerHTML = `<canvas id="gc" width="320" height="200"></canvas>
            <button class="btn success" style="margin-top:10px" onclick="window.dropClaw()">下 爪</button>`;
        const canvas = document.getElementById('gc'); const ctx = canvas.getContext('2d');
        let cx = 160, cy = 30, st = 'idle', items = [], target = null;
        const pool = Object.keys(ITEMS).filter(k => ITEMS[k].type === 'rare').concat(['frag']);
        const fill = () => { while (items.length < 4) items.push({ x: Math.random() * 280, y: 170, id: pool[Math.floor(Math.random() * pool.length)] }); };
        fill();
        window.dropClaw = () => { if (st === 'idle') st = 'down'; };
        gameLoop = setInterval(() => {
            ctx.fillStyle = "#0a0510"; ctx.fillRect(0, 0, 320, 200);
            ctx.fillStyle = "#2d1a1a"; ctx.fillRect(0, 190, 320, 10);
            items.forEach(it => { if (it !== target) it.x = (it.x + 1.2) % 300; });
            // 简单绘制
            items.forEach(it => {
                ctx.fillStyle = (it.id === 'frag' || it.id === 'blade' || it.id === 'chip') ? '#00f2ff' : (it.id === 'crystal' ? '#cc00ff' : '#fff');
                ctx.fillRect(it.x, it.y, 15, 15);
            });
            if (st === 'down') {
                cy += 5;
                if (cy > 150) { st = 'up'; target = items.find(it => Math.abs((it.x + 10) - cx) < 25); }
            } else if (st === 'up') {
                cy -= 3;
                if (target) { target.y = cy + 5; target.x = cx - 10; }
                if (cy <= 30) {
                    if (target) {
                        if (target.id === 'frag') { state.frags += 10; notify("+10 碎片", "frag"); }
                        else { gainItem(target.id); }
                        updateUI();
                        items = items.filter(i => i !== target);
                        fill();
                    }
                    st = 'idle'; target = null;
                }
            }
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, cy); ctx.stroke();
            ctx.fillStyle = "#ff0055"; ctx.fillRect(cx - 12, cy, 24, 10);
        }, 30);
    }

    function startTap() {
        if (gameLoop) clearInterval(gameLoop);
        const stage = document.getElementById('game-stage');
        stage.innerHTML = `<canvas id="gc" width="300" height="240"></canvas>
            <p style="font-size:10px;text-align:center;margin-top:5px">点击红/绿核心！</p>`;
        const canvas = document.getElementById('gc'); const ctx = canvas.getContext('2d');
        let nds = [];
        gameLoop = setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0, 0, 300, 240);
            if (Math.random() < 0.1) nds.push({ x: Math.random() * 260 + 20, y: Math.random() * 200 + 20, r: 15, life: 40 });
            nds.forEach(n => {
                ctx.fillStyle = n.life > 10 ? "#00ff55" : "red";
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r * (n.life / 40), 0, 7); ctx.fill();
                n.life--;
            });
            nds = nds.filter(n => n.life > 0);
        }, 40);
        canvas.onclick = (e) => {
            const r = canvas.getBoundingClientRect();
            const x = e.clientX - r.left, y = e.clientY - r.top;
            const hitIdx = nds.findIndex(n => Math.hypot(n.x - x, n.y - y) < 30);
            if (hitIdx !== -1) {
                nds.splice(hitIdx, 1);
                state.frags++;
                updateUI();
            }
        };
    }

    // --- 标签页路由 ---
    function switchTab(tab) {
        if (gameLoop) clearInterval(gameLoop);
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const tabs = ['draw', 'shop', 'stash', 'wiki', 'ach', 'games', 'trash'];
        const idx = tabs.indexOf(tab);
        if (idx !== -1) document.querySelectorAll('.nav-item')[idx].classList.add('active');
        const content = document.getElementById('content');

        if (tab === 'draw') {
            content.innerHTML = `
                <div class="pixel-card" style="text-align:center">
                    <h4 style="color:var(--primary); font-size:10px; margin-bottom:10px">CORE BLIND BOX ($1.00)</h4>
                    <div id="cube-stage" onclick="open3DBox()"><div id="cube" class="cube-spin"><div class="cube-face f-front">?</div><div class="cube-face f-back">?</div><div class="cube-face f-right">?</div><div class="cube-face f-left">?</div><div class="cube-face f-top">?</div><div class="cube-face f-bottom">?</div></div></div>
                </div>
                <div class="pixel-card" style="text-align:center">
                    <h4 style="color:var(--secondary); font-size:10px; margin-bottom:10px">SCRATCHER TICKET ($1.00)</h4>
                    <div class="scratch-grid">${[0,1,2].map(i => `<div class="card-slot" id="slot-${i}" onclick="scratch(${i})"><div class="card-inner"><div class="card-face card-back">?</div><div class="card-face card-front"></div></div></div>`).join('')}</div>
                </div>`;
        } else if (tab === 'shop') {
            let h = `<h3>碎片兑换中心</h3>`;
            Object.keys(ITEMS).filter(k => ITEMS[k].type === 'rare').forEach(k => {
                const it = ITEMS[k];
                const owned = (k === 'console' && state.inventory.console > 0);
                h += `<div class="pixel-card" style="display:flex; justify-content:space-between; align-items:center">
                    <div style="display:flex;align-items:center">${it.icon.replace('svg-icon','svg-icon-s')} <div style="margin-left:10px">${it.name}<br><small style="color:var(--secondary)">${it.price} 碎片</small></div></div>
                    <button class="btn secondary" style="width:65px; margin:0; padding:5px" ${state.frags>=it.price && !owned ? '' : 'disabled'} onclick="buy('${k}')">${owned?'已持有':'兑换'}</button>
                </div>`;
            });
            content.innerHTML = h;
        } else if (tab === 'stash') {
            const rares = Object.keys(state.inventory).filter(k => ITEMS[k].type === 'rare' && state.inventory[k] > 0);
            const junks = Object.keys(state.inventory).filter(k => ITEMS[k].type === 'junk' && state.inventory[k] > 0);
            let h = `<h3>珍品仓</h3><div class="shelf-container">`;
            const rows = Math.max(1, Math.ceil(rares.length / 3));
            for (let r = 0; r < rows; r++) {
                h += `<div class="shelf-row">`;
                for (let i = 0; i < 3; i++) {
                    const k = rares[r * 3 + i];
                    if (k) h += `<div class="shelf-item">${state.inventory[k] > 1 ? `<span style="position:absolute;top:-5px;right:-5px;background:red;font-size:8px;padding:1px 3px;border-radius:3px">x${state.inventory[k]}</span>` : ''}${ITEMS[k].icon}</div>`;
                }
                h += `</div>`;
            }
            h += `</div><h4 style="margin-top:15px">资源拆解</h4>`;
            rares.forEach(k => {
                if (k === 'console') return;
                h += `<div class="pixel-card" style="display:flex;justify-content:space-between;padding:8px;align-items:center"><span>${ITEMS[k].name} (x${state.inventory[k]})</span><button class="btn danger" style="width:55px;margin:0;padding:5px;font-size:10px" onclick="salvage('${k}')">拆解</button></div>`;
            });
            h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px"><h3>回收暂存</h3><button class="btn success" style="width:80px;font-size:10px" onclick="sellAllJunk()">一键清理</button></div>`;
            junks.forEach(k => {
                h += `<div class="pixel-card" style="display:flex;justify-content:space-between;padding:8px;align-items:center"><div style="display:flex;align-items:center">${ITEMS[k].icon.replace('svg-icon','svg-icon-s')} <span style="margin-left:8px">${ITEMS[k].name} (x${state.inventory[k]})</span></div><button class="btn success" style="width:50px;margin:0;padding:5px;font-size:10px" onclick="sellJunk('${k}')">出售</button></div>`;
            });
            content.innerHTML = h;
        } else if (tab === 'wiki') {
            let h = `<h3>万物图鉴</h3><div class="wiki-grid">`;
            Object.keys(ITEMS).forEach(k => {
                const isGot = state.unlocked.includes(k);
                h += `<div class="wiki-card ${isGot ? '' : 'locked'}">${isGot ? ITEMS[k].icon.replace('svg-icon', 'svg-icon-s') : '❓'}<div><strong>${isGot ? ITEMS[k].name : '???'}</strong><br><small>来源: ${ITEMS[k].from}</small></div></div>`;
            });
            content.innerHTML = h + `</div>`;
        } else if (tab === 'ach') {
            let h = `<h3>荣誉墙</h3><div class="ach-list">`;
            ACH_DEFS.forEach(d => {
                const got = state.achieved.includes(d.id);
                h += `<div class="ach-card ${got ? 'unlocked' : 'locked'}">
                    <div style="font-size:24px">${got ? '🏆' : '🔒'}</div>
                    <div><strong>${d.n}</strong><br><small>${d.d} (奖励 $${d.r})</small></div>
                </div>`;
            });
            content.innerHTML = h + `</div>`;
        } else if (tab === 'games') {
            if (!state.inventory.console) content.innerHTML = `<div class="pixel-card" style="text-align:center; padding:50px 10px"><h2>🔒 需要硬件</h2><p>请先在商店兑换 [数码游戏机]。</p></div>`;
            else content.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px"><button class="btn" onclick="startSnake()">贪吃蛇</button><button class="btn secondary" onclick="startMaze()">像素迷宫</button><button class="btn" style="background:#cc00ff" onclick="startClaw()">抓娃娃机</button><button class="btn" style="background:var(--accent);color:#000" onclick="startTap()">核心暴击</button></div><div id="game-stage"></div>`;
        } else if (tab === 'trash') {
            content.innerHTML = `<div class="pixel-card" style="text-align:center; padding:30px 10px"><h3>电子回收站</h3><div style="padding:20px 0" id="trash-bin" onclick="rummage()">${ICONS.trashcan}</div><p style="opacity:0.6;font-size:10px">寻找遗失之物 (捡到物品存入仓库)</p></div>`;
        }
    }

    // --- 指南关闭 ---
    function closeGuide() {
        document.getElementById('guide-overlay').style.display = 'none';
        localStorage.setItem('cyber_guide_seen', '1');
    }

    // --- 初始化 ---
    window.onload = () => {
        load();
        if (!localStorage.getItem('cyber_guide_seen')) {
            document.getElementById('guide-overlay').style.display = 'flex';
        } else {
            document.getElementById('guide-overlay').style.display = 'none';
        }
        switchTab('draw');
    };
