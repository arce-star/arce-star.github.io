<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学庐 · 翻译 & 单词本</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans:wght@400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f5ead0; --parchment-dark: #eadbba; --parchment-light: #faf3e3;
            --ink: #3b2a1a; --ink-light: #6b5a4a; --ink-muted: #9b8a7a;
            --accent: #8b4513; --accent-gold: #b8860b; --accent-green: #5a7a4a;
            --accent-red: #a0523d; --accent-blue: #4a6070;
            --border: #d4c4a8; --border-light: #e0d4bc;
            --shadow: 0 3px 16px rgba(60,30,10,0.08);
            --shadow-lg: 0 8px 36px rgba(60,30,10,0.14);
            --radius: 6px;
            --font-heading: "Noto Serif SC", "Ma Shan Zheng", serif;
            --font-body: "Noto Sans SC", "Noto Sans", sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-body);
            background: #3b2a1a;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(139,90,40,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(90,70,40,0.1) 0%, transparent 60%);
            color: var(--ink); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center;
        }

        /* ── Outer Frame (like a desk) ──── */
        .desk {
            width: 100%; max-width: 100%;
            display: flex; flex-direction: column;
            min-height: 100vh;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,69,19,0.02) 2px, rgba(139,69,19,0.02) 4px),
                linear-gradient(180deg, #f5ead0 0%, #efe0c4 100%);
        }

        /* ── Top Bar ────────────────────── */
        .topbar {
            background: linear-gradient(180deg, #faf3e3 0%, #f0e4cc 100%);
            border-bottom: 2px solid var(--border);
            padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .topbar-brand {
            display: flex; align-items: center; gap: 10px;
            font-family: var(--font-heading); font-size: 1.3rem;
            font-weight: 700; color: var(--ink);
            letter-spacing: 0.06em;
        }
        .topbar-brand .quill { font-size: 1.5rem; }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--ink-light); text-decoration: none;
            font-size: 0.85rem; transition: color 0.2s;
            font-family: var(--font-heading);
        }
        .back-link:hover { color: var(--accent); }

        /* ── Main Layout: Sidebar + Content ─ */
        .layout {
            display: flex; flex: 1; overflow: hidden;
        }

        /* ── Sidebar ────────────────────── */
        .sidebar {
            width: 240px; min-width: 240px;
            background: linear-gradient(180deg, #faf3e3 0%, #f2e6d0 100%);
            border-right: 2px solid var(--border);
            padding: 16px 0;
            display: flex; flex-direction: column;
            gap: 0;
            overflow-y: auto;
            box-shadow: 2px 0 12px rgba(0,0,0,0.04);
        }
        .sidebar-section {
            padding: 8px 16px 4px; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--ink-muted); font-weight: 600;
        }
        .sidebar-list { list-style: none; }
        .sidebar-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px; cursor: pointer;
            font-size: 0.88rem; color: var(--ink-light);
            transition: all 0.15s; border-left: 3px solid transparent;
            font-family: var(--font-heading); letter-spacing: 0.03em;
        }
        .sidebar-item:hover { background: rgba(139,69,19,0.06); color: var(--ink); }
        .sidebar-item.active {
            background: rgba(139,69,19,0.1); color: var(--ink);
            border-left-color: var(--accent); font-weight: 600;
        }
        .sidebar-item .nb-count {
            margin-left: auto; font-size: 0.72rem; color: var(--ink-muted);
            min-width: 22px; text-align: center;
        }
        .sidebar-item .nb-icon { color: var(--accent-gold); font-size: 0.8rem; width: 18px; text-align: center; }
        .sidebar-add {
            margin: 8px 16px; padding: 8px 14px;
            border: 1px dashed var(--border); border-radius: var(--radius);
            background: transparent; cursor: pointer;
            font-family: var(--font-heading); font-size: 0.82rem;
            color: var(--ink-muted); transition: all 0.2s;
            text-align: center; letter-spacing: 0.03em;
        }
        .sidebar-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(139,69,19,0.04); }

        .sidebar-footer {
            margin-top: auto; padding: 16px;
            border-top: 1px solid var(--border-light);
            font-size: 0.68rem; color: var(--ink-muted);
            text-align: center; letter-spacing: 0.04em;
        }
        @media(max-width:720px) {
            .sidebar { width: 100%; min-width: 100%; border-right: none; border-bottom: 2px solid var(--border); flex-direction: row; flex-wrap: wrap; padding: 8px 12px; gap: 4px; overflow-x: auto; }
            .sidebar-section { display: none; }
            .sidebar-list { display: flex; gap: 4px; flex-wrap: wrap; }
            .sidebar-item { padding: 6px 12px; font-size: 0.78rem; border-left: none; border-bottom: 2px solid transparent; border-radius: var(--radius); }
            .sidebar-item.active { border-bottom-color: var(--accent); border-left-color: transparent; }
            .sidebar-add { margin: 4px; padding: 6px 12px; font-size: 0.76rem; }
            .sidebar-footer { display: none; }
            .layout { flex-direction: column; }
        }

        /* ── Main Content ────────────────── */
        .main-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

        /* ── Tab Nav ─────────────────────── */
        .tab-nav {
            display: flex; gap: 0;
            background: linear-gradient(180deg, #faf3e3 0%, #f2e6d0 100%);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
        }
        .tab-btn {
            padding: 13px 24px; border: none; background: none;
            cursor: pointer; font-family: var(--font-heading); font-size: 0.9rem;
            color: var(--ink-muted); letter-spacing: 0.05em;
            border-bottom: 2px solid transparent;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .tab-btn:hover { color: var(--ink); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
        .tab-panel { display: none; padding: 20px; flex: 1; }
        .tab-panel.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from {opacity:0;transform:translateY(6px)} to {opacity:1;transform:translateY(0)} }

        /* ── Shared Components ───────────── */
        .card-box {
            background: var(--parchment-light);
            border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
            box-shadow: var(--shadow); margin-bottom: 16px;
            position: relative;
        }
        .card-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent), var(--accent-gold));
            border-radius: var(--radius) var(--radius) 0 0; opacity: 0.4;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 20px; border-radius: 3px; cursor: pointer;
            font-size: 0.87rem; font-family: var(--font-heading); letter-spacing: 0.04em;
            transition: all 0.2s; border: 1px solid var(--border);
            background: var(--parchment-light); color: var(--ink-light);
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); background: #fdf6ea; }
        .btn-pri {
            background: linear-gradient(180deg, #8b5e3c 0%, #6b3a1f 100%);
            color: #f5ead0; border: 1px solid #5a2a10;
        }
        .btn-pri:hover { background: linear-gradient(180deg, #9b6e4c 0%, #7b4a2f 100%); color: #fff; border-color: #4a1a00; }
        .btn-pri:disabled { opacity: 0.5; pointer-events: none; }
        .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
        .btn-icon { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; }
        .btn-danger { border-color: #d4b0a0; color: var(--accent-red); }
        .btn-danger:hover { border-color: var(--accent-red); background: #fdf0ea; }
        .input {
            padding: 9px 14px; border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 0.92rem; font-family: var(--font-body); background: var(--parchment-light);
            color: var(--ink); transition: border-color 0.2s;
        }
        .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,69,19,0.06); }
        .input::placeholder { color: #c8b898; }
        .status-msg { text-align:center; min-height:1.5em; font-size:0.82rem; margin-top:6px; font-family:var(--font-heading); }
        .status-msg.error { color:var(--accent-red); }
        .status-msg.success { color:var(--accent-green); }

        /* ── Section Heading ─────────────── */
        .sec-heading {
            font-family: var(--font-heading); font-size: 1.05rem;
            color: var(--accent); letter-spacing: 0.06em;
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .sec-heading::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* ═══════════════════════════════════
           TAB 1: TRANSLATE
           ═══════════════════════════════════ */
        .tr-row { display:flex; gap:12px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
        .tr-sel { flex:1; min-width:120px; }
        .tr-swap {
            width:38px; height:38px; border-radius:50%; border:1px solid var(--border);
            background:var(--parchment-light); cursor:pointer; display:flex; align-items:center;
            justify-content:center; color:var(--ink-muted); transition:all 0.3s; flex-shrink:0;
        }
        .tr-swap:hover { border-color:var(--accent); color:var(--accent); transform:rotate(180deg); }
        .tr-areas { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:14px; flex: 1; }
        @media(max-width:640px){ .tr-areas{grid-template-columns:1fr} }
        .tr-box {
            background:var(--parchment-light); border:1px solid var(--border);
            border-radius:var(--radius); display:flex; flex-direction:column;
            position:relative; min-height: 0;
        }
        .tr-box::before {
            content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
            background: repeating-linear-gradient(90deg, var(--border) 0px, var(--border) 2px, transparent 2px, transparent 4px);
            opacity: 0.5; z-index: 1;
        }
        .tr-box-label {
            font-size:0.78rem; color:var(--ink-muted); padding:16px 20px 0;
            letter-spacing:0.06em; font-family:var(--font-heading);
        }
        .tr-box textarea {
            flex:1; border:none; background:transparent; resize:none;
            padding:12px 20px 16px; font-family:var(--font-body); font-size:1rem;
            color:var(--ink); line-height:2; min-height:280px; outline:none;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(139,100,50,0.06) 31px, rgba(139,100,50,0.06) 32px);
        }
        .tr-box textarea::placeholder { color:#c8b898; }
        .tr-copy {
            position:absolute; top:10px; right:14px; width:32px; height:32px;
            border-radius:50%; border:1px solid var(--border); background:var(--parchment-light);
            cursor:pointer; color:var(--ink-muted); font-size:0.8rem; z-index:2;
            display:flex; align-items:center; justify-content:center; transition:all 0.2s;
        }
        .tr-copy:hover { border-color:var(--accent); color:var(--accent); }
        .tr-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
        .tr-char-count { text-align:right; font-size:0.72rem; color:var(--ink-muted); padding:0 18px 8px; font-family:var(--font-heading); }

        /* ═══════════════════════════════════
           TAB 2: VOCABULARY
           ═══════════════════════════════════ */
        .vocab-toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
        .batch-bar {
            display: none; align-items: center; gap: 10px; padding: 10px 16px;
            background: rgba(139,69,19,0.06); border-radius: var(--radius); margin-bottom: 14px;
            border: 1px solid var(--border);
        }
        .batch-bar.show { display: flex; }
        .vocab-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
            gap:14px; flex: 1; align-content: start;
        }
        @media(min-width:1400px){ .vocab-grid{grid-template-columns:repeat(auto-fill, minmax(340px, 1fr))} }
        @media(max-width:640px){ .vocab-grid{grid-template-columns:1fr} }

        .word-card {
            background: var(--parchment-light);
            border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px;
            box-shadow: var(--shadow); transition: all 0.3s;
            position: relative; cursor: default;
        }
        .word-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
        .word-card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,69,19,0.1); background: #fef9f0; }
        .word-card .wc-check {
            position: absolute; top: 12px; left: 14px;
            width: 22px; height: 22px; border-radius: 3px;
            border: 2px solid var(--border); background: var(--parchment-light);
            cursor: pointer; display: none; align-items: center; justify-content: center;
            font-size: 0.65rem; color: #fff; transition: all 0.15s; z-index: 2;
        }
        .word-card.batch-mode .wc-check { display: flex; }
        .word-card.selected .wc-check { background: var(--accent); border-color: var(--accent); }
        .word-card .wc-word {
            font-family: var(--font-heading); font-size: 1.25rem; font-weight: 700;
            color: var(--ink); margin-bottom: 1px;
        }
        .word-card .wc-phonetic {
            font-family: "Noto Sans", sans-serif;
            font-size: 0.84rem; color: var(--accent); margin-bottom: 6px;
            font-weight: 400; font-style: normal; letter-spacing: 0.01em;
        }
        .word-card .wc-pos {
            display:inline-block; padding:2px 10px; border-radius:3px;
            font-size:0.72rem; background:rgba(139,69,19,0.08); color:var(--accent);
            margin-bottom:8px; font-family:var(--font-heading);
        }
        .word-card .wc-field { font-size:0.86rem; margin-bottom:5px; }
        .word-card .wc-field-label {
            font-size:0.68rem; color:var(--ink-muted); letter-spacing:0.06em;
            text-transform:uppercase; font-family:var(--font-heading);
        }
        .word-card .wc-example {
            font-size:0.82rem; color:#4a5a3a; background:rgba(90,122,74,0.06);
            padding:8px 12px; border-radius:4px; line-height:1.6;
            border-left:3px solid var(--accent-green);
        }
        .word-card .wc-del {
            position:absolute; top:10px; right:12px;
            width:28px; height:28px; border-radius:50%;
            border:1px solid transparent; background:transparent;
            cursor:pointer; color:var(--ink-muted); font-size:0.7rem;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.2s;
        }
        .word-card .wc-del:hover { border-color:var(--accent-red); color:var(--accent-red); }
        .word-card.batch-mode .wc-del { display: none; }
        .vocab-empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--ink-muted); font-family:var(--font-heading); }
        .vocab-empty i { font-size:2.5rem; margin-bottom:10px; display:block; opacity:0.4; }

        /* ═══════════════════════════════════
           TAB 3: FLASHCARDS
           ═══════════════════════════════════ */
        .fc-area { display:flex; flex-direction:column; align-items:center; flex:1; gap:16px; }
        .flashcard-container {
            perspective: 1200px;
            width: 100%; max-width: 560px; height: 380px;
            cursor: pointer; flex-shrink: 0;
        }
        @media(max-width:500px){ .flashcard-container{height:280px} }
        .flipper {
            width:100%; height:100%; position:relative;
            transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
            border-radius: var(--radius);
        }
        .flipper.flipped { transform:rotateY(180deg); }
        .fc-front, .fc-back {
            position:absolute; inset:0; backface-visibility:hidden;
            border-radius:var(--radius); border:2px solid var(--border);
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; padding:32px;
            box-shadow:var(--shadow-lg);
            background: linear-gradient(135deg, #fdf6ea 0%, #f5ead0 100%);
        }
        .fc-front::before, .fc-back::before {
            content: ''; position: absolute; inset: 12px;
            border: 1px solid rgba(139,69,19,0.1); border-radius: 4px;
            pointer-events: none;
        }
        .fc-back {
            background:linear-gradient(135deg, #fdf6ea 0%, #f0e8d4 100%);
            transform:rotateY(180deg); overflow-y:auto; justify-content:flex-start;
        }
        .fc-word { font-family:var(--font-heading); font-size:2.4rem; font-weight:700; color:var(--ink); letter-spacing:0.04em; margin-bottom:8px; }
        @media(max-width:500px){ .fc-word{font-size:1.8rem} }
        .fc-hint { font-size:0.82rem; color:var(--ink-muted); font-family:var(--font-heading); }
        .fc-back .fc-word { font-size:1.4rem; margin:0 0 6px; }
        .fc-back .wc-phonetic { margin-bottom:8px; }
        .fc-back .wc-field { text-align:left; width:100%; }
        .fc-btn-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
        .fc-progress {
            display:flex; gap:10px; justify-content:center; align-items:center;
            font-size:0.84rem; color:var(--ink-muted); font-family:var(--font-heading);
        }
        .fc-progress-bar {
            width:220px; height:6px; border-radius:3px; background:var(--border-light); overflow:hidden;
        }
        .fc-progress-bar div { height:100%; border-radius:3px; background:var(--accent); transition:width 0.3s; }

        /* ═══════════════════════════════════
           TAB 4: QUIZ
           ═══════════════════════════════════ */
        .quiz-setup { text-align:center; }
        .quiz-question {
            font-family:var(--font-heading); font-size:1.3rem; font-weight:600;
            text-align:center; margin-bottom:20px; color:var(--accent);
        }
        .quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:560px; margin:0 auto 20px; }
        @media(max-width:500px){ .quiz-options{grid-template-columns:1fr} }
        .quiz-opt {
            padding:14px 20px; border:2px solid var(--border); border-radius:var(--radius);
            background:var(--parchment-light); cursor:pointer; font-size:1rem;
            font-family:var(--font-heading); text-align:center; transition:all 0.2s;
        }
        .quiz-opt:hover { border-color:var(--accent); background:#fdf6ea; }
        .quiz-opt.correct { border-color:var(--accent-green); background:#e8f0e4; color:#3a5a3a; }
        .quiz-opt.wrong { border-color:var(--accent-red); background:#f8ece8; color:#7a3a3a; }
        .quiz-score { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; }
        .quiz-score-item { text-align:center; }
        .quiz-score-item .num { font-family:var(--font-heading); font-size:1.8rem; font-weight:700; color:var(--accent); }
        .quiz-score-item .lbl { font-size:0.78rem; color:var(--ink-muted); font-family:var(--font-heading); }
        .quiz-history { margin-top:16px; overflow-x:auto; }
        .quiz-history table { width:100%; border-collapse:collapse; font-size:0.82rem; }
        .quiz-history th, .quiz-history td { padding:8px 14px; text-align:center; border-bottom:1px solid var(--border-light); font-family:var(--font-heading); }
        .quiz-history th { color:var(--ink-muted); font-weight:500; font-size:0.73rem; letter-spacing:0.05em; }

        /* ── Notebook Modal ──────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(30,15,5,0.5);
            z-index: 999; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--parchment-light);
            border: 2px solid var(--border);
            border-radius: var(--radius); padding: 24px;
            box-shadow: var(--shadow-lg); min-width: 320px; max-width: 90vw;
            position: relative;
        }
        .modal::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent), var(--accent-gold));
            border-radius: var(--radius) var(--radius) 0 0; opacity: 0.5;
        }
        .modal h3 {
            font-family: var(--font-heading); margin-bottom: 16px;
            color: var(--accent); letter-spacing: 0.06em;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

        .footer { text-align:center; padding:8px 20px 20px; color:var(--ink-muted); font-size:0.7rem; font-family:var(--font-heading); letter-spacing:0.06em; }
    </style>
</head>
<body>
<script>
if(!sessionStorage.getItem('_arce_session')){

<script>
// ═══════════════════════════════════════════════════
//  DATA MODEL
// ═══════════════════════════════════════════════════
const DS_API = "https://api.deepseek.com/chat/completions";
const LANG_NAMES = {auto:"自动检测",zh:"中文",en:"English",ja:"日本語",ko:"한국어",fr:"Français",de:"Deutsch",es:"Español",ru:"Русский",pt:"Português",ar:"العربية",th:"ไทย",vi:"Tiếng Việt"};

// Notebooks: { id, name, cards: [], createdAt }
// cards: { id, word, phonetic, partOfSpeech, meaning, phrases, example, createdAt }
function loadNotebooks() { try{return JSON.parse(localStorage.getItem("notebooks"))||[]}catch(e){return[]} }
function saveNotebooks(nb) { localStorage.setItem("notebooks", JSON.stringify(nb)); }
function getKey() { return localStorage.getItem("deepseek_api_key")||""; }
function loadQuizHistory() { try{return JSON.parse(localStorage.getItem("quiz_history"))||[]}catch(e){return[]} }

let currentNbId = null;
let batchMode = false;
let selectedCards = new Set();

function getCurrentNb() {
    const nbs = loadNotebooks();
    if (!currentNbId && nbs.length > 0) currentNbId = nbs[0].id;
    return nbs.find(n => n.id === currentNbId) || null;
}

function getCurrentCards() { const nb = getCurrentNb(); return nb ? nb.cards : []; }
function saveCurrentCards(cards) {
    const nbs = loadNotebooks();
    const nb = nbs.find(n => n.id === currentNbId);
    if (nb) { nb.cards = cards; saveNotebooks(nbs); }
}

// ═══════════════════════════════════════════════════
//  NOTEBOOK UI
// ═══════════════════════════════════════════════════
function renderNotebooks() {
    const nbs = loadNotebooks();
    if (nbs.length === 0) {
        // Create default notebook
        const def = { id: Date.now(), name: "默认笔记本", cards: [], createdAt: new Date().toISOString() };
        saveNotebooks([def]);
        currentNbId = def.id;
    }
    const list = document.getElementById("notebookList");
    const nbs2 = loadNotebooks();
    list.innerHTML = nbs2.map(n => `
        <li class="sidebar-item${n.id === currentNbId ? ' active' : ''}" onclick="switchNotebook(${n.id})">
            <span class="nb-icon"><i class="fas fa-book"></i></span>
            ${esc(n.name)}
            <span class="nb-count">${n.cards.length}</span>
        </li>
    `).join("");
    updateNbLabels();
}

function switchNotebook(id) {
    currentNbId = id;
    batchMode = false; selectedCards.clear();
    document.getElementById("batchBar").classList.remove("show");
    document.getElementById("batchToggleBtn").innerHTML = '<i class="fas fa-tasks"></i> 批量管理';
    renderNotebooks();
    renderVocab();
}

function updateNbLabels() {
    const nb = getCurrentNb();
    document.getElementById("currentNbName").textContent = nb ? nb.name : "";
    document.getElementById("qzNbLabel").textContent = nb ? nb.name : "";
}

function showNotebookModal(editId) {
    document.getElementById("nbModal").classList.add("show");
    if (editId) {
        const nb = loadNotebooks().find(n => n.id === editId);
        document.getElementById("nbModalTitle").textContent = "重命名笔记本";
        document.getElementById("nbNameInput").value = nb ? nb.name : "";
        document.getElementById("nbModalBtn").textContent = "保存";
        document.getElementById("nbModalBtn").onclick = function() { saveNotebook(editId); };
    } else {
        document.getElementById("nbModalTitle").textContent = "新建笔记本";
        document.getElementById("nbNameInput").value = "";
        document.getElementById("nbModalBtn").textContent = "创建";
        document.getElementById("nbModalBtn").onclick = function() { saveNotebook(); };
    }
}

function closeNotebookModal() { document.getElementById("nbModal").classList.remove("show"); }

function saveNotebook(editId) {
    const name = document.getElementById("nbNameInput").value.trim();
    if (!name) return;
    const nbs = loadNotebooks();
    if (editId) {
        const nb = nbs.find(n => n.id === editId);
        if (nb) nb.name = name;
    } else {
        nbs.push({ id: Date.now(), name, cards: [], createdAt: new Date().toISOString() });
        currentNbId = nbs[nbs.length - 1].id;
    }
    saveNotebooks(nbs);
    closeNotebookModal();
    renderNotebooks();
    renderVocab();
}

// ═══════════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════════
document.querySelectorAll(".tab-btn").forEach(b => {
    b.addEventListener("click", function() {
        document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(x => x.classList.remove("active"));
        this.classList.add("active");
        document.getElementById("tab-" + this.dataset.tab).classList.add("active");
        if (this.dataset.tab === "vocabulary") renderVocab();
        if (this.dataset.tab === "flashcards") { initFC(); renderFC(); }
        if (this.dataset.tab === "quiz") renderQuizHistory();
    });
});

// ═══════════════════════════════════════════════════
//  API KEY
// ═══════════════════════════════════════════════════
function saveKey() {
    const k = document.getElementById("apiKeyInp").value.trim();
    if (!k) return;
    if (!k.startsWith("sk-")) { document.getElementById("keyHint").textContent = "格式错误"; return; }
    localStorage.setItem("deepseek_api_key", k);
    document.getElementById("keyHint").textContent = "已保存 ✓";
    setTimeout(() => document.getElementById("keyHint").textContent = "", 3000);
}

// ═══════════════════════════════════════════════════
//  TAB 1: TRANSLATE
// ═══════════════════════════════════════════════════
function swapLangs() {
    const s = document.getElementById("srcLang"), t = document.getElementById("tgtLang");
    if (s.value === "auto") return;
    [s.value, t.value] = [t.value, s.value];
}

async function doTranslate() {
    const key = getKey(); if (!key) { trStatus("请先在侧栏设置 API Key","error"); return; }
    const src = document.getElementById("srcText").value.trim();
    if (!src) { trStatus("请输入文字","error"); return; }
    const sl = document.getElementById("srcLang").value, tl = document.getElementById("tgtLang").value;
    const sn = LANG_NAMES[sl], tn = LANG_NAMES[tl];
    const btn = document.getElementById("trBtn");
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 翻译中……';
    const sp = sl==="auto" ? `检测语言并翻译为${tn}` : `将文本从${sn}翻译为${tn}`;
    try {
        const r = await fetch(DS_API, {
            method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
            body:JSON.stringify({model:"deepseek-chat",messages:[{role:"system",content:`你是翻译助手。${sp}。只输出译文。`},{role:"user",content:src}],temperature:0.3,max_tokens:4096})
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error?.message);
        document.getElementById("tgtText").value = d.choices[0].message.content.trim();
        trStatus("翻译完成","success");
    } catch(e) { trStatus("失败: "+e.message,"error"); }
    finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-feather-alt"></i> 翻译'; }
}
function copyTranslation() {
    const t = document.getElementById("tgtText").value;
    if (t) navigator.clipboard.writeText(t).then(() => trStatus("已复制","success"));
}
function trStatus(m,type) { const e=document.getElementById("trStatus"); e.textContent=m; e.className="status-msg "+(type||""); }

// ═══════════════════════════════════════════════════
//  TAB 2: VOCABULARY
// ═══════════════════════════════════════════════════
async function fetchWordInfo(word) {
    const key = getKey(); if (!key) throw new Error("请先设置 API Key");
    const prompt = `你是英语词典助手。为"${word}"生成单词卡。严格返回JSON，不含其他文字：
{"word":"${word}","phonetic":"IPA音标","partOfSpeech":"词性","meaning":"中文释义","phrases":"词组: look after: 照顾","example":"英文例句。中文翻译。"}`;
    const r = await fetch(DS_API, {
        method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
        body:JSON.stringify({model:"deepseek-chat",messages:[{role:"system",content:"你是词典助手，只返回JSON。"},{role:"user",content:prompt}],temperature:0.3,max_tokens:2048})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error?.message);
    const m = d.choices[0].message.content.trim().match(/\{[\s\S]*\}/);
    if (!m) throw new Error("格式异常");
    return {...JSON.parse(m[0]), id:Date.now(), createdAt:new Date().toISOString()};
}

async function addWords() {
    const input = document.getElementById("wordInput").value.trim();
    if (!input) return;
    const words = [...new Set(input.split(/[，,、\s]+/).filter(Boolean).map(w=>w.toLowerCase().trim()))];
    const btn = document.getElementById("addWordBtn");
    btn.disabled = true;
    const cards = getCurrentCards();
    let added = 0, skipped = 0;
    for (let i=0; i<words.length; i++) {
        const w = words[i];
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> (${i+1}/${words.length})`;
        if (cards.find(c=>c.word.toLowerCase()===w)) { skipped++; continue; }
        try {
            const info = await fetchWordInfo(w);
            cards.unshift(info);
            saveCurrentCards(cards);
            added++;
        } catch(e) { vocabStatus(`${w}: ${e.message}`,"error"); }
        if (i<words.length-1) await new Promise(r=>setTimeout(r,600));
    }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-plus"></i> 添加';
    document.getElementById("wordInput").value="";
    const msgs = []; if (added) msgs.push(`添加 ${added} 个`); if (skipped) msgs.push(`${skipped} 个已存在`);
    vocabStatus(msgs.join("；"),"success");
    renderVocab(); renderNotebooks();
}

function renderVocab() {
    const cards = getCurrentCards();
    const q = document.getElementById("vocabSearch").value.trim().toLowerCase();
    const filtered = q ? cards.filter(c => c.word.toLowerCase().includes(q)||(c.meaning||"").includes(q)||(c.example||"").toLowerCase().includes(q)) : cards;
    const grid = document.getElementById("vocabGrid");
    if (!filtered.length) {
        grid.innerHTML = `<div class="vocab-empty"><i class="fas fa-feather-alt"></i><p>${q?'未找到匹配单词':'笔记本为空，在上方添加单词吧'}</p></div>`;
        return;
    }
    grid.innerHTML = filtered.map(c => {
        const sel = selectedCards.has(c.id);
        return `
        <div class="word-card${batchMode?' batch-mode':''}${sel?' selected':''}" data-id="${c.id}">
            <div class="wc-check" onclick="event.stopPropagation();toggleCardSelect(${c.id})"><i class="fas fa-check"></i></div>
            <button class="wc-del" onclick="delCard(${c.id})"><i class="fas fa-times"></i></button>
            <div class="wc-word">${esc(c.word)}</div>
            ${c.phonetic?`<div class="wc-phonetic">${esc(c.phonetic)}</div>`:''}
            ${c.partOfSpeech?`<span class="wc-pos">${esc(c.partOfSpeech)}</span>`:''}
            ${c.meaning?`<div class="wc-field"><div class="wc-field-label">释义</div>${esc(c.meaning)}</div>`:''}
            ${c.phrases?`<div class="wc-field"><div class="wc-field-label">词组</div>${esc(c.phrases)}</div>`:''}
            ${c.example?`<div class="wc-example">${esc(c.example)}</div>`:''}
        </div>`;
    }).join("");

    // Click handler on card for batch select
    if (batchMode) {
        grid.querySelectorAll(".word-card").forEach(el => {
            el.addEventListener("click", function() {
                const id = parseInt(this.dataset.id);
                toggleCardSelect(id);
            });
        });
    }

    document.getElementById("batchCount").textContent = `已选 ${selectedCards.size} 个`;
}

function toggleBatchMode() {
    batchMode = !batchMode;
    selectedCards.clear();
    document.getElementById("batchBar").classList.toggle("show", batchMode);
    document.getElementById("batchToggleBtn").innerHTML = batchMode ? '<i class="fas fa-times"></i> 退出管理' : '<i class="fas fa-tasks"></i> 批量管理';
    renderVocab();
}

function toggleCardSelect(id) {
    if (!batchMode) return;
    if (selectedCards.has(id)) selectedCards.delete(id);
    else selectedCards.add(id);
    renderVocab();
}

function batchDelete() {
    if (selectedCards.size === 0) return;
    if (!confirm(`确定删除选中的 ${selectedCards.size} 个单词吗？`)) return;
    const cards = getCurrentCards().filter(c => !selectedCards.has(c.id));
    saveCurrentCards(cards);
    selectedCards.clear();
    batchMode = false;
    document.getElementById("batchBar").classList.remove("show");
    document.getElementById("batchToggleBtn").innerHTML = '<i class="fas fa-tasks"></i> 批量管理';
    renderVocab();
    renderNotebooks();
}

function delCard(id) {
    if (!confirm("删除这个单词？")) return;
    saveCurrentCards(getCurrentCards().filter(c => c.id !== id));
    renderVocab();
    renderNotebooks();
}

function exportCards() {
    const nb = getCurrentNb();
    if (!nb || !nb.cards.length) { alert("没有单词可导出"); return; }
    const blob = new Blob([JSON.stringify({name:nb.name, cards:nb.cards},null,2)],{type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `${nb.name}_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function importCards(e) {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            const imp = data.cards || data;
            if (!Array.isArray(imp)) throw new Error();
            const cards = getCurrentCards();
            const exist = new Set(cards.map(c=>c.word.toLowerCase()));
            let merged = 0;
            imp.forEach(c=>{ if(!exist.has(c.word.toLowerCase())){c.id=Date.now()+Math.random();c.createdAt=new Date().toISOString();cards.unshift(c);merged++;exist.add(c.word.toLowerCase());} });
            saveCurrentCards(cards);
            renderVocab(); renderNotebooks();
            vocabStatus(`导入 ${merged} 个（${imp.length-merged} 个跳过）`,"success");
        } catch(err) { alert("文件格式不正确"); }
    };
    reader.readAsText(f); e.target.value="";
}

function exportAll() {
    const nbs = loadNotebooks();
    if (!nbs.length) { alert("没有笔记本"); return; }
    const blob = new Blob([JSON.stringify(nbs,null,2)],{type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `全部笔记本_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function importAll(e) {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const imp = JSON.parse(ev.target.result);
            if (!Array.isArray(imp)) throw new Error();
            const existing = loadNotebooks();
            let added = 0;
            imp.forEach(inb => {
                const exist = existing.find(e => e.id === inb.id);
                if (!exist) { existing.push(inb); added++; }
            });
            saveNotebooks(existing);
            if (existing.length > 0) currentNbId = existing[0].id;
            renderNotebooks(); renderVocab();
            alert(`导入 ${added} 个笔记本`);
        } catch(err) { alert("文件格式不正确"); }
    };
    reader.readAsText(f); e.target.value="";
}

function vocabStatus(m,type) { const e=document.getElementById("vocabStatus"); e.textContent=m; e.className="status-msg "+(type||""); }

// ═══════════════════════════════════════════════════
//  TAB 3: FLASHCARDS
// ═══════════════════════════════════════════════════
let fcCards=[], fcIdx=0, fcMastered=0, fcFlipped=false;
function initFC() { const nb=getCurrentNb(); fcCards=[...(nb?nb.cards:[])]; fcIdx=0; fcMastered=0; fcFlipped=false; document.getElementById("flipper").classList.remove("flipped"); }
function shuffleFC() { fcCards=fcCards.sort(()=>Math.random()-0.5); fcIdx=0; fcMastered=0; document.getElementById("flipper").classList.remove("flipped"); renderFC(); }
function resetFC() { initFC(); renderFC(); }
function renderFC() {
    document.getElementById("fcTotal").textContent = fcCards.length;
    document.getElementById("fcMastered").textContent = fcMastered;
    document.getElementById("fcBar").style.width = fcCards.length+fcMastered>0 ? ((fcIdx+fcMastered)/(fcCards.length+fcMastered)*100)+"%" : "0%";
    if (!fcCards.length || fcIdx >= fcCards.length) {
        if (fcMastered > 0 && fcIdx >= fcCards.length) {
            document.getElementById("fcFrontWord").textContent = "🎉";
            document.getElementById("fcIdx").textContent = fcMastered;
        } else {
            document.getElementById("fcFrontWord").textContent = "?";
            document.getElementById("fcIdx").textContent = "0";
        }
        return;
    }
    const c = fcCards[fcIdx];
    document.getElementById("fcIdx").textContent = fcIdx+1;
    document.getElementById("fcFrontWord").textContent = c.word;
    document.getElementById("fcBackWord").textContent = c.word;
    document.getElementById("fcPhonetic").textContent = c.phonetic||"";
    document.getElementById("fcMeaning").textContent = c.meaning||"";
    document.getElementById("fcPhrases").textContent = c.phrases||"";
    document.getElementById("fcExample").textContent = c.example||"";
}
function flipCard() { if(!fcCards.length||fcIdx>=fcCards.length)return; fcFlipped=!fcFlipped; document.getElementById("flipper").classList.toggle("flipped",fcFlipped); }
function fcAnswer(known) {
    if(!fcCards.length||fcIdx>=fcCards.length)return;
    if(known){fcMastered++;fcCards.splice(fcIdx,1);}else{const c=fcCards.splice(fcIdx,1)[0];fcCards.push(c);}
    if(fcIdx>=fcCards.length)fcIdx=0;
    fcFlipped=false;document.getElementById("flipper").classList.remove("flipped");
    renderFC();
}

// ═══════════════════════════════════════════════════
//  TAB 4: QUIZ
// ═══════════════════════════════════════════════════
let qzCards=[], qzIdx=0, qzCorrect=0, qzAnswered=false;
function startQuiz() {
    const all = getCurrentCards();
    if (all.length < 4) { alert("当前笔记本至少需要 4 个单词"); return; }
    qzCards = [...all].sort(()=>Math.random()-0.5).slice(0,10);
    qzIdx=0; qzCorrect=0;
    document.getElementById("quizSetup").style.display="none";
    document.getElementById("quizResult").style.display="none";
    document.getElementById("quizArea").style.display="";
    document.getElementById("qzFeedback").textContent=""; document.getElementById("qzFeedback").className="status-msg";
    showQzQ();
}
function showQzQ() {
    if (qzIdx >= qzCards.length) { finishQuiz(); return; }
    qzAnswered = false;
    document.getElementById("qzFeedback").textContent=""; document.getElementById("qzFeedback").className="status-msg";
    const correct = qzCards[qzIdx];
    const others = getCurrentCards().filter(c=>c.id!==correct.id).sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [correct,...others].sort(()=>Math.random()-0.5);
    document.getElementById("qzQuestion").textContent = `"${correct.meaning||correct.word}" 对应的单词是？`;
    document.getElementById("qzTotal").textContent = qzIdx+"/10";
    document.getElementById("qzCorrect").textContent = qzCorrect;
    document.getElementById("qzOptions").innerHTML = opts.map(o=>`<button class="quiz-opt" onclick="answerQuiz(${o.id},this)">${esc(o.word)}</button>`).join("");
}
function answerQuiz(id,btn) {
    if(qzAnswered)return; qzAnswered=true;
    const correct = qzCards[qzIdx].id===id;
    if(correct){btn.classList.add("correct");qzCorrect++;document.getElementById("qzCorrect").textContent=qzCorrect;document.getElementById("qzFeedback").textContent="正确！"+qzCards[qzIdx].word;document.getElementById("qzFeedback").className="status-msg success";}
    else{btn.classList.add("wrong");document.getElementById("qzFeedback").textContent="正确答案: "+qzCards[qzIdx].word;document.getElementById("qzFeedback").className="status-msg error";
        document.querySelectorAll(".quiz-opt").forEach(b=>{if(parseInt(b.getAttribute("onclick").match(/(\d+)/)[1])===qzCards[qzIdx].id)b.classList.add("correct")});}
    document.querySelectorAll(".quiz-opt").forEach(b=>b.style.pointerEvents="none");
    setTimeout(()=>{qzIdx++;showQzQ();},1800);
}
function finishQuiz() {
    document.getElementById("quizArea").style.display="none"; document.getElementById("quizResult").style.display="";
    const pct = Math.round(qzCorrect/qzCards.length*100);
    let e,t;
    if(pct>=90){e="🏆";t="太棒了！";}else if(pct>=70){e="👍";t="很不错！";}else if(pct>=50){e="💪";t="继续加油！";}else{e="📚";t="多多复习！";}
    document.getElementById("qzResultEmoji").textContent=e; document.getElementById("qzResultTitle").textContent=t;
    document.getElementById("qzResultDetail").textContent=`正确 ${qzCorrect}/${qzCards.length}（${pct}%）`;
    const hist = loadQuizHistory();
    hist.unshift({date:new Date().toISOString(),correct:qzCorrect,total:qzCards.length,pct,notebook:getCurrentNb()?.name||""});
    if(hist.length>50)hist.length=50;
    localStorage.setItem("quiz_history",JSON.stringify(hist));
    renderQuizHistory();
}
function renderQuizHistory() {
    const hist = loadQuizHistory();
    const h = hist.length ? `<div style="font-family:var(--font-heading);font-weight:600;margin-bottom:6px;font-size:0.88rem">📊 测验记录</div><table><thead><tr><th>日期</th><th>笔记本</th><th>正确</th><th>正确率</th></tr></thead><tbody>${hist.slice(0,15).map(r=>`<tr><td>${new Date(r.date).toLocaleDateString('zh-CN')}</td><td>${esc(r.notebook||'')}</td><td>${r.correct}/${r.total}</td><td style="color:${r.pct>=80?'var(--accent-green)':r.pct>=50?'#b8860b':'var(--accent-red)'};font-weight:600">${r.pct}%</td></tr>`).join("")}</tbody></table>` : '<div style="color:var(--ink-muted);font-family:var(--font-heading);font-size:0.84rem">暂无记录</div>';
    document.getElementById("quizHistory").innerHTML = h;
    document.getElementById("quizHistoryBottom").innerHTML = h;
}
