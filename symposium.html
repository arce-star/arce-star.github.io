<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智者会饮 - Symposium</title>
    <style>
        :root {
            --bg-color: #fdfcf8;
            --text-color: #333;
            --border-color: #e0e0d0;
            --accent-color: #8c7e6d;
            --btn-next: #5a645e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 设置栏 */
        .setup-bar {
            padding: 10px 15px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            z-index: 10;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input, select {
            padding: 8px;
            border: 1px solid var(--border-color);
            outline: none;
            font-size: 13px;
            background: white;
        }

        /* 聊天区 */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .msg-card {
            max-width: 600px;
            width: 100%;
            margin-bottom: 30px;
            text-align: center;
            animation: fadeInUp 0.6s ease both;
        }

        .sage-name {
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .sage-content {
            font-size: 17px;
            line-height: 1.8;
            position: relative;
            padding: 0 20px;
            word-wrap: break-word;
        }

        .msg-card::after {
            content: "✦";
            display: block;
            margin-top: 25px;
            color: var(--border-color);
            font-size: 12px;
        }

        .user-node {
            background: #f4f4ec;
            padding: 20px;
            border-radius: 4px;
            text-align: left;
            border-left: 4px solid var(--accent-color);
            margin-bottom: 40px;
        }

        .topic-divider {
            width: 100%;
            text-align: center;
            margin: 40px 0;
            color: var(--accent-color);
            font-weight: bold;
            border-top: 1px double var(--border-color);
            padding-top: 20px;
        }

        /* 输入区 */
        .input-box {
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        textarea {
            flex: 1;
            height: 45px;
            border: 1px solid var(--border-color);
            resize: none;
            padding: 10px;
            font-family: inherit;
        }

        button {
            padding: 8px 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #next-btn { background: var(--btn-next); }
        #next-btn:hover { background: #4a544e; }

        button:hover { opacity: 0.8; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #sage-selector-wrap { display: none; }
    </style>
</head>
<body>

    <div class="setup-bar">
        <input type="password" id="api-key" placeholder="DeepSeek API Key" style="width: 140px;">
        <input type="text" id="topic" placeholder="新讨论话题..." style="width: 160px;">
        
        <div class="control-group">
            <select id="mode-select">
                <option value="random">🎲 随机轮盘</option>
                <option value="manual">🎯 指定智者</option>
            </select>
        </div>

        <div id="sage-selector-wrap" class="control-group">
            <select id="sage-picker" style="width: 110px;"></select>
        </div>

        <button id="start-btn">开启新议题</button>
        <button id="next-btn" disabled title="让下一位智者继续发言">邀请发言</button>
        <button id="clear-btn" style="background:#ddd; color:#666;">清屏</button>
    </div>

    <div id="chat-flow">
        <div id="welcome-msg" style="margin-top: 15vh; color: #bbb; text-align: center;">
            <h2 style="font-weight: normal; letter-spacing: 5px;">SYMPOSIUM</h2>
            <p>跨越时空的思想碰撞</p>
        </div>
    </div>

    <div class="input-box">
        <textarea id="user-input" placeholder="输入你的见解..."></textarea>
        <button id="send-btn" disabled>参与</button>
    </div>

    { name: "鲁迅", prompt: "你是鲁迅。民族魂。文字如匕首，揭露人性阴暗。发言冷峻犀利。请简短辩论，字数50-80字。" },

    { name: "黑崎一护", prompt: "你是一护。死神代理。为守护而挥刀，不问对错。发言直接、冲动。请简短辩论，字数50-80字。" },

    { name: "爱德华·艾尔利克", prompt: "你是爱德华。钢之炼金术师。发言热血、不服输，坚信等价交换与手足之情。请简短辩论，字数50-80字。" },

    { name: "坂田银时", prompt: "你是坂田银时。万事屋老板。看似吊儿郎当实则坚守武士魂。发言吐槽犀利。请简短辩论，字数50-80字。" },

    { name: "蓝染惣右介", prompt: "你是蓝染。破面创造者。追求超越。发言优雅、傲慢，崇拜是距离理解最远的感情。请简短辩论，字数50-80字。" },
    { name: "江户川柯南", prompt: "你是柯南。平成年代福尔摩斯。发言理性、好胜，真相只有一个。请简短辩论，字数50-80字。" },
    // ==================== 五、日漫主角 · 热血/守护型 ====================
    // ...（后续保持不变，篇幅原因此处省略，你可直接粘贴原后续内容）
];

        let globalHistory = [];
        const apiKeyInput = document.getElementById('api-key');
        const topicInput = document.getElementById('topic');
        const chatFlow = document.getElementById('chat-flow');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const clearBtn = document.getElementById('clear-btn');
        const modeSelect = document.getElementById('mode-select');
        const sagePicker = document.getElementById('sage-picker');
        const sageSelectorWrap = document.getElementById('sage-selector-wrap');

        // 初始化：填充下拉列表
        sages.sort((a,b) => a.name.localeCompare(b.name)).forEach((s, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.innerText = s.name;
            sagePicker.appendChild(opt);
        });

        apiKeyInput.value = localStorage.getItem('ds_key') || '';

        modeSelect.onchange = () => {
            sageSelectorWrap.style.display = modeSelect.value === 'manual' ? 'flex' : 'none';
        };

        function addMsg(name, text, isUser = false) {
            const welcomeMsg = document.getElementById('welcome-msg');
            if(welcomeMsg) welcomeMsg.remove();

            const div = document.createElement('div');
            div.className = `msg-card ${isUser ? 'user-node' : ''}`;
            div.innerHTML = `
                ${isUser ? '' : `<div class="sage-name">${name}</div>`}
                <div class="sage-content">${text}</div>
            `;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
            return div;
        }

        async function askAI(sysPrompt, currentSageName) {
            const key = apiKeyInput.value;
            if(!key) return alert("请填入 Key"), null;
            localStorage.setItem('ds_key', key);

            // 核心改进 1：在 System Prompt 结尾增加严格指令
            const strictPrompt = sysPrompt + ` 
            前面的都是其他人的发言,你看看他们的观点,
            注意：请直接输出你（${currentSageName}）的发言内容。
            `;

            try {
                const res = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {role: "system", content: strictPrompt},
                            ...globalHistory.slice(-10) 
                        ],
                        max_tokens: 300,
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (e) { return "（思绪中断，请检查Key或网络）"; }
        }

        async function triggerSageSpeak() {
            startBtn.disabled = nextBtn.disabled = sendBtn.disabled = true;
            
            let s;
            if (modeSelect.value === 'random') {
                s = sages[Math.floor(Math.random() * sages.length)];
            } else {
                const selectedName = sagePicker.options[sagePicker.selectedIndex].text;
                s = sages.find(item => item.name === selectedName);
            }

            const card = addMsg(s.name, "正在构思...", false);
            const contentArea = card.querySelector('.sage-content');
            
            // 核心改进 2：传入当前智者名字用于 Prompt 约束
            let reply = await askAI(s.prompt);
            
            if(reply) {
                // 核心改进 3：二次清洗，防止 AI 依然固执地带上名字
                reply = reply.replace(/^.*?[：:]\s*/, ""); 
                
                contentArea.innerText = reply;
                // 核心改进 4：历史记录中清晰标注角色，帮助 AI 理解上下文结构
                globalHistory.push({role: "assistant", content: `${s.name}说道: ${reply}`});
            }

            startBtn.disabled = nextBtn.disabled = sendBtn.disabled = false;
        }
        async function triggerSageSpeak() {
            startBtn.disabled = nextBtn.disabled = sendBtn.disabled = true;
            
            let s;
            if (modeSelect.value === 'random') {
                s = sages[Math.floor(Math.random() * sages.length)];
            } else {
                // 根据名字在原数组中找，防止排序打乱索引
                const selectedName = sagePicker.options[sagePicker.selectedIndex].text;
                s = sages.find(item => item.name === selectedName);
            }

            const card = addMsg(s.name, "正在构思...", false);
            const contentArea = card.querySelector('.sage-content');
            
            const reply = await askAI(s.prompt);
            if(reply) {
                contentArea.innerText = reply;
                globalHistory.push({role: "assistant", content: `${s.name}: ${reply}`});
            }

            startBtn.disabled = nextBtn.disabled = sendBtn.disabled = false;
        }

        startBtn.onclick = async () => {
            const t = topicInput.value.trim();
            if(!t) return alert("请输入议题");
            
            const divider = document.createElement('div');
            divider.className = 'topic-divider';
            divider.innerText = `—— 议题：${t} ——`;
            chatFlow.appendChild(divider);

            globalHistory.push({role: "user", content: `新议题开始了：${t}`});
            await triggerSageSpeak();
        };

        // 新增：邀请下一位发言
        nextBtn.onclick = async () => {
            await triggerSageSpeak();
        };

        sendBtn.onclick = async () => {
            const val = userInput.value.trim();
            if(!val) return;
            addMsg("你", val, true);
            globalHistory.push({role: "user", content: `参与者发言：${val}`});
            userInput.value = "";
            await triggerSageSpeak();
        };

        clearBtn.onclick = () => {
            if(confirm("确定清屏？历史记忆也将重置。")) {
                chatFlow.innerHTML = '<div id="welcome-msg" style="margin-top: 15vh; color: #bbb; text-align: center;"><h2 style="font-weight: normal; letter-spacing: 5px;">SYMPOSIUM</h2><p>跨越时空的思想碰撞</p></div>';
                globalHistory = [];
                nextBtn.disabled = sendBtn.disabled = true;
            }
        };

        userInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } };
    </script>
</body>
</html>
